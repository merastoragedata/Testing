<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>MSETCL Estimate Generator</title>
<meta name="description" content="EHV Substation Engineering · Cost Estimation Portal · MSETCL">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* ── Core palette: EHV switchyard inspired — navy night sky, steel structure, copper/gold busbar accent ── */
  --navy-950:#0a1628; --navy-900:#0F2044; --navy-800:#152a52; --navy-700:#1c3666;
  --steel-100:#eef1f6; --steel-200:#dde3ee; --steel-300:#c2cbdc; --steel-400:#94a1bd;
  --steel-600:#5c6987; --steel-700:#414e6b; --ink:#101826;
  --gold-400:#e8b84b; --gold-500:#c9922a; --gold-600:#a8741c;
  --copper:#c1652f;
  --ok-500:#1e8a5f; --ok-100:#e3f6ec;
  --warn-500:#c9922a; --warn-100:#fdf3e0;
  --bad-500:#c4453a; --bad-100:#fbe9e7;
  --info-500:#2563a8; --info-100:#e7f0fb;
  --surface:#ffffff; --surface-2:#f6f8fb; --surface-3:#eef1f7;
  --line:#e2e7f0; --line-strong:#cbd3e3;
  --radius-sm:6px; --radius-md:10px; --radius-lg:16px;
  --shadow-sm:0 1px 2px rgba(16,24,38,.06), 0 1px 1px rgba(16,24,38,.04);
  --shadow-md:0 4px 14px rgba(16,24,38,.08), 0 1px 3px rgba(16,24,38,.06);
  --shadow-lg:0 12px 32px rgba(16,24,38,.14), 0 2px 8px rgba(16,24,38,.08);
  --shadow-gold:0 4px 18px rgba(201,146,42,.30);
  --ease:cubic-bezier(.22,.9,.32,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --dur-fast:120ms; --dur:200ms; --dur-slow:340ms;
  --font-display:'Sora',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --font-body:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Consolas,monospace;
}

*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; min-height:100vh; background:var(--surface-2); color:var(--ink);
  font-family:var(--font-body); font-size:14.5px; line-height:1.5;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important;}
}
h1,h2,h3,h4{font-family:var(--font-display); font-weight:700; margin:0; letter-spacing:-.01em; color:var(--navy-900)}
.mono{font-family:var(--font-mono); font-variant-numeric:tabular-nums}
a{color:inherit}
button{font-family:inherit}
::selection{background:var(--gold-400); color:var(--navy-950)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--steel-300); border-radius:99px; border:2px solid var(--surface-2)}
::-webkit-scrollbar-thumb:hover{background:var(--steel-400)}

/* ── Layout shell ── */
#app{min-height:100vh; display:flex; flex-direction:column}
.topbar{
  position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:14px;
  padding:0 18px; height:58px; background:var(--navy-900);
  background-image:linear-gradient(135deg,var(--navy-900) 0%,var(--navy-800) 60%,var(--navy-900) 100%);
  color:#fff; box-shadow:var(--shadow-md); min-width:0;
}
.brand{display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:700; font-size:16px; min-width:0; overflow:hidden}
.brand .bolt{width:26px; height:26px; flex:none; color:var(--gold-400)}
.brand > div{min-width:0; overflow:hidden}
.brand > div > div:first-child{white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.brand .sub{font-weight:500; font-size:11px; color:var(--steel-300); letter-spacing:.04em; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.topbar-spacer{flex:1; min-width:8px}
.role-chip{
  font-size:10.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
  padding:3px 9px; border-radius:99px; background:rgba(232,184,75,.16); color:var(--gold-400);
  border:1px solid rgba(232,184,75,.35);
}
.user-pill{
  display:flex; align-items:center; gap:8px; padding:5px 8px 5px 5px; border-radius:99px;
  background:rgba(255,255,255,.08); cursor:pointer; transition:background var(--dur) var(--ease);
  border:none; color:#fff;
}
.user-pill:hover{background:rgba(255,255,255,.16)}
.avatar{
  width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,var(--gold-400),var(--copper));
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:11px; color:var(--navy-950);
  flex:none;
}

.shell{flex:1; display:flex; min-height:0}
.sidenav{
  width:220px; flex:none; background:var(--navy-950); color:var(--steel-300);
  display:flex; flex-direction:column; padding:14px 10px; gap:2px;
  transition:transform var(--dur-slow) var(--ease-out);
}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius-sm);
  cursor:pointer; font-size:13.5px; font-weight:600; color:var(--steel-300);
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);
  user-select:none; border:none; background:none; width:100%; text-align:left;
}
.nav-item .ic{width:18px; text-align:center; flex:none; font-size:15px}
.nav-item:hover{background:rgba(255,255,255,.06); color:#fff}
.nav-item.active{background:linear-gradient(90deg,rgba(232,184,75,.18),rgba(232,184,75,.05)); color:var(--gold-400); box-shadow:inset 3px 0 0 var(--gold-400)}
.nav-item:active{transform:scale(.98)}
.nav-divider{height:1px; background:rgba(255,255,255,.08); margin:8px 6px}

.main{flex:1; min-width:0; overflow-y:auto; padding:22px 26px 60px; animation:pageIn var(--dur-slow) var(--ease-out)}
@keyframes pageIn{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)}}
.page-head{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap}
.page-title{font-size:21px}
.page-sub{color:var(--steel-600); font-size:13px; margin-top:3px}

/* ── Cards / surfaces ── */
.card{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm); padding:18px; transition:box-shadow var(--dur) var(--ease), transform var(--dur) var(--ease);
}
.card.hoverable:hover{box-shadow:var(--shadow-md); transform:translateY(-1px)}
.card-tight{padding:14px}
.card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:10px; flex-wrap:wrap}
.card-head h3{font-size:14.5px}
.grid{display:grid; gap:16px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

/* ── Buttons ── */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:7px; white-space:nowrap;
  font-family:var(--font-body); font-weight:600; font-size:13px; line-height:1; cursor:pointer;
  border-radius:var(--radius-sm); border:1px solid transparent; padding:9px 14px;
  transition:transform var(--dur-fast) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease), opacity var(--dur-fast) var(--ease);
  user-select:none;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45; cursor:not-allowed; pointer-events:none}
.btn-primary{background:var(--navy-900); color:#fff; box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--navy-800); box-shadow:var(--shadow-md)}
.btn-gold{background:linear-gradient(135deg,var(--gold-400),var(--gold-500)); color:var(--navy-950); box-shadow:var(--shadow-gold)}
.btn-gold:hover{filter:brightness(1.05); box-shadow:0 6px 22px rgba(201,146,42,.4)}
.btn-ghost{background:transparent; color:var(--navy-800); border-color:var(--line-strong)}
.btn-ghost:hover{background:var(--surface-3); border-color:var(--steel-400)}
.btn-danger{background:var(--bad-100); color:var(--bad-500); border-color:transparent}
.btn-danger:hover{background:#f8d9d6}
.btn-sm{padding:6px 10px; font-size:12px; border-radius:7px}
.btn-icon{padding:8px; width:34px; height:34px}
.btn-block{width:100%}

/* ── Forms ── */
label{display:block; font-size:12px; font-weight:600; color:var(--steel-700); margin-bottom:5px; letter-spacing:.01em}
input[type=text],input[type=password],input[type=number],input[type=date],input[type=email],select,textarea{
  width:100%; padding:9px 11px; border:1.5px solid var(--line-strong); border-radius:var(--radius-sm);
  font-family:var(--font-body); font-size:13.5px; background:var(--surface); color:var(--ink);
  transition:border-color var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease);
}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--navy-700); box-shadow:0 0 0 3px rgba(28,54,102,.12)}
input:disabled,select:disabled,textarea:disabled{background:var(--surface-3); color:var(--steel-600); cursor:not-allowed}
textarea{resize:vertical; min-height:64px}
.field{margin-bottom:13px}
.field-row{display:flex; gap:12px}
.field-row > *{flex:1}
.hint{font-size:11.5px; color:var(--steel-600); margin-top:4px}
.error-text{font-size:12px; color:var(--bad-500); margin-top:4px; font-weight:600}

.radio-pill-group{display:flex; gap:8px; flex-wrap:wrap}
.radio-pill{
  padding:7px 13px; border-radius:99px; border:1.5px solid var(--line-strong); cursor:pointer;
  font-size:12.5px; font-weight:600; color:var(--steel-700); background:var(--surface);
  transition:all var(--dur-fast) var(--ease); user-select:none;
}
.radio-pill:hover{border-color:var(--navy-700)}
.radio-pill.sel{background:var(--navy-900); border-color:var(--navy-900); color:#fff; box-shadow:var(--shadow-sm)}
.radio-pill.sel.na{background:var(--steel-600); border-color:var(--steel-600)}

.toggle{display:inline-flex; align-items:center; gap:9px; cursor:pointer; user-select:none}
.toggle-track{
  width:40px; height:22px; border-radius:99px; background:var(--steel-300); position:relative;
  transition:background var(--dur) var(--ease); flex:none;
}
.toggle-track::after{
  content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%;
  background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:transform var(--dur) var(--ease-out);
}
.toggle.on .toggle-track{background:var(--ok-500)}
.toggle.on .toggle-track::after{transform:translateX(18px)}
.toggle.disabled{opacity:.5; pointer-events:none}

/* checkbox option list w/ generous spacing (SOR versions etc.) — horizontal wrap */
.check-option-list{display:flex; flex-direction:row; flex-wrap:wrap; gap:10px 12px}
.check-option{
  display:flex; align-items:center; gap:9px; padding:10px 14px; border-radius:var(--radius-sm);
  border:1.5px solid var(--line); cursor:pointer; transition:all var(--dur-fast) var(--ease); background:var(--surface);
  flex:0 0 auto;
}
.check-option:hover{border-color:var(--steel-400); background:var(--surface-2)}
.check-option.checked{border-color:var(--navy-700); background:var(--info-100)}
.check-option input{width:16px; height:16px; accent-color:var(--navy-800); cursor:pointer; flex:none}
.check-option .opt-label{font-size:13px; font-weight:600; white-space:nowrap}
.check-option .opt-count{font-size:11.5px; color:var(--steel-600); font-family:var(--font-mono); white-space:nowrap}

/* ── Tables ── */
.table-wrap{overflow-x:auto; border-radius:var(--radius-md); border:1px solid var(--line)}
table{width:100%; border-collapse:collapse; font-size:13px}
thead th{
  background:var(--navy-900); color:#fff; text-align:left; padding:10px 12px; font-weight:700;
  font-size:11.5px; letter-spacing:.03em; text-transform:uppercase; white-space:nowrap; position:sticky; top:0; z-index:2;
}
tbody td{padding:9px 12px; border-bottom:1px solid var(--line); vertical-align:middle}
tbody tr{transition:background var(--dur-fast) var(--ease)}
tbody tr:hover{background:var(--surface-2)}
tbody tr.ai-row-selected{background:var(--info-100)}
tbody tr.ai-row-selected:hover{background:var(--info-100)}
tbody tr:last-child td{border-bottom:none}
.qty-input{width:72px; padding:6px 8px; text-align:right; font-family:var(--font-mono)}
.num-cell{font-family:var(--font-mono); text-align:right; font-variant-numeric:tabular-nums}
.totals-box{
  margin-top:14px; padding:14px 16px; border-radius:var(--radius-md);
  background:linear-gradient(135deg,var(--navy-900),var(--navy-800)); color:#fff;
  display:flex; flex-direction:column; gap:6px; animation:pop var(--dur) var(--ease-out);
}
@keyframes pop{from{opacity:0; transform:scale(.97)} to{opacity:1; transform:scale(1)}}
.totals-row{display:flex; justify-content:space-between; font-size:13px; color:var(--steel-300)}
.totals-row.grand{font-size:16.5px; font-weight:800; color:var(--gold-400); padding-top:8px; border-top:1px solid rgba(255,255,255,.15)}
.totals-row .v{font-family:var(--font-mono); font-variant-numeric:tabular-nums}

/* badges */
.badge{display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:99px; font-size:11px; font-weight:700; letter-spacing:.02em}
.badge-gold{background:var(--warn-100); color:var(--gold-600)}
.badge-ok{background:var(--ok-100); color:var(--ok-500)}
.badge-info{background:var(--info-100); color:var(--info-500)}
.badge-bad{background:var(--bad-100); color:var(--bad-500)}
.badge-neutral{background:var(--surface-3); color:var(--steel-700)}

/* abstract sr rows — matches earlier version's coloring scheme */
.sr-row{display:grid; grid-template-columns:36px 1fr 160px; gap:10px; align-items:start; padding:11px 16px; border-bottom:1px solid var(--line)}
.sr-row .sr-no{padding-top:1px}
.sr-row .sr-val{padding-top:1px}
.sr-breakdown{font-size:11.5px; color:var(--steel-600); font-weight:500; margin-top:3px; padding-left:14px}
.sr-row .sr-no{font-family:var(--font-mono); font-weight:700; color:var(--steel-600); font-size:12px}
.sr-row .sr-label{font-size:13.5px; font-weight:600}
.sr-row .sr-val{font-family:var(--font-mono); text-align:right; font-weight:700; font-variant-numeric:tabular-nums}
.sr-row.subtotal{background:linear-gradient(90deg,#EFF4FF,#F5F8FF)}
.sr-row.subtotal .sr-label, .sr-row.subtotal .sr-val{color:var(--navy-800); font-weight:800}
.sr-row.final{background:linear-gradient(135deg,var(--navy-900),var(--navy-800)); border-radius:8px; border-bottom:none; padding:14px 16px}
.sr-row.final .sr-no, .sr-row.final .sr-label{color:#fff; font-weight:800; font-size:14.5px}
.sr-row.final .sr-val{color:var(--gold-400); font-size:17px; font-weight:800}
.awords-box{
  background:linear-gradient(135deg,#FDF3E0,#FFF3D0); border:1.5px solid #E8C97A; border-radius:var(--radius-md);
  padding:14px 18px; font-weight:700; color:var(--gold-600); margin-top:14px; font-size:13px; line-height:1.7;
  box-shadow:0 2px 8px rgba(201,146,42,.1);
}

/* ── Modal ── */
.modal-backdrop{
  position:fixed; inset:0; background:rgba(10,22,40,.55); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
  animation:fadeIn var(--dur) var(--ease);
}
@keyframes fadeIn{from{opacity:0} to{opacity:1}}
.modal{
  background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg);
  width:100%; max-width:520px; max-height:88vh; overflow-y:auto; padding:22px;
  animation:modalIn var(--dur-slow) var(--ease-out);
}
.modal.wide{max-width:780px}
@keyframes modalIn{from{opacity:0; transform:translateY(14px) scale(.97)} to{opacity:1; transform:translateY(0) scale(1)}}
.modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px}
.modal-close{background:none; border:none; cursor:pointer; color:var(--steel-600); font-size:18px; padding:4px; border-radius:6px}
.modal-close:hover{background:var(--surface-3); color:var(--ink)}

/* ── Toast ── */
#toast-stack{position:fixed; bottom:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px; max-width:360px}
.toast{
  background:var(--navy-950); color:#fff; padding:11px 16px; border-radius:var(--radius-sm); font-size:13px; font-weight:600;
  box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:9px;
  animation:toastIn var(--dur-slow) var(--ease-out);
}
@keyframes toastIn{from{opacity:0; transform:translateX(30px)} to{opacity:1; transform:translateX(0)}}
.toast.ok{background:var(--ok-500)} .toast.err{background:var(--bad-500)} .toast.warn{background:var(--gold-600)}

/* ── Skeleton / loading ── */
.skel{background:linear-gradient(90deg,var(--surface-3) 25%,var(--steel-200) 37%,var(--surface-3) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; border-radius:6px}
@keyframes shimmer{0%{background-position:100% 0} 100%{background-position:0 0}}
.spinner{width:18px; height:18px; border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite}
.spinner.dark{border:2.5px solid var(--line-strong); border-top-color:var(--navy-800)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:50px 20px; text-align:center; color:var(--steel-600)}
.empty-state .ic{font-size:38px; margin-bottom:10px; opacity:.5}

/* collapsible (admin panel) */
.collapse{border:1px solid var(--line); border-radius:var(--radius-md); overflow:hidden; margin-bottom:12px}
.collapse-head{display:flex; align-items:center; justify-content:space-between; padding:13px 16px; cursor:pointer; background:var(--surface); user-select:none}
.collapse-head:hover{background:var(--surface-2)}
.collapse-head .chev{transition:transform var(--dur) var(--ease)}
.collapse.open .collapse-head .chev{transform:rotate(90deg)}
.collapse-body{max-height:0; overflow:hidden; transition:max-height var(--dur-slow) var(--ease-out)}
.collapse.open .collapse-body{max-height:3000px}
.collapse-body-inner{padding:4px 16px 16px}

/* tabs */
.tabs{display:flex; gap:4px; border-bottom:2px solid var(--line); margin-bottom:16px; overflow-x:auto}
.tab{padding:10px 16px; font-size:13px; font-weight:700; color:var(--steel-600); cursor:pointer; border-bottom:2.5px solid transparent; margin-bottom:-2px; white-space:nowrap; transition:all var(--dur-fast) var(--ease)}
.tab:hover{color:var(--navy-800)}
.tab.active{color:var(--navy-900); border-color:var(--gold-500)}

/* dashboard estimate cards */
.est-card{
  display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:var(--radius-md);
  border:1px solid var(--line); background:var(--surface); transition:all var(--dur) var(--ease); cursor:pointer;
}
.est-card:hover{box-shadow:var(--shadow-md); border-color:var(--steel-400); transform:translateY(-1px)}
.est-card .est-sno{flex:none; width:26px; text-align:center; font-family:var(--font-mono); font-weight:700; font-size:12px; color:var(--steel-600)}
.est-card .est-icon{width:42px; height:42px; border-radius:10px; background:var(--surface-3); display:flex; align-items:center; justify-content:center; font-size:18px; flex:none}
.est-card .est-main{flex:1; min-width:0}
.est-card .est-name{font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.est-card .est-meta{font-size:12px; color:var(--steel-600); margin-top:2px}
.est-card .est-total{font-family:var(--font-mono); font-weight:700; font-size:14px; text-align:right; white-space:nowrap}
.est-card .est-actions{display:flex; gap:6px; flex:none}
@media(max-width:680px){
  .est-card{flex-wrap:wrap}
  .est-card .est-icon{display:none}
  .est-card .est-main{flex:1 1 100%}
  .est-card .est-total, .est-card .est-actions{flex:none}
}

/* stat cards (dashboard) */
.stat-card{display:flex; flex-direction:column; align-items:flex-start; gap:2px}
.stat-ic{font-size:18px; margin-bottom:4px}
.stat-val{font-family:var(--font-display); font-weight:800; font-size:22px; color:var(--navy-900)}
.stat-label{font-size:11px; color:var(--steel-600); font-weight:600; text-transform:uppercase; letter-spacing:.03em}
@media(max-width:480px){
  .stat-val{font-size:18px}
}

/* lock overlay (financial tracking until LOI) */
.locked{opacity:.4; filter:grayscale(.3); pointer-events:none; position:relative}
.lock-banner{display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--warn-100); color:var(--gold-600); border-radius:var(--radius-sm); font-size:12.5px; font-weight:600; margin-bottom:12px}

/* proposal stage row */
.stage-row{display:flex; align-items:flex-start; gap:12px; padding:11px 4px; border-bottom:1px solid var(--line)}
.stage-row:last-child{border-bottom:none}
.stage-check{width:20px; height:20px; border-radius:6px; border:2px solid var(--line-strong); flex:none; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-top:1px; transition:all var(--dur-fast) var(--ease); background:#fff}
.stage-check.done{background:var(--ok-500); border-color:var(--ok-500); color:#fff}
.stage-num{width:22px; flex:none; font-family:var(--font-mono); font-size:11.5px; color:var(--steel-600); padding-top:2px}
.stage-body{flex:1; min-width:0; display:flex; flex-direction:column; gap:6px}
.stage-name{font-size:13px; font-weight:600}
.stage-remarks-row{display:flex; flex-direction:column; gap:5px}
.stage-remarks-input{padding:6px 9px; font-size:12.5px}
.stage-link-row{display:flex; gap:6px; align-items:center}
.stage-link-input{padding:6px 9px; font-size:12px; flex:1; color:var(--info-500); min-width:0}

/* progress image grid */
.img-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px}
.img-tile{position:relative; border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--line); background:var(--surface-3)}
.img-tile img{width:100%; height:96px; object-fit:cover; display:block; cursor:pointer; transition:transform var(--dur) var(--ease)}
.img-tile img:hover{transform:scale(1.04)}
.img-tile .img-cap{font-size:11px; padding:5px 7px; color:var(--steel-700); background:var(--surface)}
.img-tile .img-actions{position:absolute; top:5px; right:5px; display:flex; gap:4px; opacity:0; transition:opacity var(--dur) var(--ease)}
.img-tile:hover .img-actions{opacity:1}
.img-actions button{width:24px; height:24px; border-radius:6px; border:none; background:rgba(10,22,40,.7); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px}
.img-actions button:hover{background:rgba(10,22,40,.9)}

/* lightbox */
.lightbox{position:fixed; inset:0; background:rgba(5,10,20,.9); z-index:300; display:flex; align-items:center; justify-content:center; padding:30px; animation:fadeIn var(--dur) var(--ease)}
.lightbox img{max-width:92vw; max-height:88vh; border-radius:8px; box-shadow:var(--shadow-lg)}
.lightbox-close{position:absolute; top:18px; right:24px; background:rgba(255,255,255,.12); color:#fff; border:none; width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:18px}

/* utility */
.flex{display:flex} .flex-col{display:flex; flex-direction:column}
.items-center{align-items:center} .justify-between{justify-content:space-between} .justify-end{justify-content:flex-end}
.gap-1{gap:4px} .gap-2{gap:8px} .gap-3{gap:12px} .gap-4{gap:16px}
.w-full{width:100%}
.text-muted{color:var(--steel-600)} .text-sm{font-size:12.5px} .text-xs{font-size:11px}
.fw-700{font-weight:700} .fw-600{font-weight:600}
.mt-1{margin-top:8px} .mt-2{margin-top:14px} .mb-1{margin-top:8px}
.hidden{display:none !important}
.divider{height:1px; background:var(--line); margin:14px 0}

/* ── Mobile top navigation bar (replaces sidenav drawer below 880px) ── */
.mobile-nav{display:none}
@media(max-width:880px){
  .sidenav{display:none}
  .mobile-nav{
    display:flex; gap:2px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    background:var(--navy-950); padding:6px 8px; position:sticky; top:58px; z-index:39;
    box-shadow:0 2px 8px rgba(0,0,0,.15); scrollbar-width:none;

  .mnav-item{
    flex:none; display:flex; flex-direction:column; align-items:center; gap:2px;

    font-size:10.5px; font-weight:700; cursor:pointer; white-space:nowrap;
    transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
  }
  .mnav-item .ic{font-size:16px}
  .mnav-item.active{background:rgba(232,184,75,.16); color:var(--gold-400)}
  .main{padding:16px 14px 90px}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .page-title{font-size:18px}
  .brand .sub{display:none}
}

/* ── Bottom action bar — mirrors a page's top buttons, always reachable ── */
.bottom-action-bar{
  display:flex; flex-wrap:wrap; gap:8px; margin-top:24px; padding:14px;
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm); position:sticky; bottom:12px; z-index:10;
}
@media(max-width:880px){
  .bottom-action-bar{bottom:8px; padding:10px; gap:6px}
  .bottom-action-bar .btn{flex:1 1 auto; min-width:0}
}

@media(max-width:480px){
  .topbar{padding:0 12px; gap:8px}
  .role-chip{display:none}
  .user-pill span{display:none}
  .field-row{flex-direction:column; gap:0}
  table{font-size:12px}
  thead th,tbody td{padding:7px 8px}
  .sr-row{grid-template-columns:24px 1fr; row-gap:2px}

  .page-head > div:last-child, .page-head .flex{flex-wrap:wrap}
  .card{padding:14px}
  .est-card .est-total{font-size:13px}
  .tabs{gap:0}
  .tab{padding:9px 12px; font-size:12px}

}

  .grid-3, .grid-4{grid-template-columns:1fr 1fr}

}

/* Login screen */
.auth-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 20% 20%,var(--navy-800),var(--navy-950) 60%); padding:20px}
.auth-card{background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); width:100%; max-width:400px; padding:32px 28px; animation:modalIn var(--dur-slow) var(--ease-out)}

<body>
<div id="app"></div>
<script>
const APPS_SCRIPT_CODE = `// ═══════════════════════════════════════════════════════════════
// MSETCL Estimate Generator – Google Apps Script Backend v5
// ═══════════════════════════════════════════════════════════════
// DEPLOY: Extensions → Apps Script → Deploy → New Deployment
//         Type: Web App | Execute as: Me | Access: Anyone
//
// MIGRATION NOTE (v4 → v5): This version ADDS columns to existing
// sheets via getOrCreateSheet's additive-column logic. It does NOT
// delete or rename any existing column, so all current SOR items,
// users, and saved estimates are preserved untouched. New columns
// added to Estimates: estimateType, supplySpares, amcAmount,
// amcRemark, viewerVisible, progress (JSON: stages/financial/
// orderClosed/images), supplyTotal, projectTotal, omTotal,
// nonSorSupplyTotal, nonSorOmTotal. The legacy "sentForApproval"
// and "approvalRemarks" columns remain in the sheet (untouched, for
// safety) but are no longer read or written by this script — the
// 25-stage checklist replaces them, stored inside the "progress"
// JSON column. The TCodes/Processes sheets gain a "status" column
// (approved|pending) — existing rows have no value, treated as
// "approved" by getTCodes/getProcesses for backward compatibility.
// ═══════════════════════════════════════════════════════════════

var SS_NAME = "MSETCL Estimate Generator DB";

// ── PIN TO A SPECIFIC SPREADSHEET (recommended) ──────────────────
// Paste your existing/production spreadsheet's ID below to guarantee this
// script always uses that exact file, regardless of name or which Google
// account owns it relative to whoever deployed the script. Find the ID in
// the spreadsheet's URL: https://docs.google.com/spreadsheets/d/<THIS_PART>/edit
// Leave as "" to fall back to find-or-create-by-name (the old, fragile
// behavior — only safe if you're certain only one account/file is in play).
var FIXED_SS_ID = "";
var SHEET_SOR       = "SOR_Database";
var SHEET_ESTIMATES = "Estimates";
var SHEET_ITEMS     = "Estimate_Items";
var SHEET_USERS     = "Users";
var SHEET_NONSOR    = "NonSOR_Items";
var SHEET_TCODES    = "TCodes";
var SHEET_PROCESSES = "Processes";

var SOR_HDR    = ["item_no","description","uom","rate","section","version"];

// EST_HDR: additive — old columns kept in original order/position,
// new columns appended at the end so existing rows stay valid.
var EST_HDR    = ["id","name","number","date","division","ref","work",
                  "sorVersions","addCharge","settings","finalTotal",
                  "savedAt","status","itemCount","ownerId","ownerName",
                  "audited","sentForApproval","approvalRemarks",
                  "remark1","remark2","remark3","remark4","remark5",
                  "viewerVisible","estimateType","amcAmount","progressImages",
                  // ── new in v5 ──
                  "supplySpares","amcRemark","progress",
                  "supplyTotal","projectTotal","omTotal",
                  "nonSorSupplyTotal","nonSorOmTotal",
                  // ── new in v6 ──
                  "trLineMode","landCompChargePct","centagesOverridden",
                  // ── new in v7 ──
                  "pmoPrEntries"];

var ITEM_HDR   = ["estimate_id","item_no","version","description",
                  "uom","rate","qty","section","remarks","isCustom"];
var USER_HDR   = ["id","name","passHash","role","status","createdAt"];
var NONSOR_HDR = ["item_no","description","uom","rate","section","remarks","addedBy","addedAt"];
var TCODE_HDR  = ["tcode","purpose","description","remarks","addedBy","addedAt","status","image"];
var PROC_HDR   = ["name","description","remarks","addedBy","addedAt","status","image"];

// ── CORS helper ─────────────────────────────────────────────────
function cors(data) {
  return ContentService
    .createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}

// ── GET ────────────────────────────────────────────────────────
function doGet(e) {
  var action = (e && e.parameter && e.parameter.action) ? e.parameter.action : "ping";
  var result;
  try {
    if      (action === "ping")           result = ping();
    else if (action === "init")           result = initDB();
    else if (action === "getSOR")         result = getSOR(e.parameter.version || "");
    else if (action === "getSORVersions") result = getSORVersions();
    else if (action === "getEstimates")   result = getEstimates(e.parameter.userId||"", e.parameter.role||"");
    else if (action === "getEstimate")    result = getEstimate(e.parameter.id || "", e.parameter.userId||"", e.parameter.role||"");
    else if (action === "getUsers")       result = getUsers();
    else if (action === "getNonSOR")      result = getNonSOR();
    else if (action === "getTCodes")      result = getTCodes();
    else if (action === "getProcesses")   result = getProcesses();
    else if (action === "getChargeRates") result = getChargeRates();
    else if (action === "bootstrap")      result = bootstrap(e.parameter.userId||"", e.parameter.role||"");
    else result = {ok:false, error:"Unknown action: "+action};
  } catch(err) {
    result = {ok:false, error:err.toString(), stack: err.stack||""};
  }
  return cors(result);
}

// ── POST ───────────────────────────────────────────────────────
function doPost(e) {
  var result;
  try {
    var body = JSON.parse(e.postData.contents);
    var action = body.action || "";
    if      (action === "saveEstimate")    result = saveEstimate(body.estimate, body.items);
    else if (action === "deleteEstimate")  result = deleteEstimate(body.id, body.userId||"", body.role||"");
    else if (action === "importSOR")       result = importSOR(body.items, body.version);
    else if (action === "registerUser")    result = registerUser(body.user);
    else if (action === "loginUser")       result = loginUser(body.id, body.passHash);
    else if (action === "saveUser")        result = saveUser(body.user, body.actingRole||"");
    else if (action === "deleteUser")      result = deleteUser(body.id, body.actingRole||"");
    else if (action === "approveUser")     result = approveUser(body.id, body.approve, body.actingRole||"");
    else if (action === "changePassword")  result = changePassword(body.id, body.oldHash, body.newHash);
    else if (action === "addNonSOR")       result = addNonSOR(body.item);
    else if (action === "updateNonSOR")    result = updateNonSOR(body.item, body.actingRole||"");
    else if (action === "deleteNonSOR")    result = deleteNonSOR(body.item_no, body.actingRole||"");
    else if (action === "addTCode")        result = addTCode(body.item);
    else if (action === "updateTCode")     result = updateTCode(body.item, body.userId||"", body.role||"");
    else if (action === "deleteTCode")     result = deleteTCode(body.tcode, body.userId||"", body.role||"");
    else if (action === "addProcess")      result = addProcess(body.item);
    else if (action === "updateProcess")   result = updateProcess(body.item, body.userId||"", body.role||"");
    else if (action === "deleteProcess")   result = deleteProcess(body.name, body.userId||"", body.role||"");
    else if (action === "resetChargeRates")result = resetChargeRates();
    else if (action === "saveChargeRates") result = saveChargeRates(body.rates, body.actingRole||"");
    else if (action === "uploadEstimateImage") result = uploadEstimateImage(body.estimateId, body.estimateName, body.fileName, body.mimeType, body.base64Data);
    else if (action === "deleteEstimateImage") result = deleteEstimateImage(body.fileId);
    else if (action === "uploadTcpImage")  result = uploadTcpImage(body.kind, body.key, body.fileName, body.mimeType, body.base64Data);
    else result = {ok:false, error:"Unknown action: "+action};
  } catch(err) {
    result = {ok:false, error:err.toString()};
  }
  return cors(result);
}

// ── SPREADSHEET HELPERS ────────────────────────────────────────
function getOrCreateSS() {
  if (FIXED_SS_ID) {
    return SpreadsheetApp.openById(FIXED_SS_ID);
  }
  var files = DriveApp.getFilesByName(SS_NAME);
  if (files.hasNext()) return SpreadsheetApp.open(files.next());
  return SpreadsheetApp.create(SS_NAME);
}

// Additive: never removes/renames columns. Appends any missing
// trailing headers to existing sheets so old rows stay valid.
function getOrCreateSheet(ss, name, headers) {
  var sheet = ss.getSheetByName(name);
  if (!sheet) {
    sheet = ss.insertSheet(name);
    sheet.getRange(1, 1, 1, headers.length).setValues([headers]);
    sheet.setFrozenRows(1);
    sheet.getRange(1, 1, 1, headers.length)
         .setBackground("#0F2044")
         .setFontColor("#FFFFFF")
         .setFontWeight("bold");
  } else if (sheet.getLastColumn() < headers.length) {
    var curHeaders = sheet.getRange(1,1,1,sheet.getLastColumn()).getValues()[0];
    for (var i = curHeaders.length; i < headers.length; i++) {
      sheet.getRange(1, i+1).setValue(headers[i])
           .setBackground("#0F2044").setFontColor("#FFFFFF").setFontWeight("bold");
    }
  }
  return sheet;
}

function tryParse(val, def) {
  if (val === null || val === undefined || val === "") return def;
  try { return JSON.parse(val); } catch(e) { return def; }
}

// ── DRIVE IMAGE STORAGE ──────────────────────────────────────────
// Progress images and T-Code/Process images are stored as real Drive files
// (not base64-in-sheet) under a root folder, with one subfolder per
// estimate created lazily on first image upload for that estimate.
var DRIVE_ROOT_FOLDER_NAME = "MSETCL Estimate Generator - Images";

function getOrCreateDriveRootFolder_() {
  var folders = DriveApp.getFoldersByName(DRIVE_ROOT_FOLDER_NAME);
  if (folders.hasNext()) return folders.next();
  return DriveApp.createFolder(DRIVE_ROOT_FOLDER_NAME);
}
function getOrCreateEstimateFolder_(estimateId, estimateName) {
  var root = getOrCreateDriveRootFolder_();
  var folderName = estimateName ? (estimateName + " [" + estimateId + "]") : estimateId;
  var existing = root.getFoldersByName(folderName);
  if (existing.hasNext()) return existing.next();
  return root.createFolder(folderName);
}
function getOrCreateTcpFolder_() {
  var root = getOrCreateDriveRootFolder_();
  var name = "TCode_Process_Images";
  var existing = root.getFoldersByName(name);
  if (existing.hasNext()) return existing.next();
  return root.createFolder(name);
}

function uploadEstimateImage(estimateId, estimateName, fileName, mimeType, base64Data) {
  if (!estimateId) return {ok:false, error:"Missing estimate ID — save the estimate before adding images"};
  if (!base64Data) return {ok:false, error:"No image data received"};
  try {
    var folder = getOrCreateEstimateFolder_(estimateId, estimateName);
    var bytes = Utilities.base64Decode(base64Data);
    var blob = Utilities.newBlob(bytes, mimeType||"image/jpeg", fileName||("image_"+new Date().getTime()+".jpg"));
    var file = folder.createFile(blob);
    file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
    return {ok:true, fileId: file.getId(), url: "https://drive.google.com/uc?id="+file.getId(), viewUrl: file.getUrl()};
  } catch(err) {
    return {ok:false, error:"Drive upload failed: "+err.toString()};
  }
}
function deleteEstimateImage(fileId) {
  if (!fileId) return {ok:false, error:"Missing file ID"};
  try {
    DriveApp.getFileById(fileId).setTrashed(true);
    return {ok:true};
  } catch(err) {
    return {ok:false, error:"Delete failed: "+err.toString()};
  }
}
function uploadTcpImage(kind, key, fileName, mimeType, base64Data) {
  if (!key) return {ok:false, error:"Missing T Code / Process key"};
  if (!base64Data) return {ok:false, error:"No image data received"};
  try {
    var folder = getOrCreateTcpFolder_();
    var bytes = Utilities.base64Decode(base64Data);
    var blob = Utilities.newBlob(bytes, mimeType||"image/jpeg", fileName||((kind||"item")+"_"+key+".jpg"));
    var file = folder.createFile(blob);
    file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
    var url = "https://drive.google.com/uc?id="+file.getId();
    // Persist the URL directly onto the TCode/Process row
    var ss = getOrCreateSS();
    if (kind === "tcode") {
      var tSheet = getOrCreateSheet(ss, SHEET_TCODES, TCODE_HDR);
      var tRow = findTCodeRow_(tSheet, key);
      if (tRow > -1) tSheet.getRange(tRow, 8).setValue(url);
    } else {
      var pSheet = getOrCreateSheet(ss, SHEET_PROCESSES, PROC_HDR);
      var pRow = findProcessRow_(pSheet, key);
      if (pRow > -1) pSheet.getRange(pRow, 7).setValue(url);
    }
    return {ok:true, url: url, fileId: file.getId(), viewUrl: file.getUrl()};
  } catch(err) {
    return {ok:false, error:"Drive upload failed: "+err.toString()};
  }
}

// ── PING ───────────────────────────────────────────────────────
function ping() {
  try {
    var files = DriveApp.getFilesByName(SS_NAME);
    var exists = files.hasNext();
    var sorRows = 0, estRows = 0, ssUrl = "", ssId = "", ssName2 = SS_NAME;
    if (exists) {
      var ss = SpreadsheetApp.open(files.next());
      ssUrl  = ss.getUrl();
      ssId   = ss.getId();
      ssName2= ss.getName();
      var sorSheet = ss.getSheetByName(SHEET_SOR);
      var estSheet = ss.getSheetByName(SHEET_ESTIMATES);
      if (sorSheet) sorRows = Math.max(0, sorSheet.getLastRow() - 1);
      if (estSheet) estRows = Math.max(0, estSheet.getLastRow() - 1);
    }
    return {
      ok: true, ssExists: exists, ssId: ssId, ssUrl: ssUrl, ssName: ssName2,
      sorRows: sorRows, estRows: estRows, initialized: exists
    };
  } catch(err) {
    return {ok:false, error:err.toString()};
  }
}

// ── INIT ───────────────────────────────────────────────────────
function initDB() {
  var ss = getOrCreateSS();
  getOrCreateSheet(ss, SHEET_SOR,       SOR_HDR);
  getOrCreateSheet(ss, SHEET_ESTIMATES, EST_HDR);
  getOrCreateSheet(ss, SHEET_ITEMS,     ITEM_HDR);
  getOrCreateSheet(ss, SHEET_NONSOR,    NONSOR_HDR);
  getOrCreateSheet(ss, SHEET_TCODES,    TCODE_HDR);
  getOrCreateSheet(ss, SHEET_PROCESSES, PROC_HDR);
  var userSheet = getOrCreateSheet(ss, SHEET_USERS, USER_HDR);
  ensureSeedAdmin_(userSheet);
  var cfgSheet = ss.getSheetByName("Config");
  if (!cfgSheet) {
    cfgSheet = ss.insertSheet("Config");
    cfgSheet.getRange(1,1,1,2).setValues([["key","value"]]);
    cfgSheet.getRange(1,1,1,2).setBackground("#0F2044").setFontColor("#FFFFFF").setFontWeight("bold");
    cfgSheet.appendRow(["chargeRates", JSON.stringify(defaultChargeRates())]);
  }
  var def = ss.getSheetByName("Sheet1");
  if (def && ss.getSheets().length > 1) {
    try { ss.deleteSheet(def); } catch(e) {}
  }
  return {ok:true, ssUrl:ss.getUrl(), ssId:ss.getId(), message:"Initialized"};
}

function hashPassGS(p) {
  var h = 0;
  for (var i=0;i<p.length;i++){ h = ((h<<5)-h)+p.charCodeAt(i); h |= 0; }
  return 'h'+Math.abs(h).toString(36);
}

// ── CHARGE RATES (system defaults, admin-editable) ────────────
function defaultChargeRates() {
  return {additionalCharge:15, labourCess:1, freightInsurance:5, gst:18, pv:5, contingencies:3, centages:10};
}
function getConfigSheet_(ss) {
  var sheet = ss.getSheetByName("Config");
  if (!sheet) {
    sheet = ss.insertSheet("Config");
    sheet.getRange(1,1,1,2).setValues([["key","value"]]);
    sheet.getRange(1,1,1,2).setBackground("#0F2044").setFontColor("#FFFFFF").setFontWeight("bold");
  }
  return sheet;
}
// ── BOOTSTRAP — combines everything the frontend needs on app load into a
// single round trip (SOR versions, Non-SOR items, T-Codes, Processes,
// Estimates, charge rates, and — for admins — Users). Cuts boot latency
// from ~6-7 sequential/parallel Apps Script round trips down to one,
// since each individual getX() call still pays its own Apps Script
// execution overhead even when fired in parallel from the client.
function bootstrap(userId, role) {
  var sorV = getSORVersions();
  var nonSor = getNonSOR();
  var tcodes = getTCodes();
  var procs = getProcesses();
  var estimates = getEstimates(userId, role);
  var rates = getChargeRates();
  var result = {
    ok: true,
    sorVersions: sorV.ok ? sorV.versions : [],
    sorVersionCounts: sorV.ok ? sorV.counts : {},
    nonSor: nonSor.ok ? nonSor.items : [],
    tcodes: tcodes.ok ? tcodes.items : [],
    processes: procs.ok ? procs.items : [],
    estimates: estimates.ok ? estimates.estimates : [],
    chargeRates: rates.ok ? rates.rates : defaultChargeRates()
  };
  if (role === "admin") {
    var users = getUsers();
    result.users = users.ok ? users.users : [];
  }
  return result;
}

function getChargeRates() {
  var ss = getOrCreateSS();
  var sheet = getConfigSheet_(ss);
  var data = sheet.getLastRow() > 1 ? sheet.getRange(2,1,sheet.getLastRow()-1,2).getValues() : [];
  for (var i=0;i<data.length;i++) {
    if (data[i][0] === "chargeRates") return {ok:true, rates: tryParse(data[i][1], defaultChargeRates())};
  }
  sheet.appendRow(["chargeRates", JSON.stringify(defaultChargeRates())]);
  return {ok:true, rates: defaultChargeRates()};
}
function saveChargeRates(rates, actingRole) {
  if (actingRole !== "admin") return {ok:false, error:"Only admin can change system charge rates"};
  var ss = getOrCreateSS();
  var sheet = getConfigSheet_(ss);
  var data = sheet.getLastRow() > 1 ? sheet.getRange(2,1,sheet.getLastRow()-1,2).getValues() : [];
  for (var i=0;i<data.length;i++) {
    if (data[i][0] === "chargeRates") {
      sheet.getRange(i+2,2).setValue(JSON.stringify(rates));
      return {ok:true};
    }
  }
  sheet.appendRow(["chargeRates", JSON.stringify(rates)]);
  return {ok:true};
}
function resetChargeRates() {
  var ss = getOrCreateSS();
  var sheet = getConfigSheet_(ss);
  var data = sheet.getLastRow() > 1 ? sheet.getRange(2,1,sheet.getLastRow()-1,2).getValues() : [];
  var def = defaultChargeRates();
  for (var i=0;i<data.length;i++) {
    if (data[i][0] === "chargeRates") {
      sheet.getRange(i+2,2).setValue(JSON.stringify(def));
      return {ok:true, rates: def};
    }
  }
  sheet.appendRow(["chargeRates", JSON.stringify(def)]);
  return {ok:true, rates: def};
}

// ── SOR ────────────────────────────────────────────────────────
function getSOR(filterVersion) {
  var ss = getOrCreateSS();
  var sheet = ss.getSheetByName(SHEET_SOR);
  if (!sheet || sheet.getLastRow() < 2) return {ok:true, items:[], total:0};
  var data = sheet.getRange(2, 1, sheet.getLastRow()-1, SOR_HDR.length).getValues();
  var items = [];
  for (var i = 0; i < data.length; i++) {
    var r = data[i];
    if (!r[0] || String(r[0]).trim() === "") continue;
    if (filterVersion && String(r[5]).trim() !== filterVersion) continue;
    items.push({
      item_no:     String(r[0]).trim(),
      description: String(r[1]).trim(),
      uom:         String(r[2]).trim(),
      rate:        parseFloat(r[3]) || 0,
      section:     String(r[4]).trim(),
      version:     String(r[5]).trim()
    });
  }
  return {ok:true, items:items, total:items.length};
}

function getSORVersions() {
  var ss = getOrCreateSS();
  var sheet = ss.getSheetByName(SHEET_SOR);
  if (!sheet || sheet.getLastRow() < 2) return {ok:true, versions:[]};
  var data = sheet.getRange(2, 6, sheet.getLastRow()-1, 1).getValues();
  var seen = {}, counts = {}, versions = [];
  for (var i = 0; i < data.length; i++) {
    var v = String(data[i][0]).trim();
    if (!v) continue;
    if (!seen[v]) { seen[v]=true; versions.push(v); counts[v]=0; }
    counts[v]++;
  }
  versions.sort(); // lexicographic; caller resolves "latest" via [...].sort().pop()
  return {ok:true, versions:versions, counts:counts};
}

function importSOR(items, version) {
  if (!items || !items.length) return {ok:false, error:"No items"};
  var ss = getOrCreateSS();
  var sheet = getOrCreateSheet(ss, SHEET_SOR, SOR_HDR);
  var existing = {};
  if (sheet.getLastRow() > 1) {
    var ex = sheet.getRange(2, 1, sheet.getLastRow()-1, 6).getValues();
    for (var i = 0; i < ex.length; i++) {
      existing[String(ex[i][0]).trim()+"__"+String(ex[i][5]).trim()] = true;
    }
  }
  var toWrite = [];
  var versionsSeen = {};
  for (var j = 0; j < items.length; j++) {
    var item = items[j];
    // Per-row version (from an uploaded "version" column) takes priority;
    // falls back to the single version name supplied for the whole batch.
    var itemVersion = (item.version && String(item.version).trim()) || version;
    var key  = String(item.item_no).trim()+"__"+String(itemVersion).trim();
    if (!existing[key]) {
      toWrite.push([item.item_no, item.description, item.uom,
                    item.rate, item.section, itemVersion]);
      existing[key] = true;
    }
    versionsSeen[itemVersion] = (versionsSeen[itemVersion]||0) + 1;
  }
  if (toWrite.length > 0) {
    var bSize = 500;
    for (var b = 0; b < toWrite.length; b += bSize) {
      var batch = toWrite.slice(b, b+bSize);
      sheet.getRange(sheet.getLastRow()+1, 1, batch.length, SOR_HDR.length)
           .setValues(batch);
    }
  }
  return {
    ok:true, added: toWrite.length,
    skipped: items.length - toWrite.length,
    total:   sheet.getLastRow()-1,
    versions: Object.keys(versionsSeen)
  };
}

function getUsers() {

  if (!sheet || sheet.getLastRow() < 2) return {ok:true, users:[]};
  var data = sheet.getRange(2,1,sheet.getLastRow()-1,USER_HDR.length).getValues();

    var r = data[i];

    users.push({id:String(r[0]).trim(), name:String(r[1]).trim(), role:String(r[3]).trim(),
                status:String(r[4]).trim(), createdAt:String(r[5]).trim()});
  }
  return {ok:true, users:users};
}
function findUserRow_(sheet, id) {
  if (sheet.getLastRow() < 2) return -1;
  var data = sheet.getRange(2,1,sheet.getLastRow()-1,1).getValues();
  for (var i=0;i<data.length;i++) if (String(data[i][0]).trim()===String(id).trim()) return i+2;
  return -1;
}
function registerUser(user) {
  if (!user || !user.id || !user.passHash) return {ok:false, error:"Missing fields"};
  var ss = getOrCreateSS();
  var sheet = getOrCreateSheet(ss, SHEET_USERS, USER_HDR);
  ensureSeedAdmin_(sheet);
  if (findUserRow_(sheet, user.id) > -1) return {ok:false, error:"User ID already exists"};
  sheet.appendRow([user.id, user.name||user.id, user.passHash, "user", "pending", new Date().toISOString()]);
  return {ok:true, message:"Registered. Awaiting admin approval."};
}
function loginUser(id, passHash) {
  var ss = getOrCreateSS();
  var sheet = getOrCreateSheet(ss, SHEET_USERS, USER_HDR);
  ensureSeedAdmin_(sheet);
  var row = findUserRow_(sheet, id);
  if (row === -1) return {ok:false, error:"User not found"};
  var r = sheet.getRange(row,1,1,USER_HDR.length).getValues()[0];
  if (String(r[2]) !== String(passHash)) return {ok:false, error:"Incorrect password"};
  if (String(r[4]) === "pending") return {ok:false, error:"Account pending admin approval"};
  if (String(r[4]) === "rejected") return {ok:false, error:"Account access denied"};
  return {ok:true, user:{id:String(r[0]), name:String(r[1]), role:String(r[3]), status:String(r[4])}};
}
// Self-healing seed: if the Users sheet has no data rows at all (fresh
// deployment where /exec?action=init was never explicitly called), seed the
// default admin so the very first login never dead-ends. Only acts when the
// sheet is completely empty of data rows — never touches an existing one.
function ensureSeedAdmin_(userSheet) {
  if (userSheet.getLastRow() < 2) {
    userSheet.appendRow(["admin","Administrator",hashPassGS("admin123"),"admin","approved",new Date().toISOString()]);
  }
}
function changePassword(id, oldHash, newHash) {
  var ss = getOrCreateSS();
  var sheet = getOrCreateSheet(ss, SHEET_USERS, USER_HDR);
  var row = findUserRow_(sheet, id);
  if (row === -1) return {ok:false, error:"User not found"};
  var cur = sheet.getRange(row,3).getValue();
  if (String(cur) !== String(oldHash)) return {ok:false, error:"Current password incorrect"};
  sheet.getRange(row,3).setValue(newHash);
  return {ok:true};
}
function saveUser(user, actingRole) {
  if (actingRole !== "admin") return {ok:false, error:"Only admin can edit users"};
  var ss = getOrCreateSS();
  var sheet = getOrCreateSheet(ss, SHEET_USERS, USER_HDR);
  var row = findUserRow_(sheet, user.id);
  if (row === -1) return {ok:false, error:"User not found"};
  if (user.name)     sheet.getRange(row,2).setValue(user.name);
  if (user.role)      sheet.getRange(row,4).setValue(user.role);
  if (user.passHash)  sheet.getRange(row,3).setValue(user.passHash);
  if (user.status)    sheet.getRange(row,5).setValue(user.status);
  return {ok:true};
}
function approveUser(id, approve, actingRole) {
  if (actingRole !== "admin") return {ok:false, error:"Only admin can approve users"};
  var ss = getOrCreateSS();
  var sheet = getOrCreateSheet(ss, SHEET_USERS, USER_HDR);
  var row = findUserRow_(sheet, id);
  if (row === -1) return {ok:false, error:"User not found"};
  sheet.getRange(row,5).setValue(approve ? "approved" : "rejected");
  return {ok:true};
}
function deleteUser(id, actingRole) {
  if (actingRole !== "admin") return {ok:false, error:"Only admin can delete users"};
  if (id === "admin") return {ok:false, error:"Cannot delete the primary admin account"};
  var ss = getOrCreateSS();
  var sheet = getOrCreateSheet(ss, SHEET_USERS, USER_HDR);
  var row = findUserRow_(sheet, id);
  if (row === -1) return {ok:false, error:"User not found"};
  sheet.deleteRow(row);
  return {ok:true};
}

function getEstimates(userId, role) {
  var ss = getOrCreateSS();
  var sheet = ss.getSheetByName(SHEET_ESTIMATES);
  if (!sheet || sheet.getLastRow() < 2) return {ok:true, estimates:[]};
  var n = Math.max(EST_HDR.length, sheet.getLastColumn());
  var data = sheet.getRange(2,1,sheet.getLastRow()-1,n).getValues();
  var out = [];
  for (var i=0;i<data.length;i++) {
    var r = data[i];
    if (!r[0]) continue;
    var est = rowToEstimateSummary_(r);
    if (role === "admin") out.push(est);

    else { if (est.ownerId === userId) out.push(est); }
  }
  return {ok:true, estimates:out};

function getEstimate(id, userId, role) {
  var ss = getOrCreateSS();
  var sheet = ss.getSheetByName(SHEET_ESTIMATES);
  if (!sheet || sheet.getLastRow() < 2) return {ok:false, error:"Not found"};
  var n = Math.max(EST_HDR.length, sheet.getLastColumn());
  var data = sheet.getRange(2,1,sheet.getLastRow()-1,n).getValues();
  for (var i=0;i<data.length;i++) {

// ── hashPass: isolated behind a function so it can be swapped later ──
function hashPass(p) {
  let h = 0;
  for (let i=0;i<p.length;i++){ h = ((h<<5)-h)+p.charCodeAt(i); h |= 0; }
  return 'h'+Math.abs(h).toString(36);
}

// ── calcItem — mined verbatim from working reference implementation ──
// sec is the item's ACTUAL section (supply/project/om) - this determines the
// calculation formula. acKeyOverride lets non-SOR tabs use their own
// Additional Charge radio (nonsor_supply) while still using the 'supply' formula.
function calcItem(item, oe, acKeyOverride) {
  const sec=item.section, base=item.qty*item.rate;
  const ACp=oe.additionalCharge/100, LC=oe.labourCess/100, FI=oe.freightInsurance/100, GST=oe.gst/100;
  const acKey = acKeyOverride || sec;
  const useAC = ST.currentEstimate && ST.currentEstimate.addCharge && ST.currentEstimate.addCharge[acKey]==='yes';
  if (sec==='supply') {
    const ac=useAC?base*ACp:0, sAC=base+ac, lc=sAC*LC, sLC=sAC+lc, fi=sLC*FI, sFI=sLC+fi, gst=sFI*GST;
    return {base,ac,lc,fi,gst,total:sFI+gst};
  } else if (sec==='project') {
    const ac=useAC?base*ACp:0, sAC=base+ac, lc=sAC*LC, sLC=sAC+lc, gst=sLC*GST;
    return {base,ac,lc,fi:0,gst,total:sLC+gst};
  } else {
    const lc=base*LC, sLC=base+lc, gst=sLC*GST;
    return {base,ac:0,lc,fi:0,gst,total:sLC+gst};
  }
}

// ── toWords — mined verbatim: Indian numbering, includes paise ──
function toWords(n) {
  if (!n || n===0) return 'Zero';
  const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function tw(x){return x<20?ones[x]:tens[Math.floor(x/10)]+(x%10?' '+ones[x%10]:'');}
  function th(x){return x>=100?ones[Math.floor(x/100)]+' Hundred'+(x%100?' '+tw(x%100):''):tw(x);}
  const rupees=Math.floor(n);
  const paise=Math.round((n-rupees)*100);
  let r=rupees;
  const cr=Math.floor(r/1e7);r%=1e7;
  const lac=Math.floor(r/1e5);r%=1e5;
  const thou=Math.floor(r/1000);r%=1000;
  let w='';
  if (cr)   w+=th(cr)+' Crore ';
  if (lac)  w+=tw(lac)+' Lakh ';
  if (thou) w+=tw(thou)+' Thousand ';
  if (r)    w+=th(r);
  w=w.trim();
  if (paise>0) w+=' and '+tw(paise)+' Paise';
  return w||'Zero';
}

// ── Indian currency formatting ──
function fmtINR(n, decimals=2) {
  n = Number(n)||0;
  const neg = n<0; n = Math.abs(n);
  const fixed = n.toFixed(decimals);
  const parts = fixed.split('.');
  const intPart = parts[0], decPart = parts[1];
  let last3 = intPart.length>3 ? intPart.slice(-3) : intPart;
  let rest = intPart.length>3 ? intPart.slice(0,-3) : '';
  if (rest) rest = rest.replace(/\B(?=(\d{2})+(?!\d))/g, ',');
  const out = (rest ? rest+',' : '') + last3 + (decimals>0 ? '.'+decPart : '');
  return (neg?'-':'') + '₹' + out;
}
function fmtNum(n, decimals=2) {
  return Number(n||0).toLocaleString('en-IN', {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
}

// ── Latest version resolution ──
// Plain lexicographic sort fails for human-readable versions containing month
// names (e.g. "SOR_June_2026" sorts before "SOR_March_2026" alphabetically,
// even though June is chronologically later). We extract a trailing year and
// a recognizable month name/number where present and sort on that; if no
// date-like pattern is found anywhere in the version strings, we fall back
// to plain lexicographic sort as a safe default.
const MONTH_INDEX = {jan:1,january:1,feb:2,february:2,mar:3,march:3,apr:4,april:4,may:5,jun:6,june:6,
  jul:7,july:7,aug:8,august:8,sep:9,sept:9,september:9,oct:10,october:10,nov:11,november:11,dec:12,december:12};
function versionSortKey(v) {
  const s = String(v).toLowerCase();
  const yearMatch = s.match(/(20\d{2})/);
  const year = yearMatch ? parseInt(yearMatch[1]) : 0;
  let month = 0;
  for (const name in MONTH_INDEX) {
    if (s.includes(name)) { month = Math.max(month, MONTH_INDEX[name]); }
  }
  return year*100 + month;
}
function resolveLatestVersion(versions) {
  if (!versions || !versions.length) return null;
  const hasDateInfo = versions.some(v => versionSortKey(v) > 0);
  if (hasDateInfo) {
    return [...versions].sort((a,b) => versionSortKey(a)-versionSortKey(b)).pop();
  }
  // Fallback: proper lexicographic sort (not insertion order)
  return [...versions].sort().pop();
}

// ── Shared image compression — re-encodes via canvas at reduced quality/
// dimensions to cut file size roughly in half before upload. Used by every
// image upload path in the app (progress images, T-Code/Process images). ──
function compressImageFile(file, quality=0.5, maxDim=1600) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read the image file'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not decode the image file'));
      img.onload = () => {
        let {width, height} = img;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width*scale); height = Math.round(height*scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve({dataUrl, base64: dataUrl.split(',')[1], mimeType: 'image/jpeg'});
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function enterApp() {
  renderAppShell();
  showPageLoading();
  try {
    // Single round trip instead of 6-7 parallel calls — each Apps Script
    // call pays its own execution overhead even when fired concurrently,
    // so combining them into one request is the bigger win for boot speed.
    const boot = await api('bootstrap', {userId: ST.user.id, role: ST.user.role});
    if (!boot.ok) throw new Error(boot.error || 'Failed to load app data');

    ST.sorVersions = boot.sorVersions||[];
    ST.sorVersionCounts = boot.sorVersionCounts||{};
    ST.nonSorCache = boot.nonSor||[];
    ST.tcodesCache = boot.tcodes||[];
    ST.processesCache = boot.processes||[];
    ST.estimatesCache = boot.estimates||[];
    ST.chargeRates = boot.chargeRates || ST.chargeRates;
    if (isAdmin() && boot.users) ST.usersCache = boot.users;

    // Load default (latest) SOR version's items for immediate usability;
    // remaining versions load lazily via requestIdleCallback.
    const latest = resolveLatestVersion(ST.sorVersions);
    if (latest) {
      const sorRes = await api('getSOR', {version: latest});
      if (sorRes.ok) ST.sorCache = sorRes.items||[];
    }
    prefetchRemainingSOR();

    ST.bootDone = true;
    navigateTo('dashboard');
  } catch(e) {
    toast('Failed to load app data: '+e.message, 'err', 6000);
    document.getElementById('main-content').innerHTML = `
      <div class="empty-state">
        <div class="ic">⚠️</div>
        <h3>Could not connect to the backend</h3>
        <p class="text-sm mt-1">${escapeHtml(e.message)}</p>
        <button class="btn btn-primary mt-2" onclick="enterApp()">Retry</button>
      </div>`;
  }
}

function prefetchRemainingSOR() {
  const idle = window.requestIdleCallback || function(fn){ return setTimeout(fn, 400); };
  idle(async () => {
    const latest = resolveLatestVersion(ST.sorVersions);
    const others = ST.sorVersions.filter(v=>v!==latest);
    for (const v of others) {
      try {
        const res = await api('getSOR', {version: v});
        if (res.ok) ST.sorCache = ST.sorCache.concat(res.items||[]);
      } catch(e) { /* non-critical background prefetch */ }
    }
  });
}

async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display='none';
  if (!id || !pass) { errEl.textContent='Please enter both User ID and Password.'; errEl.style.display='block'; return; }
  const btn = event && event.target && event.target.tagName==='BUTTON' ? event.target : document.querySelector('#login-form .btn-gold');
  const origText = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span> Logging in…'; btn.disabled = true;
  try {
    const passHash = hashPass(pass);
    const res = await apiPost({action:'loginUser', id, passHash});
    if (!res.ok) { errEl.textContent = res.error||'Login failed.'; errEl.style.display='block'; return; }
    ST.user = res.user;
    const stay = document.getElementById('stay-toggle').classList.contains('on');
    if (stay) localStorage.setItem(TOKEN_KEY, JSON.stringify({id, passHash}));
    toast(`Welcome back, ${res.user.name}`, 'ok');
    await enterApp();
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display='block';
  } finally {
    btn.innerHTML = origText; btn.disabled = false;
  }
}

// ── Shared save-button status pattern: button shows a spinner while the
// async action runs, then a brief checkmark, then reverts — paired with a
// toast from the corner. Used by every Save button in the app. ──
async function withSaveStatus(btn, asyncFn, savedMessage='Saved') {
  if (!btn) { await asyncFn(); return; }
  const origHtml = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';
  try {
    const result = await asyncFn();
    if (result !== false) {
      btn.innerHTML = '✓ Saved';
      toast(savedMessage, 'ok');
      setTimeout(()=>{ btn.innerHTML = origHtml; btn.disabled = false; }, 1100);
    } else {
      btn.innerHTML = origHtml; btn.disabled = false;
    }
  } catch(e) {
    btn.innerHTML = origHtml; btn.disabled = false;
    toast(e.message||'Save failed', 'err');
  }
}

// ── Export All: uses precomputed totals stored on each estimate (Section 11 approach (a)) ──
// ── Shared Proposal Progress data filter — used by both Excel and PDF,
// for both the per-estimate export and the dashboard "Export All". Only
// surfaces data that was actually entered: completed stages WITH remarks
// or a link, bills from "Bill 1" onward only if they have a remark, Order
// Closed only if true (with its comment), and only non-empty General
// Remarks. This is the single source of truth for "what counts as
// entered data" so PDF and Excel never drift apart. ──
function buildProgressExportData(est) {
  const progress = est.progress || {stages:{}, woAmount:0, bills:[], orderClosed:false, orderClosedRemarks:'', orderDetails:{}};
  const stages = progress.stages || {};

  // Stages 1-15 (pre-billing): show if done OR has remarks/link entered.
  // Stages 16-25 (Bill 1..10 Recorded): show ONLY if a remark was entered.
  const stageRows = [];
  for (let i=1;i<=25;i++) {
    const s = stages[i] || {done:false, remarks:'', link:''};
    const isBillStage = i>=16;
    const hasContent = isBillStage ? !!(s.remarks && s.remarks.trim()) : (s.done || (s.remarks && s.remarks.trim()) || (s.link && s.link.trim()));
    if (hasContent) {
      stageRows.push({num:i, name: PROPOSAL_STAGE_NAMES[i-1], done: !!s.done, remarks: s.remarks||'', link: s.link||''});
    }
  }

  const bills = (progress.bills||[]).filter(b=>b.label||b.amount||b.remarks);
  const totalBills = bills.reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
  const available = (progress.woAmount||0) - totalBills;

  const remarks = [est.remark1, est.remark2, est.remark3, est.remark4, est.remark5].filter(r=>r && r.trim());

  // Abstract rows (type-specific, matches the live Abstract tab's Sr.1-9 / Sub Total A / AMC rules)
  const abstractRows = buildEstimateAbstractRows(est);

  // Order Related Details — only fields the user actually filled in
  const od = progress.orderDetails || {};
  const odLabels = {
    adminApprovalNo:'Admin Approval Number', adminApprovalDate:'Admin Approval Date',
    expenseBookingFY:'Expense Booking FY', tenderNo:'Tender No.',
    particularsOfWork:'Particulars of Work', msetclEstimatedCost:'MSETCL Estimated Cost',
    rfxNo:'RFx No.', nameOfOffice:'Name of Office', noOfBidsReceived:'No. of Bids Received',
    l1Rates:'L-1 Rates', vendorName:'Vendor Name', vendorCode:'Vendor Code / Details',
    loiNo:'LOI No.', loiDate:'LOI Date',
    woNo:'Work Order No.', woDate:'Work Order Date', poNo:'PO No.', poDate:'PO Date', woRemarks:'WO Remarks',
    stampDutyPaid:'Stamp Duty Paid', stampNo:'Stamp No.', stampDate:'Stamp Date', stampRemarks:'Stamp Remarks',
    sdBgNo:'SD / BG No.', nameOfBank:'Name of Bank', sdBgOtherDetails:'SD/BG Other Details',
    preparedBy:'Progress Prepared By'
  };
  const orderDetailsRows = Object.keys(odLabels)
    .filter(k => od[k] !== undefined && od[k] !== null && String(od[k]).trim() !== '')
    .map(k => [odLabels[k], od[k]]);

  return {
    finalTotal: est.estimateType==='amc' ? (est.amcAmount||0) : (est.finalTotal||0),
    abstractRows,
    audited: !!est.audited,
    stageRows,
    orderDetailsRows,
    woAmount: progress.woAmount||0,
    bills, totalBills, available,
    orderClosed: !!progress.orderClosed,
    orderClosedRemarks: progress.orderClosedRemarks||'',
    remarks,
    images: est.progressImages||[]
  };
}

// ── Type-specific abstract rows for export (Sr.1-9 / Sub Total A only / AMC manual amount) ──
function buildEstimateAbstractRows(est) {
  if (est.estimateType === 'amc') {
    return [
      ['AMC Amount Limit', fmtINR(est.amcAmount||0)],
      ['AMC Remark', est.amcRemark||'—']
    ];
  }
  const nonSorSupply = est.nonSorSupplyTotal||0, nonSorOm = est.nonSorOmTotal||0;
  const supply = (est.supplyTotal||0) + nonSorSupply;
  const project = est.projectTotal||0;
  const om = (est.omTotal||0) + nonSorOm;
  const subA = supply+project+om;
  const rows = [
    ['Sr.1 Cost of Material (Supply Portion)', fmtINR(supply)],
    ['Sr.2 Cost of Work – Project Services (ETC Part)', fmtINR(project)],
    ['Sr.3 Cost of Work – O&M Services', fmtINR(om)],
    ['Sr.4 Sub Total "A" (1+2+3)', fmtINR(subA)],
  ];
  if (est.estimateType === 'rm') {
    rows.push(['TOTAL ESTIMATED COST', fmtINR(subA)]);
    return rows;
  }
  const settings = {...ST.chargeRates, ...(est.settings || {})};
  const pv = subA*(settings.pv||0)/100;
  const cont = subA*(settings.contingencies||0)/100;
  let sr7 = subA+pv+cont;
  rows.push(['Sr.5 Price Variation', fmtINR(pv)]);
  rows.push(['Sr.6 Contingencies', fmtINR(cont)]);
  if (est.trLineMode) {
    const landComp = sr7*(est.landCompChargePct||15)/100;
    sr7 += landComp;
    rows.push([`Land & Compensation Charges @ ${est.landCompChargePct||15}%`, fmtINR(landComp)]);
  }
  const centages = sr7*(settings.centages||0)/100;
  const total = sr7+centages;
  rows.push(['Sr.7 Total w/o Centages', fmtINR(sr7)]);
  rows.push(['Sr.8 Centages (Supervision)', fmtINR(centages)]);
  rows.push(['Sr.9 TOTAL ESTIMATED COST WITH CENTAGES', fmtINR(total)]);
  return rows;
}

async function exportAllExcel() {
  const list = visibleEstimates();
  if (!list.length) { toast('No estimates to export', 'warn'); return; }
  toast('Building Excel export…', 'ok', 2000);
  const XLSXmod = await ensureSheetJS();
  const wb = XLSXmod.utils.book_new();

  const summaryRows = [['Sr.','Name','Number','Division','Type','Status','Final Total','Audited','Order Closed']];
  list.forEach((e,idx)=>{
    summaryRows.push([idx+1, e.name, e.number, e.division, estimateTypeLabel(e.estimateType), e.status,
      e.estimateType==='amc'?e.amcAmount:e.finalTotal, e.audited?'Yes':'No',
      (e.progress&&e.progress.orderClosed)?'Yes':'No']);
  });
  const wsSummary = XLSXmod.utils.aoa_to_sheet(summaryRows);
  applySmartColWidths(wsSummary, summaryRows);
  XLSXmod.utils.book_append_sheet(wb, wsSummary, 'Summary');

  list.forEach((e, idx)=>{
    const pd = buildProgressExportData(e);
    const rows = [];
    const styleMap = {};
    let r = 0;
    const addSection = (title) => { rows.push([title]); styleMap[r]='section'; r++; };
    const addHeader = (cols) => { rows.push(cols); styleMap[r]='header'; r++; };
    const addRow = (cols) => { rows.push(cols); r++; };
    const addTotal = (cols) => { rows.push(cols); styleMap[r]='total'; r++; };
    const blank = () => { rows.push(['']); r++; };

    addSection(`${idx+1}. ${e.name}${e.number?' ('+e.number+')':''}`);
    addRow(['Division', e.division||'—']);
    addRow(['Type', estimateTypeLabel(e.estimateType)]);
    addRow(['Status', e.status]);
    blank();

    // 1. Abstract
    addSection('Abstract');
    pd.abstractRows.forEach(row => {
      if (/^(Sr\.9|TOTAL ESTIMATED)/.test(row[0])) addTotal(row); else addRow(row);
    });
    blank();

    // 2. Proposal Progress
    addSection('Proposal Progress');
    addRow(['Audited', pd.audited ? 'Yes' : 'No']);
    if (pd.stageRows.length) {
      blank();
      addHeader(['Stage','Done','Remarks','Link']);
      pd.stageRows.forEach(s => { addRow([`${s.num}. ${s.name}`, s.done?'Yes':'No', s.remarks, s.link]); if (s.done) styleMap[r-1]='done'; });
    }
    blank();

    // 3. Order Related Details (new section)
    if (pd.orderDetailsRows.length) {
      addSection('Order Related Details');
      pd.orderDetailsRows.forEach(row => addRow(row));
      blank();
    }

    // 4. Financial Tracking (same order as webpage: WO amount top, bills chronological, available balance)
    if (pd.woAmount || pd.bills.length) {
      addSection('Financial Tracking');
      addRow(['WO / PO Amount', fmtINR(pd.woAmount)]);
      if (pd.bills.length) {
        blank();
        addHeader(['Bill','Amount','Remarks']);
        pd.bills.forEach(b => addRow([b.label||'', fmtINR(parseFloat(b.amount)||0), b.remarks||'']));
      }
      addTotal(['Available Amount', fmtINR(pd.available)]);
      blank();
    }

    // 5. Order Closed
    if (pd.orderClosed) {
      addSection('Order Closed');
      addRow(['Status', 'Yes']);
      addRow(['Comment', pd.orderClosedRemarks||'—']);
      blank();
    }

    if (pd.remarks.length) {
      addSection('General Remarks');
      pd.remarks.forEach(rm => addRow([rm]));
      blank();
    }
    if (pd.images.length) {
      addSection('Progress Images (captions)');
      addRow([pd.images.map(im=>im.caption).filter(Boolean).join(' | ')||`${pd.images.length} image(s) — see PDF for images`]);
    }

    const sheetName = sanitizeSheetName(`${idx+1}_${e.name}`);
    const ws = XLSXmod.utils.aoa_to_sheet(rows);
    applySmartColWidths(ws, rows);
    applyRowStyles(ws, styleMap, Math.max(...rows.map(rr=>rr.length), 4));
    XLSXmod.utils.book_append_sheet(wb, ws, sheetName);
  });

  XLSXmod.writeFile(wb, `MSETCL_All_Estimates_${todayISO()}.xlsx`);
  toast('Excel export ready', 'ok');
}

function sanitizeSheetName(name) {
  return String(name).replace(/[\\\/\?\*\[\]:]/g,'').slice(0,31) || 'Sheet';
}

// ── SHARED smart column-width helper — used by every Excel sheet in the app ──
function applySmartColWidths(ws, rows) {
  const colCount = Math.max(...rows.map(r=>r.length));
  const widths = [];
  for (let c=0;c<colCount;c++) {
    let maxLen = 8;
    rows.forEach(r=>{ const v = r[c]; if (v!==undefined && v!==null) maxLen = Math.max(maxLen, String(v).length); });
    widths.push({wch: Math.min(60, Math.max(8, Math.round(maxLen*1.15)+2))});
  }
  ws['!cols'] = widths;
}

// ── SHARED Excel cell-styling helper — navy/gold theme matching the app,
// applied consistently across every export sheet. Row-level styling is
// supplied via a `styleMap` of {rowIndex: 'header'|'section'|'total'|'subtle'}.
const XLSX_STYLES = {
  header:  { font:{bold:true, color:{rgb:'FFFFFF'}, sz:11}, fill:{fgColor:{rgb:'0F2044'}}, alignment:{vertical:'center'} },
  section: { font:{bold:true, color:{rgb:'FFFFFF'}, sz:12}, fill:{fgColor:{rgb:'152A52'}}, alignment:{vertical:'center'} },
  total:   { font:{bold:true, color:{rgb:'7A4E0E'}, sz:11}, fill:{fgColor:{rgb:'FDF3E0'}}, alignment:{vertical:'center'} },
  subtotal:{ font:{bold:true, color:{rgb:'0F2044'}}, fill:{fgColor:{rgb:'EFF4FF'}}, alignment:{vertical:'center'} },
  subtle:  { font:{italic:true, color:{rgb:'5C6987'}, sz:9} },
  done:    { fill:{fgColor:{rgb:'E3F6EC'}} },
};
function applyRowStyles(ws, styleMap, colCount) {
  Object.keys(styleMap).forEach(rowIdxStr => {
    const rowIdx = parseInt(rowIdxStr);
    const styleKey = styleMap[rowIdxStr];
    const style = XLSX_STYLES[styleKey];
    if (!style) return;
    for (let c=0; c<colCount; c++) {
      const addr = XLSX.utils.encode_cell({r:rowIdx, c});
      if (!ws[addr]) ws[addr] = {t:'s', v:''};
      ws[addr].s = style;
    }
  });
}
function setRowHeight(ws, rowIdx, pts) {
  ws['!rows'] = ws['!rows'] || [];
  ws['!rows'][rowIdx] = {hpt: pts};
}

let _sheetJSPromise = null;
function ensureSheetJS() {
  if (window.XLSX) return Promise.resolve(window.XLSX);
  if (_sheetJSPromise) return _sheetJSPromise;
  _sheetJSPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = () => resolve(window.XLSX);
    s.onerror = reject;
    document.head.appendChild(s);
  });
  return _sheetJSPromise;
}

// ── SHARED PRINT HELPER — used by every PDF export in the app ──
// Root cause of "blank PDF" bug: calling window.print() then synchronously
// clearing the print container races the browser's render/capture.
// Fix: visibility-based isolation + cleanup ONLY on 'afterprint', with a
// generous fallback timeout (not used to drive normal cleanup).
let _printStyleEl = null;
function doPrintAndCleanup(printRoot) {
  document.body.appendChild(printRoot);
  if (!_printStyleEl) {
    _printStyleEl = document.createElement('style');
    _printStyleEl.id = 'print-isolation-style';
    document.head.appendChild(_printStyleEl);
  }
  // @page lives in the GLOBAL stylesheet (not just each export's inline
  // <style>) so it's guaranteed present regardless of how PRINT_ROOT's own
  // markup is built. Many mobile browsers (iOS Safari, Chrome Android)
  // ignore `@page { size: landscape }` entirely when generating a PDF via
  // the share sheet, defaulting to portrait — as a fallback for those
  // browsers, PRINT_ROOT is also explicitly given a wide, landscape-shaped
  // pixel width or 1100px in print media, which most mobile print engines
  // respect even when they ignore the page-size hint, by scaling the wide
  // content down to fit rather than reflowing it into a narrow portrait
  // column.
  _printStyleEl.textContent = `
    @page { size: A4 landscape !important; margin: 8mm 10mm; }
    @media print {
      * { visibility: hidden !important; }
      #PRINT_ROOT, #PRINT_ROOT * { visibility: visible !important; }
      #PRINT_ROOT {
        position: absolute !important; left:0; top:0;
        width: 1100px !important; max-width: none !important;
        transform-origin: top left;
      }
      html, body { width: 1100px !important; }
    }
  `;
  let cleaned = false;
  const cleanup = () => {
    if (cleaned) return;
    cleaned = true;
    if (printRoot && printRoot.parentNode) printRoot.parentNode.removeChild(printRoot);
    window.removeEventListener('afterprint', cleanup);
  };
  window.addEventListener('afterprint', cleanup);
  setTimeout(cleanup, 75000); // generous fallback only, does not race the dialog
  setTimeout(() => window.print(), 60); // let DOM paint before invoking print
}

        <span class="opt-label">Non-SOR Items <span class="badge badge-info" style="margin-left:6px">Custom</span></span>
        <span class="opt-count">${ST.nonSorCache.length.toLocaleString('en-IN')}</span>
      </label>
    </div>
  `;
}
function onVersionCheckboxChange(containerId, onChangeFn) {
  // sync the visual "checked" class on the wrapping label, then re-filter
  document.querySelectorAll(`#${containerId} .check-option`).forEach(opt=>{
    const cb = opt.querySelector('input[type=checkbox]');
    opt.classList.toggle('checked', cb.checked);
  });
  if (window[onChangeFn]) window[onChangeFn](getCheckedVersions(containerId));
}
function getCheckedVersions(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} input[type=checkbox]:checked`))
    .map(cb => cb.closest('.check-option').dataset.version);
}
function versionSelectAll(containerId, onChangeFn) {
  document.querySelectorAll(`#${containerId} input[type=checkbox]`).forEach(cb=>{ cb.checked = true; cb.closest('.check-option').classList.add('checked'); });
  if (window[onChangeFn]) window[onChangeFn](getCheckedVersions(containerId));
}
function versionSelectLatest(containerId, onChangeFn) {
  const latest = resolveLatestVersion(ST.sorVersions);
  document.querySelectorAll(`#${containerId} input[type=checkbox]`).forEach(cb=>{
    const v = cb.closest('.check-option').dataset.version;
    const on = v===latest;
    cb.checked = on; cb.closest('.check-option').classList.toggle('checked', on);
  });
  if (window[onChangeFn]) window[onChangeFn](getCheckedVersions(containerId));
}

function renderAIResults() {
  const body = document.getElementById('ai-results-body');
  if (!body) return;
  let items = allSelectableItems().filter(it => AI.checkedVersions.includes(it.version));
  if (AI.category !== 'all') items = items.filter(it => aiItemCategory(it) === AI.category);
  if (AI.search) {
    items = items.filter(it =>
      it.item_no.toLowerCase().includes(AI.search) || it.description.toLowerCase().includes(AI.search));
  }
  const totalPages = Math.max(1, Math.ceil(items.length/AI.pageSize));
  AI.page = Math.min(AI.page, totalPages);
  const start = (AI.page-1)*AI.pageSize;
  const shown = items.slice(start, start+AI.pageSize);
  if (!shown.length) {
    body.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="ic">🔍</div>No items match your filters.</div></td></tr>`;
  } else {
    body.innerHTML = shown.map(it => {
      const key = it.item_no+'__'+it.version;
      const isChecked = !!AI.selected[key];
      const isNonSor = it.version === 'NONSOR';
      return `
        <tr class="${isChecked?'ai-row-selected':''}" data-key="${escapeHtml(key)}">
          <td><input type="checkbox" ${isChecked?'checked':''} onchange="onAICheckboxToggle(this,'${key.replace(/'/g,"\\'")}')"></td>
          <td class="mono">${escapeHtml(it.item_no)}</td>
          <td>${escapeHtml(it.description)} ${isNonSor ? `<span class="badge ${it.section==='supply'?'badge-info':'badge-ok'}" style="margin-left:6px">Non-SOR ${it.section==='supply'?'Material':'Service'}</span>` : ''}</td>
