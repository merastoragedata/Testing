function sectionSheetRows(key) {
  const cfg = sectionConfig(key);
  const rates = effectiveRates();
  const headers = ['Item No.','Description','UOM','Rate','Qty','Base'];
  if (cfg.hasAC) headers.push('Add. Charge');
  headers.push('Labour Cess');
  if (cfg.hasFI) headers.push('F&I');
  headers.push('GST','Total');
  const rows = [headers];
  cfg.items.forEach(it=>{
    const c = calcItem(it, rates, cfg.acKey);
    const row = [it.item_no, it.description, it.uom, it.rate, it.qty, c.base];
    if (cfg.hasAC) row.push(c.ac);
    row.push(c.lc);
    if (cfg.hasFI) row.push(c.fi);
    row.push(c.gst, c.total);
    rows.push(row);
  });
  if (ST.currentEstimate.estimateType !== 'amc') {
    const t = sectionTotalsCalc(key);
    const totalRow = new Array(headers.length).fill('');
    totalRow[1] = t.spares ? `${cfg.title} Total (incl. Spares)` : `${cfg.title} Total`;
    totalRow[headers.length-1] = t.total;
    if (t.spares) {
      const sparesRow = new Array(headers.length).fill('');
      sparesRow[1] = 'Supply Spares @ 3%'; sparesRow[headers.length-1] = t.spares;
      rows.push(sparesRow);
    }
    rows.push(totalRow);
  }
  return rows;
}

function abstractSheetRows() {
  const e = ST.currentEstimate;
  if (e.estimateType === 'amc') {
    const counts = {
      'Supply Material': ST.currentItems.filter(it=>!it.isCustom && it.section==='supply').length,
      'Project Services': ST.currentItems.filter(it=>!it.isCustom && it.section==='project').length,
      'O&M Services': ST.currentItems.filter(it=>!it.isCustom && it.section==='om').length,
      'Non-SOR Materials': ST.currentItems.filter(it=>it.isCustom && it.section==='supply').length,
      'Non-SOR Services': ST.currentItems.filter(it=>it.isCustom && it.section==='om').length,
    };
    const rows = [['AMC ABSTRACT','']];
    Object.keys(counts).forEach(k=>rows.push([k+' (items)', counts[k]]));
    rows.push(['', '']);
    rows.push(['AMC Amount Limit', e.amcAmount||0]);
    rows.push(['Amount in Words', toWords(e.amcAmount||0)+' Rupees Only']);
    rows.push(['AMC Remark', e.amcRemark||'']);
    return rows;
  }
  const totals = computeAllSectionTotals();
  const supply = totals.supply+totals.nonSorSupply, project = totals.project, om = totals.om+totals.nonSorOm;
  const subA = supply+project+om;
  const rows = [
    ['Sr.','Particulars','Amount (₹)'],
    [1,'Cost of Material (Supply Portion)', supply],
    [2,'Cost of Work – Project Services (ETC Part)', project],
    [3,'Cost of Work – O&M Services', om],
    [4,'Sub Total "A" (1+2+3)', subA],
  ];
  if (e.estimateType === 'rm') {
    rows.push(['','TOTAL ESTIMATED COST', subA]);
  } else {
    const rates = effectiveRates();
    const pv = subA*(rates.pv||0)/100, cont = subA*(rates.contingencies||0)/100;
    const sr7 = subA+pv+cont, centages = sr7*(rates.centages||0)/100, total = sr7+centages;
    rows.push([5,'Price Variation', pv], [6,'Contingencies', cont], [7,'Total w/o Centages', sr7],
               [8,'Centages (Supervision)', centages], [9,'TOTAL ESTIMATED COST WITH CENTAGES', total]);
  }
  rows.push(['','Amount in Words', toWords(e.finalTotal)+' Rupees Only']);
  return rows;
}

    #PRINT_ROOT h2{ background:#0F2044; color:#fff; padding:8px 12px; margin:0 0 8px; font-size:14px; }

    #PRINT_ROOT td.num{ text-align:right; font-variant-numeric:tabular-nums; }

// ── SHARED smart column-width helper for PDF tables ──
// roughly: item-number ~11%, description ~30%, UOM ~5%, qty ~6%,
// numeric/charge columns ~7% each, remarks ~18-22% — verified to sum ≤100%.
function smartPdfColWidths(headers) {
  const widths = headers.map(h=>{
    const hl = String(h).toLowerCase();
    if (hl.includes('item no')) return 11;
    if (hl.includes('description')) return 30;
    if (hl.includes('uom')) return 5;
    if (hl.includes('qty')) return 6;
    if (hl.includes('remarks')) return 18;
    return 7; // numeric/charge columns
  });
  const sum = widths.reduce((a,b)=>a+b,0);
  if (sum > 100) return widths.map(w=>+(w*100/sum).toFixed(1));
  const descIdx = headers.findIndex(h=>String(h).toLowerCase().includes('description'));
  if (sum < 100 && descIdx>-1) widths[descIdx] += (100-sum);
  return widths;
}

function tcpRowActions(kind, key, addedBy, status) {
  const canModify = isAdmin() || addedBy===ST.user.id;
  const safeKey = escapeHtml(key).replace(/'/g,"\\'");
  let html = '';
  if (canModify) html += `<button class="btn btn-ghost btn-sm" onclick="${kind==='tcode'?'openTCodeModal':'openProcessModal'}('${safeKey}')">Edit</button> `;
  if (canModify) html += `<button class="btn btn-danger btn-sm" onclick="deleteTCPEntry('${kind}','${safeKey}')">Delete</button> `;
  if (isAdmin() && status==='pending') html += `<button class="btn btn-primary btn-sm" onclick="approveTCPEntry('${kind}','${safeKey}')">Approve</button>`;
  return html;
}

    <div id="tc-error" class="error-text" style="display:none"></div>
    <button class="btn btn-gold btn-block mt-1" onclick="submitTCode(${item?`'${origTcode.replace(/'/g,"\\'")}'`:'null'})">${item?'Save Changes':'Add T Code'}</button>

async function submitTCode(origTcode) {
  const tcode = document.getElementById('tc-code').value.trim();
  const purpose = document.getElementById('tc-purpose').value.trim();
  const description = document.getElementById('tc-desc').value.trim();
  const remarks = document.getElementById('tc-remarks').value.trim();
  const err = document.getElementById('tc-error');
  err.style.display='none';
  if (!tcode) { err.textContent='T Code is required.'; err.style.display='block'; return; }
  try {
    let res;
    if (origTcode) {
      res = await apiPost({action:'updateTCode', item:{tcode, origTcode, purpose, description, remarks}, userId:ST.user.id, role:ST.user.role});
    } else {
      res = await apiPost({action:'addTCode', item:{tcode, purpose, description, remarks, addedBy:ST.user.id, addedByRole:ST.user.role}});
    }
    if (!res.ok) { err.textContent = res.error||'Failed.'; err.style.display='block'; return; }
    await refreshTCP();
    closeModal();
    toast(origTcode?'T Code updated.':(isViewer()?'Submitted for admin approval.':'T Code added.'), 'ok');
  } catch(e) { err.textContent = e.message; err.style.display='block'; }
}

function openProcessModal(origName=null) {
  const item = origName ? ST.processesCache.find(p=>p.name===origName) : null;

async function submitProcess(origName) {

async function deleteTCPEntry(kind, key) {
  try {
    const res = kind==='tcode'
      ? await apiPost({action:'deleteTCode', tcode:key, userId:ST.user.id, role:ST.user.role})
      : await apiPost({action:'deleteProcess', name:key, userId:ST.user.id, role:ST.user.role});
    if (!res.ok) { toast(res.error||'Delete failed', 'err'); return; }
    await refreshTCP();
    toast('Deleted.', 'ok');
  } catch(e) { toast(e.message, 'err'); }
}
async function approveTCPEntry(kind, key) {
  try {
    const res = kind==='tcode'
      ? await apiPost({action:'approveTCode', tcode:key, actingRole:ST.user.role})
      : await apiPost({action:'approveProcess', name:key, actingRole:ST.user.role});
    if (!res.ok) { toast(res.error||'Approve failed', 'err'); return; }
    await refreshTCP();
    toast('Approved.', 'ok');
  } catch(e) { toast(e.message, 'err'); }
}
async function refreshTCP() {
  const results = await Promise.all([api('getTCodes'), api('getProcesses')]);
  const t = results[0], p = results[1];
  if (t.ok) ST.tcodesCache = t.items||[];
  if (p.ok) ST.processesCache = p.items||[];
  renderTCPContent();
}

// ── Export (reuses shared smart-width PDF helper + smart Excel widths) ──
async function exportTCPExcel(kind) {
  toast('Building Excel…', 'ok', 1800);
  const XLSXmod = await ensureSheetJS();
  const wb = XLSXmod.utils.book_new();
  const rows = kind==='tcodes'
    ? [['T Code','Purpose','Description','Remarks','Status']].concat(ST.tcodesCache.map(it=>[it.tcode,it.purpose,it.description,it.remarks||'',it.status||'approved']))
    : [['Name','Description','Remarks','Status']].concat(ST.processesCache.map(it=>[it.name,it.description,it.remarks||'',it.status||'approved']));
  const ws = XLSXmod.utils.aoa_to_sheet(rows);
  applySmartColWidths(ws, rows);
  XLSXmod.utils.book_append_sheet(wb, ws, kind==='tcodes'?'T Codes':'Processes');
  XLSXmod.writeFile(wb, `MSETCL_${kind==='tcodes'?'TCodes':'Processes'}_${todayISO()}.xlsx`);
  toast('Excel ready', 'ok');
}
async function exportTCPPDF(kind) {
  toast('Preparing PDF…', 'ok', 1800);
  const root = document.createElement('div');
  root.id = 'PRINT_ROOT';
  const headers = kind==='tcodes' ? ['T Code','Purpose','Description','Remarks','Status'] : ['Name','Description','Remarks','Status'];
  const colWidths = smartPdfColWidths(headers);
  const rows = kind==='tcodes'
    ? ST.tcodesCache.map(it=>[it.tcode,it.purpose,it.description,it.remarks||'',it.status||'approved'])
    : ST.processesCache.map(it=>[it.name,it.description,it.remarks||'',it.status||'approved']);
  root.innerHTML = `
    <style>${sharedPrintCSS()}</style>
    <div class="pg">
      <h2>${kind==='tcodes'?'T Codes (SAP)':'Processes'}</h2>
      <table><colgroup>${colWidths.map(w=>`<col style="width:${w}%">`).join('')}</colgroup>
        <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${escapeHtml(c)}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
  `;
  doPrintAndCleanup(root);
}

function renderStages(readOnly) {
  const est = ST.currentEstimate;
  const zone = document.getElementById('pg-stages');
  zone.innerHTML = PROPOSAL_STAGE_NAMES.map((name, i) => {
    const id = i+1;
    const stage = est.progress.stages[id] || {done:false, remarks:''};
    return `
      <div class="stage-row">
        <span class="stage-num">${id}.</span>
        <div class="stage-check ${stage.done?'done':''}" ${readOnly?'':`onclick="toggleStage(${id})"`}>${stage.done?'✓':''}</div>
        <span class="stage-name">${escapeHtml(name)}</span>
        <div class="stage-remarks"><input type="text" value="${escapeHtml(stage.remarks||'')}" ${readOnly?'disabled':''} placeholder="Remarks…" oninput="onStageRemarkInput(${id}, this.value)"></div>
      </div>`;
  }).join('');
}
function toggleStage(id) {
  const est = ST.currentEstimate;
  const stage = est.progress.stages[id];
  stage.done = !stage.done;
  const row = document.querySelectorAll('.stage-row')[id-1];
  const checkEl = row.querySelector('.stage-check');
  checkEl.classList.toggle('done', stage.done);
  checkEl.textContent = stage.done ? '✓' : '';
  if (id === LOI_STAGE_ID) renderFinancialTracking(!canEdit() || !ownsEstimate(est));
}
function onStageRemarkInput(id, val) {
  ST.currentEstimate.progress.stages[id].remarks = val;
}

function renderFinancialTracking(readOnly) {
  const est = ST.currentEstimate;
  const unlocked = est.progress.stages[LOI_STAGE_ID] && est.progress.stages[LOI_STAGE_ID].done;
  const zone = document.getElementById('pg-financial');
  const bills = est.progress.bills || [];
  const totalBills = bills.reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
  const available = (est.progress.woAmount||0) - totalBills;

  zone.innerHTML = `
    ${!unlocked ? `<div class="lock-banner">🔒 Locked until Stage 11 "LOI Issued" is marked done.</div>` : ''}

      <div class="field" style="max-width:280px"><label>Total WO / PO Amount (₹)</label>

      </div>
    </div>
  `;
}
function billRowHtml(b, i, readOnly) {
  return `<tr data-bi="${i}">

  recalcFinancials();
}
function onBillFieldInput(i, field, val) {
  ST.currentEstimate.progress.bills[i][field] = field==='amount' ? (parseFloat(val)||0) : val;
  if (field==='amount') recalcFinancials();
}
function recalcFinancials() {
  const est = ST.currentEstimate;
  const bills = est.progress.bills||[];
  const totalBills = bills.reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
  const available = (est.progress.woAmount||0) - totalBills;
  const tEl = document.getElementById('pg-total-bills'); if (tEl) tEl.textContent = fmtINR(totalBills);
  const aEl = document.getElementById('pg-available');
  if (aEl) { aEl.textContent = fmtINR(available); aEl.parentElement.style.color = available<0 ? '#ff8a7a' : ''; }
}
function addBillRow() {
  const est = ST.currentEstimate;
  if ((est.progress.bills||[]).length>=10) return;
  est.progress.bills.push({label:'', amount:0, remarks:''});
  renderFinancialTracking(!canEdit() || !ownsEstimate(est));
}
function removeBillRow(i) {
  ST.currentEstimate.progress.bills.splice(i,1);

}

// ── Progress images ──
function onProgressImageSelected(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  if (ST.currentEstimate.progressImages.length>=5) { toast('Maximum 5 images allowed.', 'warn'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    ST.currentEstimate.progressImages.push({data: reader.result, caption:''});
    renderProgressImages(!canEdit() || !ownsEstimate(ST.currentEstimate));
  };
  reader.readAsDataURL(file);
  evt.target.value = '';
}
function renderProgressImages(readOnly) {
  const est = ST.currentEstimate;
  const zone = document.getElementById('pg-img-grid');
  if (!zone) return;
  zone.innerHTML = est.progressImages.map((img,i) => `
    <div class="img-tile">
      <img src="${img.data}" onclick="openLightbox('${img.data.replace(/'/g,"\\'")}')">
      <div class="img-actions">
        <button onclick="downloadProgressImage(${i})" title="Download">⬇</button>
        ${!readOnly?`<button onclick="deleteProgressImage(${i})" title="Delete">✕</button>`:''}
      </div>
      <input type="text" class="img-cap" value="${escapeHtml(img.caption||'')}" ${readOnly?'disabled':''}
        oninput="onImageCaptionInput(${i}, this.value)" placeholder="Caption…"
        style="width:100%; border:none; border-top:1px solid var(--line); border-radius:0">
    </div>
  `).join('') || `<div class="empty-state" style="grid-column:1/-1"><div class="ic">🖼️</div>No progress images yet.</div>`;
}
function onImageCaptionInput(i, val) { ST.currentEstimate.progressImages[i].caption = val; }
function downloadProgressImage(i) {
  const est = ST.currentEstimate;
  const img = est.progressImages[i];
  const a = document.createElement('a');
  a.href = img.data;
  a.download = `${(est.name||'Estimate').replace(/[^a-z0-9]+/gi,'_')}_image${i+1}.png`;
  a.click();
}
function deleteProgressImage(i) {
  ST.currentEstimate.progressImages.splice(i,1);
  renderProgressImages(!canEdit() || !ownsEstimate(ST.currentEstimate));
}

// ── Save ──
async function saveProgress() {
  const est = ST.currentEstimate;
  est.name = document.getElementById('pg-name').value.trim() || est.name;
  est.number = document.getElementById('pg-number').value.trim();
  for (let n=1;n<=5;n++) est['remark'+n] = document.getElementById(`pg-remark${n}`).value.trim();
  est.progress.orderClosedRemarks = document.getElementById('pg-orderclosed-remarks').value.trim();
  try {
    const res = await apiPost({action:'saveEstimate', estimate:est, items:ST.currentItems});
    if (!res.ok) { toast(res.error||'Save failed', 'err'); return; }
    toast('Proposal progress saved.', 'ok');
    const idx = ST.estimatesCache.findIndex(x=>x.id===est.id);
    const summary = {...est, savedAt: new Date().toISOString(), itemCount: ST.currentItems.length};
    if (idx>-1) ST.estimatesCache[idx] = summary;
  } catch(e) { toast(e.message, 'err'); }
}

// ── Excel export (3 sheets: Summary / Proposal Stages / Financial Tracking) ──
async function exportProgressExcel() {
  const est = ST.currentEstimate;
  toast('Building Excel…', 'ok', 1800);
  const XLSXmod = await ensureSheetJS();
  const wb = XLSXmod.utils.book_new();

  const summaryRows = [
    ['Field','Value'],
    ['Name', est.name], ['Number', est.number||''], ['Date', est.date||''], ['Division', est.division||''],
    ['Type', estimateTypeLabel(est.estimateType)], ['Status', est.status],
    ['Audited', est.audited?'Yes':'No'], ['Order Closed', est.progress.orderClosed?'Yes':'No'],
    ['Order Closed Remarks', est.progress.orderClosedRemarks||''],
    ['Remark 1', est.remark1||''],['Remark 2', est.remark2||''],['Remark 3', est.remark3||''],
    ['Remark 4', est.remark4||''],['Remark 5', est.remark5||''],
    ['Image Captions', est.progressImages.map(i=>i.caption).filter(Boolean).join(' | ')||'—'],
  ];
  const wsSummary = XLSXmod.utils.aoa_to_sheet(summaryRows);
  applySmartColWidths(wsSummary, summaryRows);
  XLSXmod.utils.book_append_sheet(wb, wsSummary, 'Summary');

  const stageRows = [['#','Stage','Done','Remarks']];
  PROPOSAL_STAGE_NAMES.forEach((name,i)=>{
    const s = est.progress.stages[i+1] || {done:false, remarks:''};
    stageRows.push([i+1, name, s.done?'Yes':'No', s.remarks||'']);
  });
  const wsStages = XLSXmod.utils.aoa_to_sheet(stageRows);
  applySmartColWidths(wsStages, stageRows);
  // highlight done rows light green
  stageRows.forEach((row,i)=>{
    if (i===0) return;
    if (row[2]==='Yes') {
      ['A','B','C','D'].forEach(col=>{
        const cell = wsStages[col+(i+1)];
        if (cell) cell.s = {fill:{fgColor:{rgb:'E3F6EC'}}};
      });
    }
  });
  XLSXmod.utils.book_append_sheet(wb, wsStages, 'Proposal Stages');

  const bills = est.progress.bills||[];
  const totalBills = bills.reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
  const finRows = [['Label','Amount','Remarks']].concat(bills.map(b=>[b.label||'', b.amount||0, b.remarks||'']));
  finRows.push(['Total Bills', totalBills, '']);
  finRows.push(['WO Amount', est.progress.woAmount||0, '']);
  finRows.push(['Available Amount', (est.progress.woAmount||0)-totalBills, '']);
  const wsFin = XLSXmod.utils.aoa_to_sheet(finRows);
  applySmartColWidths(wsFin, finRows);
  XLSXmod.utils.book_append_sheet(wb, wsFin, 'Financial Tracking');

  XLSXmod.writeFile(wb, `${(est.name||'Estimate').replace(/[^a-z0-9]+/gi,'_')}_Progress.xlsx`);
  toast('Excel ready', 'ok');
}

async function testDbConnection() {
  const statusEl = document.getElementById('dbconn-status');
  statusEl.innerHTML = '<span class="spinner dark"></span> Testing…';
  const url = document.getElementById('dbconn-url').value.trim();
  try {
    const r = await fetch(`${url}?action=ping`, {redirect:'follow'});
    const txt = await r.text();
    const data = JSON.parse(txt);
    if (data.ok) {
      statusEl.innerHTML = `<span class="badge badge-ok">Connected</span> ${data.sorRows||0} SOR rows, ${data.estRows||0} estimates`;
    } else {
      statusEl.innerHTML = `<span class="badge badge-bad">Error: ${escapeHtml(data.error||'Unknown')}</span>`;
    }
  } catch(e) {
    statusEl.innerHTML = `<span class="badge badge-bad">Failed: ${escapeHtml(e.message)}</span>`;
  }
}
function saveDbConnection() {
  const url = document.getElementById('dbconn-url').value.trim();
  if (!url) { toast('Enter a URL first.', 'warn'); return; }
  SURL = url;
  localStorage.setItem(SCRIPT_URL_KEY, url);
  toast('Backend URL saved. Reloading data…', 'ok');
  enterApp();
}
function resetDbConnection() {
  SURL = DEFAULT_SCRIPT_URL;
  localStorage.removeItem(SCRIPT_URL_KEY);
  document.getElementById('dbconn-url').value = SURL;
  toast('Reset to default backend URL.', 'ok');
}
function copyAppsScriptCode() {
  navigator.clipboard.writeText(APPS_SCRIPT_CODE).then(()=>toast('Copied to clipboard.', 'ok'));
}
// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  boot();
});

</script>
