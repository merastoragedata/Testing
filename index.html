<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karjat 400/220 kV — Protection Settings Register</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --gold:#C9A84C; --gold-l:#E8D49A; --gold-p:#FAF3DC; --gold-d:#8B6914;
  --navy:#2A4A6B; --navy-d:#1F3A56; --slate:#6B7A99; --slate-l:#A8B4CC;
  --bg:#EAF2FA; --bgc:#FFFFFF; --bgs:#F2F8FD;
  --ink:#27405A; --mute:#3E5878; --faint:#6B7A99;
  --line:#E2D8B8; --line2:#D8CBA0;
  --v400:#B8860B; --v220:#2A6B8B; --vict:#6B4E9E; --vbus:#6B7A99;
  --ok:#2A7A4A; --warn:#C07820; --alarm:#B03A2E; --revised:#B8860B;
  --mono:ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;
  --sans:'Inter',ui-sans-serif,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --serif:'Cinzel',serif;
  --r:7px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;direction:ltr;text-align:left}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--gold-l);border-radius:6px}
::-webkit-scrollbar-track{background:var(--bgs)}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px}

/* ---------- top bar ---------- */
.top{display:flex;align-items:center;gap:14px;padding:9px 18px;background:var(--bgc);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:40}
.brand{display:flex;flex-direction:column;line-height:1.1;min-width:0}
.brand .ey{font-size:9px;letter-spacing:.22em;color:var(--slate);text-transform:uppercase;font-weight:600}
.brand .nm{font-family:var(--serif);font-size:15px;font-weight:700;letter-spacing:.01em;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .nm b{color:var(--v400)}
.brand .nm i{color:var(--v220);font-style:normal}
.spark{width:28px;height:28px;flex:0 0 auto}
.nav{display:flex;gap:2px;background:var(--bgs);border:1px solid var(--line);border-radius:9px;padding:3px}
.nav button{background:transparent;border:0;color:var(--slate);padding:7px 13px;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:.01em;display:flex;align-items:center;gap:6px;white-space:nowrap}
.nav button.on{background:var(--gold);color:var(--navy-d)}
.nav button:hover:not(.on){color:var(--navy)}
.grow{flex:1}
.search{display:flex;align-items:center;gap:8px;background:var(--bgs);border:1px solid var(--line);border-radius:9px;padding:7px 11px;min-width:190px}
.search input{background:transparent;border:0;color:var(--ink);outline:0;width:100%;font-size:13px;font-family:var(--sans)}
.search svg{flex:0 0 auto;opacity:.6}
.tbtn{background:var(--bgs);border:1px solid var(--line);color:var(--mute);padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tbtn:hover{color:var(--navy);border-color:var(--gold)}
.tbtn.accent{background:var(--gold);color:var(--navy-d);border-color:var(--gold)}
.tbtn.accent:hover{background:var(--gold-d);color:#fff}
.store{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--faint);padding:0 2px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok)}
.dot.off{background:var(--alarm);box-shadow:0 0 6px var(--alarm)}

/* ---------- layout ---------- */
.shell{display:flex;height:calc(100vh - 51px)}
.rail{width:270px;flex:0 0 auto;border-right:1px solid var(--line);background:var(--bgc);overflow-y:auto;padding:12px 10px}
.main{flex:1;overflow-y:auto;position:relative;background:var(--bg)}
.wrap{padding:20px 24px;max-width:1180px;margin:0 auto}

/* tree */
.vgroup{margin-bottom:4px}
.vhead{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;font-weight:700;font-size:12px;letter-spacing:.01em;color:var(--navy)}
.vhead:hover{background:var(--bgs)}
.vhead .vb{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
.vhead .ct{margin-left:auto;font-size:10px;color:var(--faint);font-family:var(--mono)}
.vhead .car{transition:transform .18s;opacity:.5;font-size:10px}
.vgroup.closed .car{transform:rotate(-90deg)}
.vgroup.closed .baylist{display:none}
.baylist{margin:2px 0 6px 6px;border-left:1px solid var(--line);padding-left:6px}
.bayitem{padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--mute);display:flex;align-items:center;gap:7px}
.bayitem:hover{background:var(--bgs);color:var(--navy)}
.bayitem.on{background:var(--gold-p);color:var(--navy);font-weight:600}
.bayitem .rc{margin-left:auto;font-size:10px;color:var(--faint);font-family:var(--mono)}

/* ---------- overview ---------- */
.eyebrow{font-size:10px;letter-spacing:.24em;color:var(--gold-d);text-transform:uppercase;font-weight:700;margin-bottom:6px}
.h1{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:0;margin:0 0 4px;color:var(--navy)}
.sub{color:var(--mute);font-size:13px;margin-bottom:20px}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.tile{background:var(--bgc);border:1.5px solid var(--line);border-radius:var(--r);padding:15px 16px 13px;position:relative;overflow:hidden;box-shadow:0 1px 6px rgba(42,74,107,.05)}
.tile .big{font-size:27px;font-weight:750;font-family:var(--serif);color:var(--navy)}
.tile .lab{font-size:11px;color:var(--mute);letter-spacing:.02em;margin-top:2px}
.tile::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--gold))}
.grid2{display:grid;grid-template-columns:1.35fr 1fr;gap:16px}
.card{background:var(--bgc);border:1.5px solid var(--line);border-left:3px solid var(--gold);border-radius:var(--r);padding:15px;box-shadow:0 1px 6px rgba(42,74,107,.05)}
.card h3{margin:0 0 12px;font-size:12.5px;font-weight:700;letter-spacing:.01em;display:flex;align-items:center;gap:8px;color:var(--navy);font-family:var(--serif)}
.card h3 .rt{margin-left:auto;font-size:10.5px;color:var(--faint);font-weight:500;font-family:var(--sans)}
.vbar{display:flex;flex-direction:column;gap:9px}
.vrow{display:flex;align-items:center;gap:10px;font-size:12.5px}
.vrow .sw{width:10px;height:10px;border-radius:2px;flex:0 0 auto}
.vrow .nm{width:90px;color:var(--mute)}
.vrow .track{flex:1;height:7px;background:var(--bgs);border-radius:4px;overflow:hidden}
.vrow .fill{height:100%;border-radius:4px}
.vrow .n{font-family:var(--mono);font-size:12px;width:56px;text-align:right;color:var(--navy)}
.audit{display:flex;flex-direction:column;gap:2px;max-height:280px;overflow-y:auto}
.arow{display:flex;gap:10px;padding:8px 6px;border-radius:6px;font-size:12px;border-bottom:1px solid var(--line)}
.arow:hover{background:var(--bgs)}
.arow .tg{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:4px;height:fit-content;white-space:nowrap}
.arow .meta{color:var(--faint);font-size:10.5px;margin-top:2px}
.empty{color:var(--faint);font-size:12.5px;padding:18px;text-align:center;border:1px dashed var(--line2);border-radius:10px}

/* ---------- SLD ---------- */
.sldwrap{background:var(--bgc);border:1.5px solid var(--line);border-radius:12px;padding:10px;overflow:auto}
.sldhead{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-left:auto}
.lg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mute)}
.lg .sw{width:11px;height:11px;border-radius:3px}
.baychip{cursor:pointer;transition:opacity .15s}
.relchip{cursor:pointer}
.relchip:hover rect{filter:brightness(.94)}
.sld-tip{position:fixed;pointer-events:none;background:var(--navy-d);color:#fff;border-radius:8px;padding:8px 10px;font-size:11.5px;z-index:100;max-width:240px;box-shadow:0 8px 30px rgba(0,0,0,.3);opacity:0;transition:opacity .12s}
.sld-tip span{color:#C9D6E8!important}

/* ---------- relay view ---------- */
.rvhead{background:var(--bgc);border:1.5px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px;box-shadow:0 1px 6px rgba(42,74,107,.05)}
.rvtop{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.vtag{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.02em}
.rvtitle{font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:0;line-height:1.2;color:var(--navy)}
.rvcrumb{font-size:11.5px;color:var(--mute);margin-bottom:4px}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bgs);border:1px solid var(--line);color:var(--mute);font-family:var(--mono)}
.rvactions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.btn{border:1.5px solid var(--line);background:var(--bgs);color:var(--mute);padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--gold);color:var(--navy)}
.btn.pri{background:var(--gold);color:var(--navy-d);border-color:var(--gold)}
.btn.pri:hover{background:var(--gold-d);color:#fff}
.btn.ghost{background:transparent}
.btn.danger:hover{border-color:var(--alarm);color:var(--alarm)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.vitals{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:16px}
.vit{background:var(--bgc);padding:9px 12px}
.vit .k{font-size:9.5px;color:var(--faint);letter-spacing:.03em;text-transform:uppercase}
.vit .v{font-family:var(--mono);font-size:13.5px;font-weight:600;margin-top:2px;color:var(--navy)}

/* version tabs */
.vtabs{display:flex;gap:6px;align-items:center;margin:16px 0;flex-wrap:wrap}
.vtab{background:var(--bgc);border:1.5px solid var(--line);border-radius:9px;padding:8px 12px;cursor:pointer;min-width:110px}
.vtab.on{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;background:var(--gold-p)}
.vtab .vl{font-size:11.5px;font-weight:700;display:flex;align-items:center;gap:6px;color:var(--navy)}
.vtab .vd{font-size:10px;color:var(--faint);font-family:var(--mono);margin-top:2px}
.vtab .badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:700;letter-spacing:.02em}
.badge.base{background:#E7ECF4;color:var(--slate)}
.badge.draft{background:#FCEFD1;color:var(--warn)}
.badge.applied{background:#DFF3E6;color:var(--ok)}

.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.mini{display:flex;align-items:center;gap:7px;background:var(--bgc);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--mute)}
.mini input{background:transparent;border:0;color:var(--ink);outline:0;font-family:var(--sans)}
.cmpsel{background:var(--bgc);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 10px;font-size:12px;font-family:var(--sans)}

/* settings groups */
.ggrp{border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden;background:var(--bgc)}
.ghead{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:var(--bgs)}
.ghead:hover{background:var(--gold-p)}
.ghead .gn{font-weight:700;font-size:12.5px;color:var(--navy);font-family:var(--serif)}
.ghead .gc{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)}
.ghead .car{font-size:10px;opacity:.5;transition:transform .18s}
.ggrp.closed .car{transform:rotate(-90deg)}
.ggrp.closed .gbody{display:none}
.gbody{padding:0;overflow-x:auto}
table.st{width:100%;border-collapse:collapse;font-size:12.5px;min-width:640px}
table.st th{text-align:left;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:#FBEFC9;padding:8px 12px;font-weight:700;position:sticky;top:0;background:linear-gradient(135deg,#3E5F82,#2A4A6B);white-space:nowrap}
table.st td{padding:7px 12px;border-bottom:1px solid var(--line);vertical-align:top}
table.st tr:nth-child(even) td{background:#FAFBFD}
table.st tr:last-child td{border-bottom:0}
table.st tr:hover td{background:var(--gold-p)}
.tt{font-family:var(--mono);color:var(--ink);white-space:nowrap}
.tv{font-family:var(--mono);font-weight:600;color:var(--navy)}
.tu{color:var(--mute);font-size:11px;white-space:nowrap}
.tr{color:var(--faint);font-family:var(--mono);font-size:11px}
.tv.changed{color:var(--revised)}
.tv.oor{color:var(--alarm)}
td .edit{width:100%;min-width:90px;background:#fff;border:1.5px solid var(--slate-l);color:var(--ink);border-radius:6px;padding:4px 8px;font-family:var(--mono);font-size:12.5px}
td .edit:focus{border-color:var(--gold);outline:0}
.wasval{font-size:10.5px;color:var(--faint);font-family:var(--mono);text-decoration:line-through;margin-left:8px;display:block}
.flagcol{width:24px}
.flag{font-size:11px}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(31,58,86,.55);z-index:60;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .16s}
.scrim.on{opacity:1;pointer-events:auto}
.modal{background:var(--bgc);border:2px solid var(--gold);border-radius:14px;width:560px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.35)}
.modal .mh{padding:16px 20px;border-bottom:1.5px solid var(--line);display:flex;align-items:center;gap:10px;background:var(--bgs);position:sticky;top:0}
.modal .mh h3{margin:0;font-size:15px;font-family:var(--serif);color:var(--navy)}
.modal .mb{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.modal .mf{padding:14px 20px;border-top:1.5px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;background:var(--bgs);position:sticky;bottom:0}
.fld label{display:block;font-size:11px;color:var(--mute);margin-bottom:5px;letter-spacing:.01em;font-weight:600}
.fld input,.fld textarea,.fld select{width:100%;background:#fff;border:1.5px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 11px;font-size:13px;font-family:var(--sans)}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--gold);outline:0}
.fld textarea{resize:vertical;min-height:60px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{font-size:11px;color:var(--faint)}
.x{margin-left:auto;background:transparent;border:0;color:var(--mute);font-size:20px;line-height:1;padding:0 4px}
.x:hover{color:var(--alarm)}

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy-d);color:#fff;border-left:4px solid var(--ok);padding:12px 18px;border-radius:10px;font-size:13px;z-index:80;opacity:0;transition:.22s;box-shadow:0 12px 40px rgba(0,0,0,.3);max-width:92vw}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.warn{border-left-color:var(--warn)}
.toast.err{border-left-color:var(--alarm)}

.suggest{background:var(--gold-p);border:1px solid var(--gold-l);border-radius:11px;padding:13px 15px;margin-top:14px;font-size:12.5px;color:var(--mute)}
.suggest b{color:var(--gold-d)}
.suggest .st{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-d);font-weight:700;display:block;margin-bottom:5px;font-family:var(--serif)}

.hide{display:none!important}

/* ---------- bay page ---------- */
.diabadge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--mute);background:var(--bgs);border:1px solid var(--line);border-radius:20px;padding:4px 10px}

/* compact per-relay "at a glance" block on bay page */
.rglance{border:1.5px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden;background:var(--bgc);box-shadow:0 1px 6px rgba(42,74,107,.05)}
.rglance-head{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--bgs);flex-wrap:wrap}
.rglance-head .nm{font-weight:700;font-size:13.5px;color:var(--navy);font-family:var(--serif)}
.rglance-head .gc{font-size:10.5px;color:var(--faint);font-family:var(--mono)}
.rglance-body{padding:14px 16px}
.pinnedcards{display:flex;flex-wrap:wrap;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:12px}
.pinnedsec{margin-bottom:10px}
.pinnedsec-h{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-d);font-weight:700;margin-bottom:5px}
.cardsecwrap{display:flex;flex-direction:column;gap:16px;margin-bottom:16px}
.cardsec-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.cardsec-head b{font-family:var(--serif);color:var(--navy);font-size:13px}
.cardsec-head .gc{color:var(--faint);font-size:10.5px;font-family:var(--mono)}
.cardsec-head button{background:none;border:0;color:var(--faint);font-size:11px;padding:2px 4px;margin-left:2px}
.cardsec-head button:hover{color:var(--navy)}
.cardmeaning{font-size:10.5px;color:var(--faint);line-height:1.5;margin-top:4px}
.ovwsec{border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:10px}
.ovwsec-head{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--gold-p)}
.ovwsec-head b{font-family:var(--serif);color:var(--gold-d);font-size:12.5px}
.ovwtabs{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.ovwtab{background:var(--bgc);border:1.5px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--mute);cursor:pointer;display:flex;align-items:center;gap:6px}
.ovwtab.on{border-color:var(--gold);background:var(--gold-p);color:var(--gold-d)}
.ovwtab-x{opacity:.5;font-size:10px}
.ovwtab-x:hover{opacity:1;color:var(--alarm)}
.ovwtab-add{border-style:dashed;color:var(--faint)}
.ovwtab-add:hover{color:var(--gold-d);border-color:var(--gold)}
.ovwblock-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.ovwraw-wrap{overflow:auto;border:1.5px solid var(--line);border-radius:10px;max-height:70vh}
table.ovwraw{border-collapse:collapse;font-size:12.5px;background:#fff}
table.ovwraw td{border:1px solid var(--line);padding:5px 9px;white-space:pre-wrap;vertical-align:top;min-width:60px}
table.ovwraw tr:first-child td{background:var(--bgs);font-weight:700;color:var(--navy)}
.glancetbl{margin-top:4px}
.brief{border:1.5px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bgc)}
.brief-head{display:flex;align-items:center;gap:8px;padding:10px 13px;cursor:pointer;background:var(--gold-p)}
.brief-head:hover{background:var(--gold-l)}
.brief-head b{font-size:12.5px;color:var(--gold-d);font-family:var(--serif)}
.brief-head .gc{font-size:10.5px;color:var(--faint);font-family:var(--mono)}
.brief-head .car{margin-left:auto;font-size:10px;opacity:.6;transition:transform .18s}
.brief.closed .car{transform:rotate(-90deg)}
.brief.closed .brief-body{display:none}
.brief-body{padding:10px;display:flex;flex-direction:column;gap:8px}

/* ---------- vitals customize / custom cards ---------- */
.vitwrap{display:flex;flex-wrap:wrap;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:16px}
.vit2{background:var(--bgc);padding:9px 12px;flex:1 1 150px;position:relative;min-width:150px}
.vit2 .k{font-size:9.5px;color:var(--faint);letter-spacing:.03em;text-transform:uppercase;display:flex;gap:6px;align-items:center}

.addvit{background:var(--bgs);border:1.5px dashed var(--line2);flex:1 1 150px;min-width:150px;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:11.5px;cursor:pointer}

.cbdrop{position:absolute;left:0;right:0;top:100%;margin-top:3px;background:#fff;border:1.5px solid var(--gold);border-radius:8px;max-height:220px;overflow-y:auto;z-index:30;box-shadow:0 12px 30px rgba(42,74,107,.18)}

.cbdrop-item:hover{background:var(--gold-p)}
.cbdrop-item.cbdrop-empty{color:var(--faint);cursor:default}
.cbdrop-item.cbdrop-empty:hover{background:transparent}
.cbdrop-g{color:var(--faint);font-size:10px;font-family:var(--mono);white-space:nowrap}
.cbdrop-t{flex:1;color:var(--ink);font-weight:600}
.cbdrop-v{color:var(--gold-d);font-family:var(--mono);font-size:11px;white-space:nowrap}
.addrow-btns{display:flex;gap:8px;flex-wrap:wrap}
.addrow-btns button{flex:1;min-width:110px;background:var(--bgs);border:1px solid var(--line);color:var(--mute);border-radius:7px;padding:7px;font-size:11.5px}
.addrow-btns button:hover{color:var(--navy);border-color:var(--gold)}

/* ---------- settings table extras ---------- */
.desccell{display:flex;align-items:flex-start;gap:6px;flex-direction:column;min-width:180px}
.desctxt{width:100%;background:#fff;border:1px solid var(--line);color:var(--mute);border-radius:6px;padding:5px 7px;font-size:11.5px;font-family:var(--sans);resize:vertical;min-height:30px}

.settingsactions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:14px 0}
.corrbar{background:var(--gold-p);border:1.5px solid var(--gold);border-radius:12px;padding:16px;margin-bottom:14px;display:flex;flex-direction:column;gap:12px}

.corrattach-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.attach-chip{display:inline-flex;align-items:center;gap:6px;cursor:default}

.attach-chip button:hover{color:var(--navy)}

/* ---------- settings data picker ---------- */
.pickgrp{border:1px solid var(--line);border-radius:9px;margin-bottom:6px;overflow:hidden}
.pickgrp-h{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bgs);cursor:pointer;font-size:12px;font-weight:700;color:var(--navy)}
.pickgrp-h .car{font-size:10px;opacity:.5;transition:transform .18s}
.pickgrp.closed .car{transform:rotate(-90deg)}
.pickgrp.closed .pickgrp-b{display:none}
.pickgrp-b{padding:6px 10px;max-height:220px;overflow-y:auto}
.pickrow{display:flex;align-items:center;gap:9px;padding:6px 4px;font-size:12px;border-radius:5px}
.pickrow:hover{background:var(--bgs)}

.pickrow .pv{color:var(--faint);font-family:var(--mono);font-size:11px;margin-left:auto}
.selcount{font-size:11px;color:var(--gold-d);font-family:var(--mono)}

/* ---------- checkbox export tree ---------- */

/* ---------- admin page ---------- */
.admincard{background:var(--bgc);border:1.5px solid var(--line);border-radius:13px;padding:20px;max-width:640px;box-shadow:0 1px 6px rgba(42,74,107,.05)}

.bootscreen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}

.backbtn{background:var(--bgs);border:1px solid var(--line);color:var(--mute);border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;margin-bottom:12px}

.steps{counter-reset:step;margin:14px 0}

.keyrow{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.keyrow input{flex:1;min-width:160px}
.statusline{margin-top:10px;font-size:12px;padding:8px 10px;border-radius:7px}
.statusline.ok{background:#DFF3E6;color:var(--ok)}
.statusline.err{background:#FBE1DD;color:var(--alarm)}

.gear{background:var(--bgs);border:1px solid var(--line);color:var(--mute);border-radius:9px;padding:8px 10px}
.gear:hover{color:var(--navy);border-color:var(--gold)}

/* ---------- AI analysis boxes (interruption tripping analysis) ---------- */
.ai-box{border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:10px}
.ai-head{display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;user-select:none;font-size:12px;font-weight:700}
.ai-user .ai-head{background:#EEF6FF;color:#1E4E79}
.ai-ai .ai-head{background:var(--gold-p);color:var(--gold-d)}
.ai-final .ai-head{background:#EAF7EE;color:#1E6B3F}
.ai-head .car{margin-left:auto;font-size:10px;transition:transform .18s}
.ai-box.closed .car{transform:rotate(-90deg)}
.ai-box.closed .ai-body{display:none}
.ai-body{padding:12px 13px;font-size:12.5px;line-height:1.65;color:var(--mute);white-space:pre-wrap}

/* ---------- interruption history ---------- */
.interrup{border:1.5px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;background:var(--bgc)}
.interrup-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;background:var(--bgs);flex-wrap:wrap}
.interrup-head:hover{background:var(--gold-p)}
.interrup-head .idate{font-family:var(--mono);font-weight:700;color:var(--navy);font-size:12.5px}
.interrup-head .ikind{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.03em}
.ikind.fault{background:#FBE1DD;color:var(--alarm)}
.ikind.outage{background:#E7ECF4;color:var(--slate)}
.interrup-head .ititle{flex:1;font-size:12.5px;color:var(--mute);min-width:160px}
.interrup-head .car{font-size:10px;opacity:.5;transition:transform .18s}
.interrup.closed .car{transform:rotate(-90deg)}
.interrup.closed .interrup-body{display:none}
.interrup-body{padding:14px 16px}
.ifields{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.ifield{background:var(--bgs);border:1px solid var(--line);border-radius:7px;padding:6px 11px;font-size:11.5px}
.ifield b{color:var(--navy)}
.ranalysis{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
.ranalysis-head{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--bgs);flex-wrap:wrap}
.ranalysis-head .nm{font-weight:700;font-size:12px;color:var(--navy)}
.ranalysis-head .kd{font-size:10px;color:var(--faint);font-family:var(--mono)}
.ranalysis-body{padding:12px 13px}
.ranalysis-text{font-size:12.5px;color:var(--mute);line-height:1.6;white-space:pre-wrap;margin-bottom:8px}
.ranalysis-empty{font-size:12px;color:var(--faint);font-style:italic}

/* ---------- responsive ---------- */

  .grid2{grid-template-columns:1fr}

}
@media (max-width:900px){

  .vtab{min-width:96px;padding:7px 9px}
  .partrow{flex-direction:column;align-items:stretch}
  .partrow .parttag{width:auto}
  .keyrow{flex-direction:column}
  .rvactions{flex-direction:column}
  .rvactions .btn{width:100%}

  /* ---------- PDF: continuous, all pages stacked ---------- */

let SUB = null;
const SKEY = 'karjat_pss_v3';
/* Google Apps Script Web App URL — backs both the "Overview" feature and the
   full settings database (fetched at startup instead of embedding ~4MB of
   JSON in this HTML file; see syncFullDataToDrive() / resolveSubstationData()). */
const GOOGLE_SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbyLFHjgZYRDfu0xcN3br_1_9L8WDpb5y9hvyGXRvWxtc61guakKyCuSwS2c6QvRMOhu/exec';
const DRIVE_CACHE_KEY = 'karjat_pss_drive_cache_v1';
let SLD_ACTIVE = (typeof SLD_REF!=='undefined') ? SLD_REF : '';
const VCOL = {'400kV':'#B8860B','220kV':'#2A6B8B','400/220kV':'#6B4E9E','Busbar':'#6B7A99'};
const VORDER = ['400kV','400/220kV','220kV','Busbar'];

/* ---------- unified bay list (real bays + bus-zone pseudo-bays) — built once SUB is loaded ---------- */
let BAYS = [], BAYIDX = {}, RELAYS = {}, RELAY_BAY = {};
let DATA_SOURCE = 'embedded'; // 'embedded' | 'cache' | 'drive'
function buildIndices(){
  BAYS = SUB.bays.map(b=>({...b}));
  (SUB.busZones||[]).forEach(z=>{
    BAYS.push({id:z.id, num:'', name:z.name, voltage:z.voltage, scheme:'busbar', dia:null, pos:null,
      relays:z.relays.map(r=>({...r}))});
  });
  BAYIDX={}; BAYS.forEach(b=>BAYIDX[b.id]=b);
  RELAYS={}; RELAY_BAY={};
  BAYS.forEach(b=>b.relays.forEach(r=>{RELAYS[r.id]=r; RELAY_BAY[r.id]=b;}));
}

function bayOf(relayId){return RELAY_BAY[relayId];}
function relayById(id){return RELAYS[id];}
function bayById(id){return BAYIDX[id];}

/* ---------- storage ---------- */
let STORE = loadStore();
function loadStore(){
  try{const s=localStorage.getItem(SKEY); if(s) return normalizeStore(JSON.parse(s));}catch(e){}
  return normalizeStore({});
}
function normalizeStore(s){
  return {
    versions: s.versions||{}, audit: s.audit||[],
    customCards: s.customCards||{}, descriptions: s.descriptions||{}, valueMeanings: s.valueMeanings||{},
    customColumns: s.customColumns||{}, columnData: s.columnData||{},
    selectedSettings: s.selectedSettings||{}, interruptions: s.interruptions||{},
    corrections: s.corrections||{}, baselineOverride: s.baselineOverride||{}, lastCorrUser: s.lastCorrUser||'',
    cardSections: s.cardSections||{}, relayOverview: s.relayOverview||{}, bayOverview: s.bayOverview||{}, subOverview: s.subOverview||{},
    users: s.users||[], adminPassword: s.adminPassword||simpleHash_('admin'),
    pwResetRequests: s.pwResetRequests||[], manualDocs: s.manualDocs||{}
  };
}
/* Not real security — this is a static offline file with no server, so there is no way
   to store secrets safely client-side. This is only enough to run the approve/edit/reset
   workflow locally until the real login is provided by the LTS integration. */
function simpleHash_(s){ let h=0; for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;} return 'h'+h; }
function saveStore(){
  try{localStorage.setItem(SKEY, JSON.stringify(STORE)); setStoreDot(true);}
  catch(e){setStoreDot(false);}
}
function setStoreDot(ok){
  const d=document.getElementById('storeDot'), t=document.getElementById('storeTxt');
  if(!d) return;
  if(ok){d.className='dot'; t.textContent='saved';}
  else{d.className='dot off'; t.textContent='not saved — export!';}
}
function storageAvailable(){try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true;}catch(e){return false;}}

/* ---------- key helpers ---------- */
function setKey(group,title){return group+'||'+title;}

/* ---------- versions ---------- */
function baselineVersion(r){
  const groups = (STORE.baselineOverride && STORE.baselineOverride[r.id]) ? STORE.baselineOverride[r.id] : r.groups;
  return {id:'base', num:1, base:true, label:'Initial — as fetched',
    effectiveDate:SUB.docDate||'as-received', createdAt:null, author:'Field record',
    checker:'—', reason:'Settings read out from relay', ref:SUB.ssCode||'WRPC fetch',
    status:'record', appliedDate:SUB.docDate||'', note:'', groups};
}
function versionsOf(r){return [baselineVersion(r), ...(STORE.versions[r.id]||[])];}
function latestVersion(r){const vs=versionsOf(r); return vs[vs.length-1];}
function nextNum(r){return versionsOf(r).length+1;}
function deepGroups(gs){return gs.map(g=>({group:g.group, settings:g.settings.map(s=>({...s}))}));}

function reviseRelay(r,meta){
  const vs=versionsOf(r); const src=vs[vs.length-1];
  const nv={id:'rev'+Date.now(), num:nextNum(r), base:false,
    label:meta.label||('Revision '+nextNum(r)), effectiveDate:meta.effectiveDate,
    createdAt:new Date().toISOString(), author:meta.author||'', checker:meta.checker||'',
    reason:meta.reason||'', ref:meta.ref||'', status:'draft', appliedDate:'', note:meta.note||'',
    groups:deepGroups(src.groups)};
  if(!STORE.versions[r.id]) STORE.versions[r.id]=[];
  STORE.versions[r.id].push(nv);
  audit('revise', r, `New draft "${nv.label}" created (copied from ${src.label})`);
  saveStore();
  return STORE.versions[r.id].length;
}
function applyVersion(r,idx){
  const v=versionsOf(r)[idx]; if(v.base) return;
  const raw=STORE.versions[r.id][idx-1];
  raw.status='applied'; raw.appliedDate=new Date().toISOString().slice(0,10);
  audit('apply', r, `"${raw.label}" marked applied to relay on ${raw.appliedDate}`);
  saveStore();
}
function deleteVersion(r,idx){
  const raw=STORE.versions[r.id]; const v=raw[idx-1];
  audit('delete', r, `Draft "${v.label}" deleted`);
  raw.splice(idx-1,1); if(!raw.length) delete STORE.versions[r.id];
  saveStore();
}
function audit(type,r,text){
  STORE.audit.unshift({ts:new Date().toISOString(), type, relayId:r?r.id:'', relayName:r?r.name:'',
    bay:r?(bayOf(r.id)||{}).name:'', text});
  STORE.audit=STORE.audit.slice(0,400);
}

/* ---------- range / OOR ---------- */
function parseRange(rng){
  if(!rng) return null;
  const m=rng.match(/\[\s*(-?[\d.]+)\s*-\s*(-?[\d.]+)\s*\]/);
  if(!m) return null;
  return {lo:parseFloat(m[1]), hi:parseFloat(m[2])};
}
function isOOR(s){
  const r=parseRange(s.r); if(!r) return false;
  const v=parseFloat(s.v); if(isNaN(v)) return false;
  return v<r.lo-1e-9 || v>r.hi+1e-9;
}

/* ---------- description / value-meaning / custom column accessors -----------
   Baseline (shipped) values live on the setting object itself (s.desc / s.vm),
   populated from an imported "Setting Meaning" workbook. STORE holds any
   per-browser edits or later imports layered on top, per relay. ---------- */
function baseSetting(relayId,group,title){
  const r=relayById(relayId); if(!r) return null;
  const v=latestVersion(r);
  const g=v.groups.find(x=>x.group===group); if(!g) return null;
  return g.settings.find(s=>s.t===title)||null;
}
function getDesc(relayId,group,title){
  const m=STORE.descriptions[relayId];
  if(m && m[setKey(group,title)]!==undefined) return m[setKey(group,title)];
  const s=baseSetting(relayId,group,title);
  return (s&&s.desc)||'';
}
function setDesc(relayId,group,title,val){
  if(!STORE.descriptions[relayId]) STORE.descriptions[relayId]={};
  STORE.descriptions[relayId][setKey(group,title)]=val; saveStore();
}

/* ---------- flat settings helper (for pickers / cards / search / import) ---------- */
function flatSettings(r){
  const v=latestVersion(r); const out=[];
  v.groups.forEach(g=>g.settings.forEach(s=>out.push({group:g.group, ...s})));
  return out;
}
function findSetting(r,group,title){
  const v=latestVersion(r);
  const g=v.groups.find(x=>x.group===group); if(!g) return null;
  return g.settings.find(s=>s.t===title)||null;
}

  w=w||130; const col=VCOL[r.voltage]; const hasRev=STORE.versions[r.id]&&STORE.versions[r.id].length;

    <text x="${x-w/2+9}" y="${y+14.5}" fill="#E7EDF6" font-size="10.5" font-family="var(--mono)">${kindTag(r.kind)}</text>
    <text x="${x+w/2-8}" y="${y+14.5}" fill="${hasRev?'#41D081':'#5C6B82'}" font-size="9" text-anchor="end">${hasRev?'●v'+(STORE.versions[r.id].length+1):'v1'}</text></g>`;
}
function kindTag(k){
  const m={'Distance (21)':'21 Distance','Differential (87)':'87 Diff','REF (87N)':'87N REF',
    'Backup O/C-E/F (50/51)':'50/51 O·C-E·F','LBB / BF (50BF)':'50BF LBB','Busbar (87B)':'87B Bus',
    'Impedance (21)':'21 Imped.','Neutral Displacement (59N)':'59N NDR'};
  return m[k]||k.replace(/ \(.*\)/,'').slice(0,15);
}
function escq(s){return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

/* ---- 400kV: 1½ CB scheme, 5 diameters + aux-tap spare ICT ---- */
function render400SLD(){
  const diaBays = SUB.bays.filter(b=>b.voltage!=='220kV' && b.scheme==='diameter');
  const auxBay = SUB.bays.find(b=>b.scheme==='auxtap');
  const dias = [1,2,3,4,5].map(n=>({
    top: diaBays.find(b=>b.dia===n && b.pos==='top'),
    tie: diaBays.find(b=>b.dia===n && b.pos==='tie'),
    bot: diaBays.find(b=>b.dia===n && b.pos==='bottom')
  }));
  const colW=210, x0=140;
  const busITop=54, stubTop=30, gapMin=56, chipH=21;
  // compute each diameter's natural stack heights
  const segs = dias.map(d=>{
    const nT=(d.top?d.top.relays.length:0), nM=(d.tie?d.tie.relays.length:0), nB=(d.bot?d.bot.relays.length:0);
    const hT=Math.max(gapMin, nT*(chipH+4)+30);
    const hM=Math.max(46, nM*(chipH+4)+26);
    const hB=Math.max(gapMin, nB*(chipH+4)+30);
    return {hT,hM,hB,total:hT+hM+hB};
  });
  const maxTotal=Math.max(...segs.map(s=>s.total));
  const busIY=busITop, busIIY=busITop+stubTop+maxTotal+stubTop;
  const W = colW*5 + x0*1.4;
  const auxY = busIIY+70;
  const svgH = auxY+90;

  function diaSVG(d,i,seg){
    const cx=x0+i*colW+colW/2;
    let s='';
    const yTop = busIY+stubTop;
    const yTie = yTop+seg.hT;
    const yBot = yTie+seg.hM;
    // spine
    s+=`<line x1="${cx}" y1="${busIY}" x2="${cx}" y2="${busIIY}" stroke="#2E3B52" stroke-width="2"/>`;
    // breakers
    [ [yTop,'top',d.top], [yTie,'tie',d.tie], [yBot,'bot',d.bot] ].forEach(([y,pos,bay])=>{
      const col=bay?VCOL[bay.voltage]:'#5C6B82';
      s+=`<rect x="${cx-8}" y="${y-8}" width="16" height="16" fill="#0A0E14" stroke="${col}" stroke-width="2" rx="2" class="${bay?'baychip':''}" ${bay?`onclick="openBay('${bay.id}')" style="cursor:pointer"`:''}/>`;
      s+=`<text x="${cx}" y="${y+3.5}" fill="${col}" font-size="9" text-anchor="middle" font-family="var(--mono)">✕</text>`;
      if(bay){
        s+=`<text x="${cx}" y="${y-14}" fill="${col}" font-size="10" text-anchor="middle" font-family="var(--mono)" font-weight="700" style="cursor:pointer" onclick="openBay('${bay.id}')">${bay.num} ${bayShort(bay.name)}</text>`;
      }
    });
    // relay chip stacks: top grows UP from yTop into [busIY+stubTop.. yTop] region reversed (place just below label, above tie)
    if(d.top){
      d.top.relays.forEach((r,j)=>{ s+=relayChipSVG(cx, yTop+10+j*(chipH+4), r); });
    }
    if(d.tie){
      d.tie.relays.forEach((r,j)=>{ s+=relayChipSVG(cx, yTie+8+j*(chipH+4), r, 108); });
    }
    if(d.bot){
      d.bot.relays.forEach((r,j)=>{ s+=relayChipSVG(cx, yBot+10+j*(chipH+4), r); });
    }
    return s;
  }

  let body='';
  dias.forEach((d,i)=>{ body+=diaSVG(d,i,segs[i]); });

  // Bus rails
  const busSpan = colW*5;
  let rails=`<rect x="${x0-30}" y="${busIY-3}" width="${busSpan+60}" height="6" fill="var(--v400)" rx="2"/>
    <text x="${x0-36}" y="${busIY-12}" fill="var(--v400)" font-size="12" font-family="var(--mono)" font-weight="700">400 kV BUS-I</text>
    <rect x="${x0-30}" y="${busIIY-3}" width="${busSpan+60}" height="6" fill="var(--v400)" rx="2" opacity=".75"/>
    <text x="${x0-36}" y="${busIIY+22}" fill="var(--v400)" font-size="12" font-family="var(--mono)" font-weight="700">400 kV BUS-II</text>`;

  // Aux tap + spare ICT, off to the side beneath
  let auxS='';
  if(auxBay){
    const ax=x0+busSpan-70;
    auxS+=`<line x1="${x0-30}" y1="${busIIY+30}" x2="${x0+busSpan+30}" y2="${busIIY+30}" stroke="var(--vbus)" stroke-width="2" stroke-dasharray="5 4"/>`;
    auxS+=`<text x="${x0-36}" y="${busIIY+45}" fill="var(--vbus)" font-size="10.5" font-family="var(--mono)">400 kV AUX BUS</text>`;
    auxS+=`<line x1="${ax}" y1="${busIIY+30}" x2="${ax}" y2="${auxY-10}" stroke="var(--vict)" stroke-width="2"/>`;
    auxS+=`<rect x="${ax-8}" y="${auxY-10}" width="16" height="16" fill="#0A0E14" stroke="var(--vict)" stroke-width="2" rx="2" style="cursor:pointer" onclick="openBay('${auxBay.id}')"/>`;
    auxS+=`<text x="${ax}" y="${auxY+20}" fill="var(--vict)" font-size="10" text-anchor="middle" font-family="var(--mono)" font-weight="700" style="cursor:pointer" onclick="openBay('${auxBay.id}')">${auxBay.num} ${bayShort(auxBay.name)}</text>`;
    auxBay.relays.forEach((r,j)=>{ auxS+=relayChipSVG(ax, auxY+30+j*(chipH+4), r); });
  }

  return `<svg viewBox="0 0 ${W} ${svgH}" width="100%" style="min-width:${Math.min(W,1500)}px">${rails}${body}${auxS}</svg>`;
}
function bayShort(n){return n.replace(/^400\/220 kV |^400 kV |^220 kV /,'').replace(/\(.*\)/,'').trim();}

/* ---- 220kV: double main bus + transfer bus ---- */
function render220SLD(){
  const bays220 = SUB.bays.filter(b=>b.voltage==='220kV');
  const order=['ICT 2 IV','ICT 1 IV','Ahilyanagar','Bhose','Bus Coupler','TBC','Shirsuphal','Bhigwan','Jeur','Jeur'];
  const sorted=[...bays220].sort((a,b)=>(parseInt(a.num)||999)-(parseInt(b.num)||999));
  const colW=150, x0=130, chipH=21;
  const maxN=Math.max(1,...sorted.map(b=>b.relays.length));
  const busIY=60, busIIY=88, chipsTop=140;
  const svgH=chipsTop + maxN*(chipH+4) + 80;
  const busSpan=colW*sorted.length;

  let rails=`<rect x="${x0-30}" y="${busIY-3}" width="${busSpan+60}" height="5" fill="var(--v220)" rx="2"/>
    <text x="${x0-36}" y="${busIY-11}" fill="var(--v220)" font-size="12" font-family="var(--mono)" font-weight="700">220 kV BUS-I</text>
    <rect x="${x0-30}" y="${busIIY-3}" width="${busSpan+60}" height="5" fill="var(--v220)" rx="2" opacity=".8"/>
    <text x="${x0-36}" y="${busIIY+16}" fill="var(--v220)" font-size="11" font-family="var(--mono)" font-weight="700">BUS-II</text>
    <line x1="${x0-30}" y1="${svgH-24}" x2="${x0+busSpan+30}" y2="${svgH-24}" stroke="var(--vbus)" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="${x0-36}" y="${svgH-10}" fill="var(--vbus)" font-size="11" font-family="var(--mono)" font-weight="700">TRANSFER BUS</text>`;

  let body='';
  sorted.forEach((b,i)=>{
    const cx=x0+i*colW+colW/2, col=VCOL['220kV'];
    const isTBC=/tbc/i.test(b.name);
    body+=`<line x1="${cx}" y1="${busIIY}" x2="${cx}" y2="${busIIY+22}" stroke="${col}" stroke-width="2"/>`;
    body+=`<rect x="${cx-8}" y="${busIIY+22}" width="16" height="16" fill="#0A0E14" stroke="${col}" stroke-width="2" rx="2" style="cursor:pointer" onclick="openBay('${b.id}')"/>`;
    body+=`<text x="${cx}" y="${busIIY+34}" fill="${col}" font-size="9" text-anchor="middle" font-family="var(--mono)">✕</text>`;
    body+=`<line x1="${cx}" y1="${busIIY+38}" x2="${cx}" y2="${chipsTop-6}" stroke="${col}" stroke-width="1" stroke-dasharray="2 2"/>`;
    body+=`<text x="${cx}" y="${busIIY+16}" fill="${col}" font-size="9.5" text-anchor="middle" font-family="var(--mono)" font-weight="700" style="cursor:pointer" onclick="openBay('${b.id}')">${b.num} ${bayShort(b.name)}</text>`;
    b.relays.forEach((r,j)=>{ body+=relayChipSVG(cx, chipsTop+j*(chipH+4), r, 128); });
    // dashed drop to transfer bus (all bays can transfer except pure couplers)
    body+=`<line x1="${cx}" y1="${chipsTop+b.relays.length*(chipH+4)+2}" x2="${cx}" y2="${svgH-24}" stroke="var(--vbus)" stroke-width="1" stroke-dasharray="3 3" opacity=".55"/>`;
    if(isTBC){
      body+=`<circle cx="${cx}" cy="${svgH-24}" r="4" fill="var(--vbus)"/>`;
    }
  });

  return `<svg viewBox="0 0 ${x0*2+busSpan} ${svgH}" width="100%" style="min-width:${Math.min(x0*2+busSpan,1500)}px">${rails}${body}</svg>`;
}

function openBay(bid){pushHistory(); ST.view='bay'; ST.bayId=bid; ST.relayId=null; render(); document.getElementById('rail').classList.remove('open');}
function diaContextHtml(bay){
  if(bay.scheme!=='diameter') return '';
  const dia=SUB.bays.filter(b=>b.dia===bay.dia).sort((a,b)=>({top:0,tie:1,bottom:2}[a.pos]-{top:0,tie:1,bottom:2}[b.pos]));
  return `<div class="diabadge">Diameter ${bay.dia}: ${dia.map(b=>`<b style="color:${b.id===bay.id?'var(--v400)':'var(--mute)'}">${b.num}</b>`).join(' — ')}</div>`;
}
function renderCardValue(r,card){
  return card.parts.map(p=>{
    if(p.type==='text') return p.value;
    const s=findSetting(r,p.group,p.title);
    if(!s) return '—';
    return s.v + (s.u?(' '+s.u):'');
  }).join('');
}
function renderCardMeaning(r,card){
  if(!cardMeaningsOn() || !showMeaningsOn()) return '';
  const bits=card.parts.filter(p=>p.type==='setting').map(p=>{
    const d=getDesc(r.id,p.group,p.title), v=getValueMeaning(r.id,p.group,p.title);
    return [d,v].filter(Boolean).join(' — ');
  }).filter(Boolean);
  if(!bits.length) return '';
  return `<div class="cardmeaning">${bits.join(' · ')}</div>`;
}
/* Unified card list: the relay's built-in "main" vitals are seeded once as
   ordinary (editable/deletable) literal-text cards, so main + custom cards
   live in one merged, reorderable collection under STORE.customCards. */
function cardsFor(r){
  if(!STORE.customCards[r.id]){
    STORE.customCards[r.id] = (r.vitals||[]).map(v=>({
      name:v.k, pinned:false, seeded:true, section:'',
      parts:[{type:'text', value:String(v.v)}]
    }));
    // persist the seed so ordering/edits stick
    try{saveStore();}catch(e){}
  }
  return STORE.customCards[r.id];
}
/* ---------- card sections (named groupings of cards) ---------- */
function cardSectionsOf(rid){ if(!STORE.cardSections[rid]) STORE.cardSections[rid]=[]; return STORE.cardSections[rid]; }
function addCardSection(rid,name){
  cardSectionsOf(rid).push({id:'sec'+Date.now(), name});
  saveStore();
}
function renameCardSection(rid,sid,name){
  const s=cardSectionsOf(rid).find(x=>x.id===sid); if(s){ s.name=name; saveStore(); }
}
function deleteCardSection(rid,sid){
  const arr=cardSectionsOf(rid);
  arr.splice(arr.findIndex(x=>x.id===sid),1);

/* group a relay's cards by section, in section order, plus an ungrouped bucket */
function groupCardsBySection(r){
  const sections=cardSectionsOf(r.id);
  const cards=cardsFor(r);
  const bySec={}; const ungrouped=[];
  cards.forEach((c,idx)=>{
    const sid=c.section||'';
    if(sid && sections.some(s=>s.id===sid)) (bySec[sid]=bySec[sid]||[]).push({card:c,idx});
    else ungrouped.push({card:c,idx});
  });
  return {sections, bySec, ungrouped, total:cards.length};
}
function pinnedCardsHtml(r){
  const cards=cardsFor(r).filter(c=>c.pinned);
  if(!cards.length) return '';
  const sections=cardSectionsOf(r.id);
  const bySec={}; const ungrouped=[];
  cards.forEach(c=>{
    const sid=c.section||'';
    if(sid && sections.some(s=>s.id===sid)) (bySec[sid]=bySec[sid]||[]).push(c);
    else ungrouped.push(c);
  });
  const cardBit=c=>`<div class="vit"><div class="k">${c.name}</div><div class="v">${renderCardValue(r,c)}</div>${renderCardMeaning(r,c)}</div>`;
  let h='';
  sections.forEach(sec=>{
    const items=bySec[sec.id]; if(!items||!items.length) return;
    h+=`<div class="pinnedsec"><div class="pinnedsec-h">${sec.name}</div><div class="pinnedcards">${items.map(cardBit).join('')}</div></div>`;
  });
  if(ungrouped.length) h+=`<div class="pinnedcards">${ungrouped.map(cardBit).join('')}</div>`;
  return h;
}

Write a SHORT (3-5 sentence) note starting with "This is an Outage." then giving this specific relay's relevance/role with respect to the outage (e.g. whether it needed to operate, was isolated, or is unaffected). Be precise and factual; do not invent fault currents or timings not given.`
    : `You are a transmission protection engineer's assistant analysing a tripping/fault event. Bay: ${bay.name} (${bay.voltage}). Relay under analysis: ${r.name} — ${r.family} ${r.model||''}, protection function "${r.kind}". Key relay parameters: ${vit||'n/a'}. Event date: ${rec.date}${rec.time?(' '+rec.time):''}. Event title: ${rec.title||'—'}. Additional event details: ${extra||'none'}. Previous engineer note for this relay (if any): ${a.userText||'none'}.

/* ================= SHARED SETTINGS TABLE ================= */
/* opts: {onEditAttr(gi,si), onlyKeys: Set|null (curated mode), readOnlyDesc:false, compact:false} */
function settingsTableHtml(r, cur, cmp, query, editable, opts){
  opts=opts||{};
  const q=(query||'').trim().toLowerCase();
  const onlyKeys=opts.onlyKeys||null;
  let cmpMap={};
  if(cmp) cmp.groups.forEach(g=>g.settings.forEach(s=>cmpMap[setKey(g.group,s.t)]=s.v));
  const cols=getCustomCols(r.id);
  const showMeanings=showMeaningsOn();
  const meaningsEdit=showMeanings && !opts.readOnlyDesc && !!opts.meaningsEditing;
  let html=''; let changedTotal=0, oorTotal=0;
  cur.groups.forEach((g,gi)=>{
    let rows=''; let shown=0, gchanged=0;
    g.settings.forEach((s,si)=>{
      const key=setKey(g.group,s.t);
      if(onlyKeys && !onlyKeys.has(key)) return;
      if(q && !(s.t.toLowerCase().includes(q)||String(s.v).toLowerCase().includes(q))) return;
      shown++;
      const oor=isOOR(s); if(oor) oorTotal++;
      const was=cmp?cmpMap[key]:undefined;
      const changed=cmp && was!==undefined && String(was)!==String(s.v);
      if(changed){gchanged++; changedTotal++;}
      const valCell = editable
        ? `<input class="edit" value="${String(s.v).replace(/"/g,'&quot;')}" onchange="${opts.onEditAttr?opts.onEditAttr(gi,si):''}">`
        : `<span class="tv ${changed?'changed':''} ${oor?'oor':''}">${s.v||'—'}</span>${changed?`<span class="wasval">${was}</span>`:''}`;
      let descCell='', vmCell='';
      if(showMeanings){
        const desc=getDesc(r.id,g.group,s.t);
        const vm=getValueMeaning(r.id,g.group,s.t);
        if(opts.readOnlyDesc){
          descCell=`<span class="meaningtxt">${desc||'—'}</span>`;
          vmCell=`<span class="meaningtxt">${vm||'—'}</span>`;
        } else if(meaningsEdit){
          descCell=`<div class="desccell"><textarea class="desctxt" rows="2" placeholder="What this setting does…" onchange="onDescChange('${r.id}','${escq(g.group)}','${escq(s.t)}',this.value)">${desc}</textarea>
             ${aiMeaningsOn()?`<button class="aigen" onclick="openMeaningAssist('${r.id}','${escq(g.group)}','${escq(s.t)}','desc')">✨ AI assist</button>`:''}</div>`;
          vmCell=`<div class="desccell"><textarea class="desctxt" rows="2" placeholder="What this value means…" onchange="onVmChange('${r.id}','${escq(g.group)}','${escq(s.t)}',this.value)">${vm}</textarea>
             ${aiMeaningsOn()?`<button class="aigen" onclick="openMeaningAssist('${r.id}','${escq(g.group)}','${escq(s.t)}','vm')">✨ AI assist</button>`:''}</div>`;
        } else {
          descCell=`<span class="meaningtxt">${desc||'—'}</span>`;
          vmCell=`<span class="meaningtxt">${vm||'—'}</span>`;
        }
      }
      let colTds='';
      cols.forEach(c=>{
        const cv=getColVal(r.id,g.group,s.t,c);
        colTds += opts.readOnlyDesc
          ? `<td>${cv||'—'}</td>`

      });

        <td class="tt">${s.t}</td><td>${valCell}</td><td class="tu">${s.u||''}</td>

    });

      html+=`<div class="ggrp closed"><div class="ghead" onclick="this.parentNode.classList.toggle('closed')"><span class="car">▾</span><span class="gn">${g.group}</span><span class="gc">${shown} settings</span></div>
        <div class="gbody"><table class="st"><thead><tr><th class="flagcol"></th><th>Setting</th><th>Value</th><th>Unit</th>${showMeanings?'<th>Setting Title Meaning</th><th>Value Meaning</th>':''}</tr></thead>
        <tbody>${g.settings.filter(s=>onlyKeys.has(setKey(g.group,s.t))).map(s=>{
          const oor=isOOR(s);
          const mtd = showMeanings ? `<td class="meaningtxt">${getDesc(r.id,g.group,s.t)||'—'}</td><td class="meaningtxt">${getValueMeaning(r.id,g.group,s.t)||'—'}</td>` : '';
          return `<tr><td class="flagcol"><span class="flag">${oor?'⚠️':''}</span></td><td class="tt">${s.t}</td><td><span class="tv ${oor?'oor':''}">${s.v||'—'}</span></td><td class="tu">${s.u||''}</td>${mtd}</tr>`;
        }).join('')}</tbody></table></div></div>`;
      return;
    }
    html+=`<div class="ggrp ${gi>0&&!q?'closed':''}">
      <div class="ghead" onclick="this.parentNode.classList.toggle('closed')">
        <span class="car">▾</span><span class="gn">${g.group}</span>
        ${gchanged?`<span class="tg" style="background:var(--gold-p);color:var(--gold-d);font-size:10px;padding:1px 7px;border-radius:4px;font-family:var(--mono)">${gchanged} changed</span>`:''}
        <span class="gc">${shown} settings</span></div>
      <div class="gbody"><table class="st"><thead><tr>
        <th class="flagcol"></th><th>Setting</th><th>Value</th><th>Unit</th><th>Step</th><th>Range</th>${showMeanings?'<th>Setting Title Meaning</th><th>Value Meaning</th>':''}
        ${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>
    </div>`;
  });
  const banner=(oorTotal||changedTotal)?`<div style="display:flex;gap:14px;margin-bottom:10px;font-size:12px">
    ${changedTotal?`<span style="color:var(--revised)">● ${changedTotal} changed vs v${cmp.num}</span>`:''}
    ${oorTotal?`<span style="color:var(--alarm)">⚠️ ${oorTotal} outside stated range</span>`:''}</div>`:'';
  return banner+(html||`<div class="empty">${onlyKeys? 'No settings selected yet.' : ('No settings match "'+(query||'')+'".')}</div>`);
}

function editVal(gi,si,val){

/* ================= EDIT EXISTING SETTINGS (typo / data-entry corrections) =================
   Distinct from Revise: this does NOT create a new engineering revision. It corrects the
   value of specific settings within whichever version is currently open (including the
   baseline, via a one-time mutable copy), logs every change with date/reason/attachments/
   user in a reverse-chronological history, and optionally marks the version Applied. */
function openEditExistingSettings(relayId){
  if(!requireEdit()) return;
  modal(`<div class="mh"><h3>Edit Existing Settings</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <div class="hint" style="color:var(--alarm)"><b>⚠ For typographical or data-entry corrections only.</b> If the relay's actual settings are being changed as an engineering decision, cancel this and use <b>Revise Settings</b> instead — that creates a proper dated, checked revision with its own approval trail.</div>
      <div class="hint">Pick the specific settings that need correcting, record why, and optionally attach evidence (e.g. a corrected nameplate photo or source document). Every correction is logged, reverse-chronologically, on this relay's page.</div>
    </div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn pri" onclick="startCorrection('${relayId}')">Continue</button></div>`);
}
function startCorrection(relayId){
  if(!requireEdit()) return;
  const r=relayById(relayId);
  const vs=versionsOf(r); const v=vs[ST.verIdx];
  if(v.base){
    if(!STORE.baselineOverride) STORE.baselineOverride={};
    if(!STORE.baselineOverride[relayId]){ STORE.baselineOverride[relayId]=deepGroups(r.groups); saveStore(); }
  }
  closeModal();
  window.__corr={relayId, versionId:v.id, changes:{}, attachments:[]};
  ST.correcting=true; ST.editing=false;
  renderRelay(relayId);
}
function cancelCorrection(){
  ST.correcting=false; window.__corr=null; renderRelay(ST.relayId);
}
function suggestCorrTag(r,v){
  const base=v.base?'v1':('v'+v.num);
  const n=(STORE.corrections[r.id]||[]).filter(c=>c.versionId===v.id).length+1;
  return base+'.'+n;
}
function correctionBarHtml(r){
  const vs=versionsOf(r); const v=vs[ST.verIdx];

  const lastUser=STORE.lastCorrUser||'';
  return `<div class="corrbar">

      <span class="hint" id="corrCount">0 changes pending</span>

    </div>
    <div class="f2">
      <div class="fld"><label>Date</label><input id="corr_date" type="date" value="${today}"></div>
      <div class="fld"><label>Corrected by</label><input id="corr_user" placeholder="Your name" value="${lastUser}"></div>
    </div>
    <div class="fld"><label>Reason</label><textarea id="corr_reason" placeholder="e.g. Corrected transcription error — nameplate reads 71.02, sheet had 71.2"></textarea></div>
    <div class="fld"><label>Version tag for this correction</label><input id="corr_tag" value="${suggestCorrTag(r,v)}"></div>
    <div class="fld"><label>Attachments</label>

      <div class="hint">Images or PDFs — e.g. the source document, corrected nameplate photo, or approval email.</div>
    </div>
    <button class="btn pri" onclick="saveCorrection()">💾 Save Settings</button>

}
document.getElementById('correctionAttachInput').addEventListener('change', e=>{
  const files=[...e.target.files]; if(!files.length || !window.__corr) return;
  let remaining=files.length;
  files.forEach(f=>{
    const rd=new FileReader();
    rd.onload=()=>{
      window.__corr.attachments.push({name:f.name, mime:f.type, dataUrl:rd.result});
      remaining--;
      if(remaining===0) refreshCorrAttachList();
    };
    rd.readAsDataURL(f);
  });
  e.target.value='';
});
function refreshCorrAttachList(){
  const host=document.getElementById('corrAttachList'); if(!host||!window.__corr) return;
  host.innerHTML=window.__corr.attachments.map((a,i)=>`<span class="chip attach-chip">📎 ${a.name}
    <button onclick="viewPendingAttachment(${i})" title="View">👁</button>
    <button onclick="removePendingAttachment(${i})" title="Remove">✕</button></span>`).join('') || '<span class="hint">No attachments added yet.</span>';
}
function viewPendingAttachment(i){
  const a=window.__corr.attachments[i];
  AttachmentViewer.open({dataUrl:a.dataUrl, name:a.name, title:a.name, mime:a.mime, canHighlight:false});
}
function removePendingAttachment(i){ window.__corr.attachments.splice(i,1); refreshCorrAttachList(); }
function correctionEditVal(gi,si,inputVal){
  if(!requireEdit()) return;
  const r=relayById(window.__corr.relayId); const vs=versionsOf(r); const v=vs[ST.verIdx];
  const g=v.groups[gi]; const s=g.settings[si]; const key=setKey(g.group,s.t);
  if(!window.__corr.changes[key]) window.__corr.changes[key]={group:g.group, title:s.t, old:s.v};
  window.__corr.changes[key].new=inputVal;
  if(String(window.__corr.changes[key].old)===String(inputVal)) delete window.__corr.changes[key];
  const n=Object.keys(window.__corr.changes).length;
  const el=document.getElementById('corrCount'); if(el) el.textContent=`${n} change${n===1?'':'s'} pending`;
}
function saveCorrection(){
  if(!requireEdit()) return;
  const {relayId, changes}=window.__corr;
  const changeList=Object.values(changes);
  if(!changeList.length){ toast('Change at least one value before saving.','err'); return; }
  const reason=val('corr_reason');
  if(!reason){ toast('Enter a reason for the correction.','err'); return; }
  const date=val('corr_date'); const user=val('corr_user'); const tag=val('corr_tag');
  const r=relayById(relayId); const vs=versionsOf(r); const v=vs[ST.verIdx];
  changeList.forEach(c=>{
    const g=v.groups.find(x=>x.group===c.group); const s=g.settings.find(x=>x.t===c.title);
    if(s) s.v=c.new;
  });
  if(!STORE.corrections[relayId]) STORE.corrections[relayId]=[];
  const rec={id:'corr'+Date.now(), versionId:v.id, versionLabel:v.base?'v1':('v'+v.num), date, reason,
    user, newTag:tag, attachments:window.__corr.attachments, changes:changeList,
    createdAt:new Date().toISOString(), madeDefault:false};
  STORE.corrections[relayId].unshift(rec);
  STORE.lastCorrUser=user;
  audit('edit', r, `${changeList.length} setting(s) corrected on ${rec.versionLabel} (${tag}): ${changeList.map(c=>c.title).join(', ')}`);
  saveStore();
  ST.correcting=false; window.__corr=null;
  renderRelay(relayId);
  toast(`${changeList.length} setting(s) corrected and saved.`);
  if(!v.base && v.status!=='applied'){
    setTimeout(()=>{
      if(confirm(`Mark ${rec.versionLabel} as the Applied (in-service) version now?`)){
        applyVersion(r, ST.verIdx);
        rec.madeDefault=true; saveStore();
        renderRelay(relayId);
      }
    },50);
  }
}
function correctionHistoryHtml(r){
  const list=STORE.corrections[r.id]||[];
  if(!list.length) return '';
  return `<div style="display:flex;align-items:center;gap:10px;margin:26px 0 8px">
      <h3 style="margin:0;font-size:14px;font-family:var(--serif);color:var(--navy)">Correction history</h3>

function viewCorrectionAttachment(relayId,corrIdx,attIdx){

/* ================= RELAY SETTINGS OVERVIEW (Google-Sheet-backed) =================
   A curated, sectioned "cheat sheet" per relay (Parameter/Value/Unit/Notes), mirroring
   the Quick Reference style. The canonical copy lives in a Google Sheet (one tab per
   relay, created on demand via Apps Script) so engineers can add/edit rows there with
   dropdown-assisted data entry; the portal shows a read-only mirror and syncs on demand.
   Until GOOGLE_SHEET_API_URL is configured, entries are kept locally only. */
/* ================= OVERVIEW (relay / bay / substation) =================
   Freeform, multi-tab: each "section" is a real, blank Google Sheet tab with
   NO imposed structure — whatever is typed or pasted there is mirrored back
   here exactly as-is, including each column's width. All editing happens in
   the sheet itself (or via "Upload Excel"); there is no "add entry" button
   here on purpose. */
function overviewStoreBucket_(kind){
  if(kind==='bay') return STORE.bayOverview;
  if(kind==='sub') return STORE.subOverview;
  return STORE.relayOverview;
}
function overviewBlocksFor(kind,id){
  const bucket=overviewStoreBucket_(kind);
  if(!bucket[id] || !Array.isArray(bucket[id])) bucket[id]=[]; // resets any old templated-schema data
  return bucket[id];
}
function overviewActiveKey_(kind,id){ return kind+':'+id; }
function overviewActiveBlockId(kind,id){
  const blocks=overviewBlocksFor(kind,id);
  if(!blocks.length) return null;
  const stored=ST.overviewActive[overviewActiveKey_(kind,id)];
  return blocks.some(b=>b.blockId===stored) ? stored : blocks[0].blockId;
}
function overviewEntity_(kind,id){
  if(kind==='relay') return relayById(id);
  if(kind==='bay') return bayById(id);
  return {id:'SUBSTATION', name:SUB.name};
}
function overviewRerender_(kind,id){
  if(kind==='relay' && ST.view==='relay' && ST.relayId===id) renderRelay(id);
  if(kind==='bay' && ST.view==='bay' && ST.bayId===id) renderBay(id);
  if(kind==='sub' && ST.view==='suboverview') renderSubOverview();
}
async function gsCall(payload){
  if(!GOOGLE_SHEET_API_URL) throw {noUrl:true};
  const res=await fetch(GOOGLE_SHEET_API_URL, {method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(payload)});
  const data=await res.json();
  if(!data.ok) throw new Error(data.error||'Unknown error from sheet backend');
  return data;
}
const __ovwListed=new Set();
function ensureOverviewBlocksLoaded(kind,id){
  if(!GOOGLE_SHEET_API_URL) return;
  const key=kind+':'+id;
  if(__ovwListed.has(key)) return;
  const blocks=overviewBlocksFor(kind,id);
  if(blocks.length) { __ovwListed.add(key); return; } // already have local/cached knowledge
  __ovwListed.add(key);
  gsCall({action:'listBlocks', entityId:id}).then(data=>{
    if(!data.blocks || !data.blocks.length) return;
    const arr=overviewBlocksFor(kind,id);
    data.blocks.forEach(b=>{ if(!arr.some(x=>x.blockId===b.blockId)) arr.push({blockId:b.blockId, name:b.blockId, gid:b.gid, rows:[], colWidths:[], sheetUrl:'', lastSync:''}); });
    saveStore();
    const first=arr[0];
    return gsCall({action:'get', entityId:id, blockId:first.blockId}).then(content=>{
      Object.assign(first, {rows:content.rows||[], colWidths:content.colWidths||[], sheetUrl:content.sheetUrl, lastSync:new Date().toISOString()});
      saveStore(); overviewRerender_(kind,id);
    });
  }).catch(e=>console.error('could not list overview blocks', e));
}

async function addOverviewBlock(kind,id){
  if(!requireEdit()) return;
  const name=prompt('Name this section (e.g. "Commissioning Notes", "Zone Summary"):');
  if(!name||!name.trim()) return;
  const blockId='blk'+Date.now();
  const blocks=overviewBlocksFor(kind,id);
  const newBlock={blockId, name:name.trim(), rows:[], colWidths:[], sheetUrl:'', lastSync:''};
  blocks.push(newBlock);
  ST.overviewActive[overviewActiveKey_(kind,id)]=blockId;
  saveStore(); overviewRerender_(kind,id);
  if(GOOGLE_SHEET_API_URL){
    try{
      const data=await gsCall({action:'ensure', entityId:id, blockId, title:name.trim()});
      Object.assign(newBlock, {rows:data.rows||[], colWidths:data.colWidths||[], sheetUrl:data.sheetUrl, lastSync:new Date().toISOString()});
      saveStore(); overviewRerender_(kind,id);

function deleteOverviewBlockConfirm(kind,id,blockId){
  if(!requireEdit()) return;
  if(!confirm('Delete this section? This removes its tab from the spreadsheet too.')) return;
  const blocks=overviewBlocksFor(kind,id);
  const idx=blocks.findIndex(b=>b.blockId===blockId);
  if(idx<0) return;
  blocks.splice(idx,1);
  if(ST.overviewActive[overviewActiveKey_(kind,id)]===blockId) delete ST.overviewActive[overviewActiveKey_(kind,id)];
  saveStore(); overviewRerender_(kind,id);
  if(GOOGLE_SHEET_API_URL) gsCall({action:'deleteBlock', entityId:id, blockId}).catch(e=>console.error(e));
}
async function refreshOverviewBlock(kind,id,blockId){
  if(!GOOGLE_SHEET_API_URL){ toast('Not connected to the shared spreadsheet yet.','warn'); return; }
  try{
    const data=await gsCall({action:'get', entityId:id, blockId});
    const blocks=overviewBlocksFor(kind,id);
    const block=blocks.find(b=>b.blockId===blockId);
    if(block) Object.assign(block, {rows:data.rows||[], colWidths:data.colWidths||[], sheetUrl:data.sheetUrl||block.sheetUrl, lastSync:new Date().toISOString()});

document.getElementById('overviewExcelInput').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f || !window.__excelUploadTarget) return;
  const {kind,id,blockId}=window.__excelUploadTarget;
  const rd=new FileReader();
  rd.onload=async ()=>{
    try{
      const wb=XLSX.read(rd.result,{type:'array'});
      const firstSheet=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(firstSheet,{header:1, raw:false, defval:''});
      if(!GOOGLE_SHEET_API_URL){ toast('Not connected to the shared spreadsheet yet.','warn'); return; }
      const data=await gsCall({action:'save', entityId:id, blockId, rows});
      const blocks=overviewBlocksFor(kind,id);
      let block=blocks.find(b=>b.blockId===blockId);
      if(!block){ block={blockId, name:blockId}; blocks.push(block); }
      Object.assign(block, {rows, colWidths:block.colWidths||[], sheetUrl:data.sheetUrl, lastSync:new Date().toISOString()});
      saveStore(); overviewRerender_(kind,id);
      toast('Uploaded to the sheet.');
    }catch(err){ console.error(err); toast('Could not read/upload that Excel file.','err'); }
  };
  rd.readAsArrayBuffer(f); e.target.value='';
});

function cbFilter(i,q){
  const {rid}=window.__cb; const r=relayById(rid);
  const flat=flatSettings(r);
  const query=(q||'').trim().toLowerCase();
  function hay(s){
    const desc=getDesc(rid,s.group,s.t), vm=getValueMeaning(rid,s.group,s.t);
    return [s.group, s.t, s.v, s.u, desc, vm].filter(Boolean).join(' ').toLowerCase();
  }
  const matches=(query?flat.filter(s=>hay(s).includes(query)):flat).slice(0,40);
  const drop=document.getElementById('cbDrop_'+i); if(!drop) return;
  if(!matches.length){ drop.innerHTML='<div class="cbdrop-item cbdrop-empty">No matching settings</div>'; drop.classList.remove('hide'); return; }
  drop.innerHTML=matches.map(s=>{
    const desc=getDesc(rid,s.group,s.t), vm=getValueMeaning(rid,s.group,s.t);

    return `<div class="cbdrop-item" onmousedown="cbSelectSetting(${i},'${escq(s.group)}','${escq(s.t)}')">

  }).join('');

}

function pickToggle(key,on){

  if(on) sel.add(key); else sel.delete(key);
  document.querySelector('.selcount').textContent=sel.size+' setting'+(sel.size===1?'':'s')+' selected';

function pickGroupToggle(group,on){
  const {rid,sel}=window.__picker; const r=relayById(rid); const cur=latestVersion(r);

}

/* ---------- import setting meanings from Excel ---------- */
function importMeaningsFromWorkbook(rid, wb){
  const r=relayById(rid);
  let matched=0, seen=0;
  wb.SheetNames.forEach(sn=>{
    if(/quick reference/i.test(sn)) return;
    const group=sn.replace(/ Settings$/i,'');
    const g=latestVersion(r).groups.find(x=>x.group===group);
    if(!g) return;
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1});
    let hidx=-1, col={};
    for(let i=0;i<rows.length;i++){
      const row=rows[i];
      if(row && row[0]==='Index' && row.includes('Setting Title')){hidx=i; row.forEach((name,ci)=>{if(name) col[name]=ci;}); break;}
    }
    if(hidx<0) return;
    for(let i=hidx+1;i<rows.length;i++){
      const row=rows[i]; if(!row || row[col['Setting Title']]===undefined) continue;
      seen++;
      const title=row[col['Setting Title']];
      const sm='Setting Meaning' in col ? row[col['Setting Meaning']] : '';
      const vm='Value Meaning' in col ? row[col['Value Meaning']] : '';
      const s=g.settings.find(x=>x.t===title);
      if(!s) continue;
      if(sm){setDescSilent(rid, group, title, String(sm));}
      if(vm){setValueMeaningSilent(rid, group, title, String(vm));}
      matched++;
    }
  });
  return {matched, seen};
}
function openImportMeanings(rid){
  if(!requireEdit()) return;
  window.__importRid=rid;
  document.getElementById('meaningsInput').click();
}
document.getElementById('meaningsInput').addEventListener('change', e=>{

  const rid=window.__importRid; const r=relayById(rid);
  const rd=new FileReader();

      saveStore();

      saveStore();
      if(ST.view==='relay' && ST.relayId===rid) refreshRelaySettings(rid);
      toast(`Imported meanings for ${matched} of ${seen} settings.`);

});

/* ---------- substation-level bulk meanings import: auto-matches each uploaded
   file to a relay by filename, so many relays can be imported in one go ---------- */
function openImportMeaningsBulk(){
  if(!requireEdit()) return;
  document.getElementById('meaningsBulkInput').click();
}
function normFileKey(s){
  return (s||'').toLowerCase().replace(/\.(xlsx|xls)$/,'').replace(/[\s_\-]*with[\s_\-]*setting[\s_\-]*meaning[\s_\-]*\(?1?\)?/,'').replace(/[^a-z0-9]/g,'');
}
function matchRelayByFilename(name){
  const key=normFileKey(name);
  let best=null, bestScore=0;
  Object.values(RELAYS).forEach(r=>{
    const rkey=normFileKey(r.file||r.name);
    if(!rkey) return;
    let score=0;
    if(rkey===key) score=100;
    else if(key.includes(rkey)||rkey.includes(key)) score=Math.min(rkey.length,key.length);
    if(score>bestScore){bestScore=score; best=r;}
  });
  return bestScore>=6 ? best : null; // require a reasonably long match to avoid false positives
}
document.getElementById('meaningsBulkInput').addEventListener('change', e=>{
  const files=[...e.target.files]; if(!files.length) return;
  let remaining=files.length;
  const results=[]; // {file, relay, matched, seen} or {file, unmatched:true}
  files.forEach(f=>{
    const relay=matchRelayByFilename(f.name);
    if(!relay){ results.push({file:f.name, unmatched:true}); if(--remaining===0) finishBulkImport(results); return; }
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const wb=XLSX.read(rd.result,{type:'array'});
        const {matched,seen}=importMeaningsFromWorkbook(relay.id, wb);
        audit('import', relay, `Imported setting/value meanings from ${f.name} (${matched} matched, substation-level upload)`);
        results.push({file:f.name, relay:relay.name, matched, seen});
      }catch(err){ console.error(err); results.push({file:f.name, relay:relay.name, error:true}); }
      if(--remaining===0) finishBulkImport(results);
    };
    rd.readAsArrayBuffer(f);
  });
  e.target.value='';
});
function finishBulkImport(results){
  saveStore();
  const ok=results.filter(r=>r.matched!==undefined && !r.error);
  const unmatched=results.filter(r=>r.unmatched);
  const errored=results.filter(r=>r.error);
  const totalMatched=ok.reduce((a,r)=>a+r.matched,0);
  let msg=`Imported meanings into ${ok.length} relay(s) — ${totalMatched} settings matched.`;
  if(unmatched.length) msg+=` ${unmatched.length} file(s) could not be matched to a relay by name.`;
  if(errored.length) msg+=` ${errored.length} file(s) failed to read.`;
  toast(msg, unmatched.length||errored.length?'warn':undefined);
  showBulkImportReport(results);
  if(ST.view==='relay') refreshRelaySettings(ST.relayId);
  if(ST.view==='overview') render();
}
function showBulkImportReport(results){
  const rows=results.map(r=>{
    if(r.unmatched) return `<tr><td class="tt">${r.file}</td><td colspan="2" style="color:var(--alarm)">No matching relay found</td></tr>`;
    if(r.error) return `<tr><td class="tt">${r.file}</td><td colspan="2" style="color:var(--alarm)">Could not read file</td></tr>`;
    return `<tr><td class="tt">${r.file}</td><td>${r.relay}</td><td>${r.matched} of ${r.seen} matched</td></tr>`;
  }).join('');
  modal(`<div class="mh"><h3>Bulk meanings import — results</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb"><table class="st"><thead><tr><th>File</th><th>Matched relay</th><th>Result</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="mf"><button class="btn pri" onclick="closeModal()">Done</button></div>`);
}

function manualCategorize(){
  const isReactor=b=>/reactor/i.test(b.name);
  const isIct=b=>/ict/i.test(b.name);
  const isCoupler=b=>/bus coupler|tbc/i.test(b.name);
  const cats=[
    ['400 kV Lines', BAYS.filter(b=>b.voltage==='400kV'&&b.pos==='top'&&!isReactor(b))],
    ['220 kV Lines', BAYS.filter(b=>b.voltage==='220kV'&&b.scheme==='feeder'&&!isIct(b)&&!isCoupler(b))],
    ['ICTs (400/220 kV Transformers)', BAYS.filter(b=>isIct(b)||b.scheme==='auxtap')],
    ['Bus Reactor', BAYS.filter(b=>isReactor(b))],
    ['Tie Breakers (LBB)', BAYS.filter(b=>b.pos==='tie')],
    ['220 kV Bus Coupler / Transfer', BAYS.filter(b=>b.voltage==='220kV'&&isCoupler(b))],
    ['Busbar Protection', BAYS.filter(b=>b.scheme==='busbar')]
  ];
  return cats.filter(([,bays])=>bays.length);
}
function enabledLogicSummary(r){
  const v=latestVersion(r); const hits=[];

function relaySheetRows(r){
  const cur=latestVersion(r); const cols=getCustomCols(r.id);
  const header=['Group','Setting','Value','Unit','Step','Range','Description','Value Meaning',...cols];
  const rows=[header];
  cur.groups.forEach(g=>g.settings.forEach(s=>{
    const desc=getDesc(r.id,g.group,s.t);
    const vm=getValueMeaning(r.id,g.group,s.t);
    const extra=cols.map(c=>getColVal(r.id,g.group,s.t,c));
    rows.push([g.group,s.t,s.v,s.u||'',s.s||'',s.r||'',desc,vm,...extra]);
  }));
  return rows;
}
function styleSheet(ws,ncols){
  try{
    const range=XLSX.utils.decode_range(ws['!ref']);
    for(let C=0;C<=range.e.c;C++){
      const addr=XLSX.utils.encode_cell({r:0,c:C});
      if(ws[addr]) ws[addr].s={font:{bold:true},fill:{fgColor:{rgb:'E5E7EB'}},alignment:{wrapText:true,vertical:'center'}};
    }
    for(let R=1;R<=range.e.r;R++) for(let C=0;C<=range.e.c;C++){
      const addr=XLSX.utils.encode_cell({r:R,c:C});
      if(ws[addr]) ws[addr].s={alignment:{wrapText:true,vertical:'top'}};
    }
    ws['!cols']=Array(ncols).fill(0).map((_,i)=>({wch: i===1?34:(i===6?40:16)}));
  }catch(e){ /* styling not supported in this SheetJS build — data export still succeeds */ }
}
function sheetName(base,used){
  let n=base.replace(/[\[\]\*\/\\\?:]/g,' ').trim().slice(0,31) || 'Sheet';
  let out=n, i=2;
  while(used.has(out)){out=(n.slice(0,28)+'_'+i); i++;}
  used.add(out); return out;
}
function exportWorkbook(relayIds,filename){
  const wb=XLSX.utils.book_new(); const used=new Set();
  relayIds.forEach(rid=>{
    const r=relayById(rid); if(!r) return;
    const bay=bayOf(rid);
    const rows=relaySheetRows(r);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    styleSheet(ws, rows[0].length);
    const nm=sheetName((bay?bay.num+' ':'')+r.kind.replace(/ \(.*\)/,''), used);
    XLSX.utils.book_append_sheet(wb, ws, nm);
  });
  try{ XLSX.writeFile(wb, filename, {cellStyles:true}); }
  catch(e){ XLSX.writeFile(wb, filename); }
}
function exportRelay(rid){
  const r=relayById(rid);
  exportWorkbook([rid], `${r.name.replace(/[^a-z0-9]+/gi,'_')}.xlsx`);
  toast('Relay settings exported.');
}
function exportBay(bid){
  const bay=bayById(bid);
  exportWorkbook(bay.relays.map(r=>r.id), `${bay.name.replace(/[^a-z0-9]+/gi,'_')}_settings.xlsx`);
