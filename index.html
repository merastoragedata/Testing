          <td class="num-cell">${fmtNum(it.rate)}</td>
          <td><span class="badge badge-neutral">${escapeHtml(sectionLabel(it.section))}</span></td>
        </tr>`;
    }).join('');
  }
  const pagEl = document.getElementById('ai-pagination');
  if (pagEl) {
    pagEl.innerHTML = `
      <span class="text-sm text-muted">${items.length.toLocaleString('en-IN')} items · Page ${AI.page} of ${totalPages}</span>
      <div class="flex gap-2">
        <button class="btn btn-ghost btn-sm" ${AI.page<=1?'disabled':''} onclick="aiChangePage(-1)">← Prev</button>
        <button class="btn btn-ghost btn-sm" ${AI.page>=totalPages?'disabled':''} onclick="aiChangePage(1)">Next →</button>
      </div>`;
  }
}
function aiChangePage(delta) { AI.page += delta; renderAIResults(); }

function sectionLabel(s) { return s==='supply'?'Supply':s==='project'?'Project':'O&M'; }

function onAICheckboxToggle(checkbox, key) {
  if (checkbox.checked) {
    const parts = splitKey(key);
    const src = allSelectableItems().find(it=>it.item_no===parts[0] && it.version===parts[1]);
    if (!src) return;
    AI.selected[key] = {
      item_no: src.item_no, version: src.version, description: src.description,
      uom: src.uom, rate: src.rate, qty: 1, section: src.section, remarks:'', isCustom: src.version==='NONSOR'
    };
    checkbox.closest('tr').classList.add('ai-row-selected');
  } else {
    delete AI.selected[key];
    checkbox.closest('tr').classList.remove('ai-row-selected');
  }
  renderAISelectedPanel();
}

function renderAISelectedPanel() {
  const keys = Object.keys(AI.selected);
  const card = document.getElementById('ai-selected-card');
  const countEl = document.getElementById('ai-selected-count');
  const countBadge = document.getElementById('ai-count');
  const countBadgeBottom = document.getElementById('ai-count-bottom');
  if (countEl) countEl.textContent = keys.length;
  if (countBadge) countBadge.textContent = keys.length;
  if (countBadgeBottom) countBadgeBottom.textContent = keys.length;
  if (!card) return;
  if (!keys.length) { card.style.display = 'none'; return; }
  card.style.display = '';
  const body = document.getElementById('ai-selected-body');
  body.innerHTML = keys.map(key => {
    const it = AI.selected[key];
    return `
      <tr>
        <td class="mono">${escapeHtml(it.item_no)}</td>
        <td>${escapeHtml(it.description)}</td>
        <td>${escapeHtml(it.uom)}</td>
        <td class="num-cell">${fmtNum(it.rate)}</td>
        <td><input type="number" class="qty-input" value="${it.qty}" min="0" step="any" oninput="onAISelectedQtyInput('${key.replace(/'/g,"\\'")}', this.value)"></td>
        <td><button class="btn btn-danger btn-sm" onclick="removeAISelected('${key.replace(/'/g,"\\'")}')">✕</button></td>
      </tr>`;
  }).join('');
}
function onAISelectedQtyInput(key, val) {
  const qty = parseFloat(val);
  if (AI.selected[key]) AI.selected[key].qty = isNaN(qty) ? 0 : qty;
}
function removeAISelected(key) {
  delete AI.selected[key];
  renderAISelectedPanel();
  const row = document.querySelector(`#ai-results-body tr[data-key="${CSS.escape(key)}"]`);
  if (row) { const cb = row.querySelector('input[type=checkbox]'); if (cb) cb.checked = false; row.classList.remove('ai-row-selected'); }
}
function clearAISelection() {
  AI.selected = {};
  renderAISelectedPanel();
  renderAIResults();
}

function splitKey(key) {
  const idx = key.lastIndexOf('__');
  return [key.slice(0,idx), key.slice(idx+2)];
}

}
function selectNSSection(sec) {
  document.querySelectorAll('#ns-section-pills .radio-pill').forEach(el=>el.classList.toggle('sel', el.dataset.sec===sec));
}
async function submitNonSOR(context, origItemNo) {
  const item_no = document.getElementById('ns-itemno').value.trim();
  const description = document.getElementById('ns-desc').value.trim();
  const uom = document.getElementById('ns-uom').value.trim();
  const rate = parseFloat(document.getElementById('ns-rate').value)||0;
  const section = document.querySelector('#ns-section-pills .radio-pill.sel').dataset.sec;
  const remarks = document.getElementById('ns-remarks').value.trim();
  const err = document.getElementById('ns-error');
  err.style.display='none';
  if (!item_no || !description) { err.textContent='Material/Service Number and Description are required.'; err.style.display='block'; return; }
  try {
    let res;
    if (origItemNo) {
      res = await apiPost({action:'updateNonSOR', item:{item_no, origItemNo, description, uom, rate, section, remarks}, actingRole: ST.user.role});
    } else {
      res = await apiPost({action:'addNonSOR', item:{item_no, description, uom, rate, section, remarks, addedBy: ST.user.id}});
    }
    if (!res.ok) { err.textContent = res.error||'Failed to save.'; err.style.display='block'; return; }
    if (origItemNo) {
      const idx = ST.nonSorCache.findIndex(i=>i.item_no===origItemNo);
      if (idx>-1) ST.nonSorCache[idx] = {item_no, description, uom, rate, section, remarks, addedBy:ST.nonSorCache[idx].addedBy, addedAt:ST.nonSorCache[idx].addedAt, version:'NONSOR'};
    } else {
      ST.nonSorCache.push({item_no, description, uom, rate, section, remarks, addedBy:ST.user.id, addedAt:new Date().toISOString(), version:'NONSOR'});
      if (context==='ai') {
        const key = item_no+'__NONSOR';
        AI.selected[key] = {item_no, version:'NONSOR', description, uom, rate, qty:1, section, remarks, isCustom:true};
        renderAISelectedPanel();
      }
    }
    closeModal();
    toast(origItemNo?'Non-SOR item updated.':'Non-SOR item added.', 'ok');
    if (document.getElementById('ai-results-body')) renderAIResults();
    if (document.getElementById('rates-nonsor-body')) renderRatesNonSORTable();
  } catch(e) { err.textContent = e.message; err.style.display='block'; }
}

function goToStep3() {
  const keys = Object.keys(AI.selected);
  if (!keys.length && !ST.currentItems.length) { toast('Select at least one item before continuing.', 'warn'); return; }
  const zeroQty = keys.filter(k => !AI.selected[k].qty || AI.selected[k].qty<=0);
  if (zeroQty.length) { toast(`${zeroQty.length} selected item(s) have a quantity of 0 — set a valid quantity or remove them.`, 'warn'); return; }
  keys.forEach(key => ST.currentItems.push(AI.selected[key]));
  AI.selected = {};
  const e = ST.currentEstimate;
  e.sorVersions = [...new Set([...(e.sorVersions||[]), ...AI.checkedVersions])];
  renderEstimateWorkspace(null, true);
}

async function deleteNonSORItem(item_no) {
  if (!isAdmin()) return;
  try {
    const res = await apiPost({action:'deleteNonSOR', item_no, actingRole: ST.user.role});
    if (!res.ok) { toast(res.error||'Delete failed', 'err'); return; }
    ST.nonSorCache = ST.nonSorCache.filter(i=>i.item_no!==item_no);
    closeModal();
    toast('Non-SOR item deleted.', 'ok');
    if (document.getElementById('rates-nonsor-body')) renderRatesNonSORTable();
    if (document.getElementById('ai-results-body')) renderAIResults();
  } catch(e) { toast(e.message, 'err'); }
}

async function renderEstimateWorkspace(id, fromStep2=false) {
  if (id && !fromStep2) {
    showPageLoading();
    try {
      const res = await api('getEstimate', {id, userId:ST.user.id, role:ST.user.role});
      if (!res.ok) { toast(res.error||'Could not load estimate', 'err'); navigateTo('dashboard'); return; }
      ST.currentEstimate = normalizeLoadedEstimate(res.estimate);
      ST.currentItems = res.items||[];
    } catch(e) { toast(e.message,'err'); navigateTo('dashboard'); return; }
  }
  WS.activeTab = 'abstract';
  renderWorkspaceShell();
}

function normalizeLoadedEstimate(e) {
  e.addCharge = e.addCharge || {supply:'no', project:'no', nonsor_supply:'no'};
  e.settings = e.settings || {};
  e.progress = e.progress || defaultProgress();
  if (!e.progress.stages) e.progress.stages = defaultProgress().stages;
  for (let i=1;i<=25;i++) {
    if (!e.progress.stages[i]) e.progress.stages[i] = {done:false, remarks:'', link:''};
    else if (e.progress.stages[i].link === undefined) e.progress.stages[i].link = '';
  }
  if (!e.progress.bills) e.progress.bills = [];
  if (!e.progress.orderDetails) e.progress.orderDetails = defaultOrderDetails();
  else e.progress.orderDetails = {...defaultOrderDetails(), ...e.progress.orderDetails};
  e.progressImages = e.progressImages || [];
  e.status = e.status || 'draft';
  e.landCompChargePct = e.landCompChargePct || 15;
  if (!Array.isArray(e.pmoPrEntries)) e.pmoPrEntries = defaultPmoPrEntries();
  while (e.pmoPrEntries.length < 6) e.pmoPrEntries.push({label:'', number:''});
  e.pmoPrEntries = e.pmoPrEntries.slice(0,6);
  return e;
}

function effectiveRates() {
  return {...ST.chargeRates, ...(ST.currentEstimate.settings||{})};
}

function sectionConfig(key) {
  switch(key) {
    case 'supply': return {items: ST.currentItems.filter(it=>!it.isCustom && it.section==='supply'), acKey:'supply', title:'Supply Material', hasAC:true, hasFI:true};
    case 'project': return {items: ST.currentItems.filter(it=>!it.isCustom && it.section==='project'), acKey:'project', title:'Project Services (ETC Part)', hasAC:true, hasFI:false};
    case 'om': return {items: ST.currentItems.filter(it=>!it.isCustom && it.section==='om'), acKey:null, title:'O&M Services', hasAC:false, hasFI:false};
    case 'nonsor_supply': return {items: ST.currentItems.filter(it=>it.isCustom && it.section==='supply'), acKey:'nonsor_supply', title:'Non-SOR Materials', hasAC:true, hasFI:true};
    case 'nonsor_om': return {items: ST.currentItems.filter(it=>it.isCustom && it.section==='om'), acKey:null, title:'Non-SOR Services', hasAC:false, hasFI:false};
  }
}

      </div>

        <table>
          <thead><tr>
            <th>Item No.</th><th style="width:34%">Description</th><th>UOM</th><th class="num-cell">Rate</th>

function acPill(key, val, readOnly) {
  const e = ST.currentEstimate;
  const acKey = sectionConfig(key).acKey;
  const cur = e.addCharge[acKey] || 'no';
  const labelMap = {yes:'Yes', no:'No', na:'N/A'};
  return `<div class="radio-pill ${cur===val?'sel':''} ${val==='na'?'na':''}" ${readOnly?'':`onclick="setACValue('${key}','${val}')"`}>${labelMap[val]}</div>`;
}
function setACValue(key, val) {
  const acKey = sectionConfig(key).acKey;
  ST.currentEstimate.addCharge[acKey] = val;
  document.querySelectorAll(`#ac-pills-${key} .radio-pill`).forEach((el,i)=>{
    const vals=['yes','no','na']; el.classList.toggle('sel', vals[i]===val);
  });
  rebuildSectionTable(key);
}

function sectionRowHtml(it, key, cfg, readOnly) {
  const idx = ST.currentItems.indexOf(it);
  const c = calcItem(it, effectiveRates(), cfg.acKey);
  return `<tr data-idx="${idx}">
    <td class="mono">${escapeHtml(it.item_no)}</td>
    <td>${escapeHtml(it.description)}</td>
    <td>${escapeHtml(it.uom)}</td>
    <td class="num-cell">${fmtNum(it.rate)}</td>
    <td><input type="number" class="qty-input" value="${it.qty}" min="0" step="any"
        ${readOnly?'disabled':''} oninput="onQtyInput(this, ${idx}, '${key}')"></td>
    <td class="num-cell" data-f="base">${fmtNum(c.base)}</td>
    ${cfg.hasAC?`<td class="num-cell" data-f="ac">${fmtNum(c.ac)}</td>`:''}
    <td class="num-cell" data-f="lc">${fmtNum(c.lc)}</td>
    ${cfg.hasFI?`<td class="num-cell" data-f="fi">${fmtNum(c.fi)}</td>`:''}
    <td class="num-cell" data-f="gst">${fmtNum(c.gst)}</td>
    <td class="num-cell" data-f="total"><b>${fmtNum(c.total)}</b></td>
    <td>${!readOnly?`<button class="btn btn-danger btn-sm" onclick="removeItem(${idx})">✕</button>`:''}</td>
  </tr>`;
}

// ── Quantity-input fix: update ONLY the changed row's cells + totals box,
//    never destroy/recreate the <input> while the user is typing ──
function onQtyInput(input, itemIdx, key) {
  const val = parseFloat(input.value);
  ST.currentItems[itemIdx].qty = isNaN(val) ? 0 : val;
  const row = input.closest('tr');
  const cfg = sectionConfig(key);
  const c = calcItem(ST.currentItems[itemIdx], effectiveRates(), cfg.acKey);
  row.querySelector('[data-f="base"]').textContent = fmtNum(c.base);
  if (cfg.hasAC) row.querySelector('[data-f="ac"]').textContent = fmtNum(c.ac);
  row.querySelector('[data-f="lc"]').textContent = fmtNum(c.lc);
  if (cfg.hasFI) row.querySelector('[data-f="fi"]').textContent = fmtNum(c.fi);
  row.querySelector('[data-f="gst"]').textContent = fmtNum(c.gst);
  row.querySelector('[data-f="total"]').innerHTML = `<b>${fmtNum(c.total)}</b>`;
  if (ST.currentEstimate.estimateType !== 'amc') updateSectionTotals(key);
}

function rebuildSectionTable(key) {
  // full rebuild allowed on non-keystroke events (AC radio change, item add/remove)
  renderActiveTab();
}

function removeItem(idx) {
  ST.currentItems.splice(idx, 1);
  renderActiveTab();
}

function suppySparesHtml(readOnly) {
  const e = ST.currentEstimate;
  return `
    <div class="card-tight" style="margin-top:14px; border:1.5px dashed var(--line-strong); border-radius:var(--radius-md)">
      <label class="toggle ${e.supplySpares?'on':''} ${readOnly?'disabled':''}" onclick="${readOnly?'':'toggleSupplySpares()'}">
        <span class="toggle-track"></span><span class="fw-600 text-sm">Include Supply Spares @ 3%</span>
      </label>
    </div>`;
}
function toggleSupplySpares() {
  ST.currentEstimate.supplySpares = !ST.currentEstimate.supplySpares;
  renderActiveTab();
}

function sectionTotalsCalc(key) {
  const cfg = sectionConfig(key);
  let base=0, ac=0, lc=0, fi=0, gst=0, total=0;
  cfg.items.forEach(it => {
    const c = calcItem(it, effectiveRates(), cfg.acKey);
    base+=c.base; ac+=c.ac; lc+=c.lc; fi+=c.fi; gst+=c.gst; total+=c.total;
  });
  let spares = 0;
  if (key==='supply' && ST.currentEstimate.estimateType==='project' && ST.currentEstimate.supplySpares) {
    spares = total*0.03;
  }
  return {base, ac, lc, fi, gst, total: total+spares, spares, preSparesTotal: total};
}

function updateSectionTotals(key) {
  const box = document.getElementById(`sec-totals-${key}`);
  if (!box) return;
  const t = sectionTotalsCalc(key);
  let html = `
    <div class="totals-row"><span>Base Cost</span><span class="v">${fmtINR(t.base)}</span></div>
    ${t.ac?`<div class="totals-row"><span>Additional Charge</span><span class="v">${fmtINR(t.ac)}</span></div>`:''}
    <div class="totals-row"><span>Labour Cess</span><span class="v">${fmtINR(t.lc)}</span></div>
    ${t.fi?`<div class="totals-row"><span>Freight &amp; Insurance</span><span class="v">${fmtINR(t.fi)}</span></div>`:''}
    <div class="totals-row"><span>GST</span><span class="v">${fmtINR(t.gst)}</span></div>
  `;
  if (t.spares) {
    html += `<div class="totals-row"><span>Supply Spares @ 3%</span><span class="v">${fmtINR(t.spares)}</span></div>`;
    html += `<div class="totals-row grand"><span>Supply Material Total (incl. Spares)</span><span class="v">${fmtINR(t.total)}</span></div>`;
  } else {
    html += `<div class="totals-row grand"><span>${sectionConfig(key).title} Total</span><span class="v">${fmtINR(t.total)}</span></div>`;
  }
  box.innerHTML = html;
}

// ── Aggregate section totals for the Abstract / save payload ──
function computeAllSectionTotals() {
  const supply = sectionTotalsCalc('supply').total;
  const project = sectionTotalsCalc('project').total;
  const om = sectionTotalsCalc('om').total;
  const nonSorSupply = sectionTotalsCalc('nonsor_supply').total;
  const nonSorOm = sectionTotalsCalc('nonsor_om').total;
  return {supply, project, om, nonSorSupply, nonSorOm};
}

function pmoPrFilledCount(e) {

}
function renderPmoPrList(readOnly) {

function selectEstimateTypeInAbstract(val) {
  ST.currentEstimate.estimateType = val;
  document.querySelectorAll('#abstract-etype-pills .radio-pill').forEach(el=>el.classList.toggle('sel', el.dataset.type===val));
  renderAbstractBody();
}

function renderAbstractBody() {
  const e = ST.currentEstimate;
  const body = document.getElementById('abstract-body');
  const readOnly = !canEdit() || (e.id && !ownsEstimate(e));

  if (e.estimateType === 'amc') {
    renderAMCAbstract(body, readOnly);
    return;
  }

  const totals = computeAllSectionTotals();
  const supply = totals.supply + totals.nonSorSupply;
  const project = totals.project;
  const om = totals.om + totals.nonSorOm;
  const subA = supply + project + om;

  const supplyBreakdown = totals.nonSorSupply>0
    ? `<div class="sr-breakdown">— SOR items: ${fmtINR(totals.supply)} &nbsp;+&nbsp; Non-SOR Materials: ${fmtINR(totals.nonSorSupply)}</div>` : '';
  const omBreakdown = totals.nonSorOm>0
    ? `<div class="sr-breakdown">— SOR items: ${fmtINR(totals.om)} &nbsp;+&nbsp; Non-SOR Services: ${fmtINR(totals.nonSorOm)}</div>` : '';

  let rows = `
    <div class="sr-row"><span class="sr-no">1</span><span class="sr-label">Cost of Material (Supply Portion)${supplyBreakdown}</span><span class="sr-val">${fmtINR(supply)}</span></div>
    <div class="sr-row"><span class="sr-no">2</span><span class="sr-label">Cost of Work – Project Services (ETC Part)</span><span class="sr-val">${fmtINR(project)}</span></div>
    <div class="sr-row"><span class="sr-no">3</span><span class="sr-label">Cost of Work – O&amp;M Services${omBreakdown}</span><span class="sr-val">${fmtINR(om)}</span></div>
    <div class="sr-row subtotal"><span class="sr-no">4</span><span class="sr-label">Sub Total "A" (1+2+3)</span><span class="sr-val">${fmtINR(subA)}</span></div>
  `;

  let finalTotal = subA;
  let workTypePanel = '';
  if (e.estimateType === 'project') {
    workTypePanel = renderWorkTypePanel(readOnly);
  }
  if (e.estimateType === 'rm') {
    rows += `<div class="sr-row final"><span class="sr-no"></span><span class="sr-label">TOTAL ESTIMATED COST</span><span class="sr-val">${fmtINR(subA)}</span></div>`;
  } else {
    const rates = effectiveRates();
    const pv = subA * (rates.pv||0)/100;
    const cont = subA * (rates.contingencies||0)/100;
    let sr7 = subA + pv + cont;
    let srNo = 7;
    rows += `
      <div class="sr-row"><span class="sr-no">5</span><span class="sr-label">Price Variation (PV) @ ${rates.pv||0}% on Sr.4</span><span class="sr-val">${fmtINR(pv)}</span></div>
      <div class="sr-row"><span class="sr-no">6</span><span class="sr-label">Contingencies @ ${rates.contingencies||0}% on Sr.4</span><span class="sr-val">${fmtINR(cont)}</span></div>
    `;
    if (e.trLineMode) {
      const landComp = sr7 * (e.landCompChargePct||15)/100;
      sr7 += landComp;
      rows += `<div class="sr-row"><span class="sr-no">6A</span><span class="sr-label">Land &amp; Compensation Charges @ ${e.landCompChargePct||15}%</span><span class="sr-val">${fmtINR(landComp)}</span></div>`;
    }
    const centages = sr7 * (rates.centages||0)/100;
    const total = sr7 + centages;
    finalTotal = total;
    rows += `
      <div class="sr-row"><span class="sr-no">7</span><span class="sr-label">Total Estimated Cost Without Centages</span><span class="sr-val">${fmtINR(sr7)}</span></div>
      <div class="sr-row"><span class="sr-no">8</span><span class="sr-label">Centages (Supervision) @ ${rates.centages||0}% on Sr.7</span><span class="sr-val">${fmtINR(centages)}</span></div>
      <div class="sr-row final"><span class="sr-no">9</span><span class="sr-label">TOTAL ESTIMATED COST WITH CENTAGES (7+8)</span><span class="sr-val">${fmtINR(total)}</span></div>
    `;
  }

  ST.currentEstimate.finalTotal = finalTotal;
  ST.currentEstimate._totalsCache = totals;

  body.innerHTML = `
    ${workTypePanel}
    ${rows}
    <div class="awords-box">Amount in Words: Rupees ${escapeHtml(toWords(finalTotal))} Only</div>
    ${pmoPrSummaryLine(e)}
    ${renderChargeRatesPanel(readOnly, e.estimateType!=='rm')}
  `;
}
function pmoPrSummaryLine(e) {
  const filled = (e.pmoPrEntries||[]).filter(p=>p.label && p.label.trim() && p.number && p.number.trim());
  if (!filled.length) return '';
  return `<p class="hint mt-1"><b>PMO/PR Reference:</b> ${filled.map(p=>`${escapeHtml(p.label)}: ${escapeHtml(p.number)}`).join(' &nbsp;|&nbsp; ')}</p>`;
}

function renderChargeRatesPanel(readOnly, showAbstractRates) {
  const rates = effectiveRates();
  const fields = [
    ['additionalCharge','Additional Charge %'], ['labourCess','Labour Cess %'],
    ['freightInsurance','Freight & Insurance %'], ['gst','GST %'],
  ];
  if (showAbstractRates) fields.push(['pv','Price Variation %'], ['contingencies','Contingencies %'], ['centages','Centages %']);
  return `
    <div class="collapse" style="margin-top:18px">
      <div class="collapse-head" onclick="toggleCollapse(this)">
        <span class="fw-700 text-sm">⚙ Charge Rates (this estimate)</span><span class="chev">▸</span>
      </div>
      <div class="collapse-body"><div class="collapse-body-inner">
        <p class="hint mb-1">Overrides the system default rates for this estimate only.</p>
        <div class="grid grid-4">
          ${fields.map(f=>`
            <div class="field">
              <label>${f[1]}</label>
              <input type="number" step="0.01" value="${rates[f[0]]}" ${readOnly?'disabled':''}
                onchange="onChargeRateOverride('${f[0]}', this.value)">

}
function onChargeRateOverride(key, val) {
  ST.currentEstimate.settings = ST.currentEstimate.settings || {};
  ST.currentEstimate.settings[key] = parseFloat(val)||0;
  renderAbstractBody();
}

function renderAMCAbstract(body, readOnly) {
  const e = ST.currentEstimate;
  const counts = {
    supply: ST.currentItems.filter(it=>!it.isCustom && it.section==='supply').length,
    project: ST.currentItems.filter(it=>!it.isCustom && it.section==='project').length,

// ══════════════════════════════════════════════════════════════
// SAVE
// ══════════════════════════════════════════════════════════════
// ── Shared totals recompute — used by both the Estimate workspace's Save
// and the Proposal Progress page's Save (since item quantities can now be
// edited from either page). Single source of truth for the Sr.1-9 math,
// including the optional Tr. Line Land & Compensation charge. ──
function recomputeEstimateTotals(e) {
  if (e.estimateType !== 'amc') {
    const totals = computeAllSectionTotals();
    e.supplyTotal = totals.supply;
    e.projectTotal = totals.project;
    e.omTotal = totals.om;
    e.nonSorSupplyTotal = totals.nonSorSupply;
    e.nonSorOmTotal = totals.nonSorOm;
    const subA = totals.supply+totals.nonSorSupply+totals.project+totals.om+totals.nonSorOm;
    if (e.estimateType==='rm') {
      e.finalTotal = subA;
    } else {
      const rates = effectiveRates();
      const pv = subA*(rates.pv||0)/100, cont = subA*(rates.contingencies||0)/100;
      let sr7 = subA+pv+cont;
      if (e.trLineMode) {
        sr7 += sr7*(e.landCompChargePct||15)/100;
      }
      const centages = sr7*(rates.centages||0)/100;
      e.finalTotal = sr7+centages;
    }
  } else {
    e.supplyTotal = 0; e.projectTotal = 0; e.omTotal = 0; e.nonSorSupplyTotal = 0; e.nonSorOmTotal = 0;
    e.finalTotal = e.amcAmount||0;
  }
}

async function saveCurrentEstimate() {
  const e = ST.currentEstimate;
  if (!e.name) { toast('Estimate name is required.', 'warn'); return; }
  recomputeEstimateTotals(e);
  const btn = (event && event.target && event.target.tagName==='BUTTON') ? event.target : document.getElementById('ws-save-btn');
  const wasNew = !e.id;
  await withSaveStatus(btn, async () => {
    const res = await apiPost({action:'saveEstimate', estimate:e, items:ST.currentItems});
    if (!res.ok) { toast(res.error||'Save failed', 'err'); return false; }
    e.id = res.id;
    const idx = ST.estimatesCache.findIndex(x=>x.id===e.id);
    const summary = {...e, savedAt: new Date().toISOString(), itemCount: ST.currentItems.length};
    if (idx>-1) ST.estimatesCache[idx] = summary; else ST.estimatesCache.push(summary);
    // Only re-render the shell if this was the estimate's first save (the
    // toolbar gains a "Proposal Progress" button once an id exists) — a
    // full re-render here would destroy the button mid-animation otherwise.
    if (wasNew) renderWorkspaceShell();
  }, 'Estimate saved successfully.');
}
// ══════════════════════════════════════════════════════════════
// PER-ESTIMATE EXCEL / PDF EXPORT
// Matches the official MSETCL estimate workbook format exactly:
// header block (company/division/scope/estimation no./SOR no./PR no.),
// rich item columns (short+full description, +25% additional charge,
// labour cess, F&I where applicable, GST), Abstract with PR references
// woven into Sr.1/2/3, Amount in Words.
// ══════════════════════════════════════════════════════════════

const MSETCL_HEADER_LINE1 = 'MAHARASHTRA STATE ELECTRICITY TRANSMISSION COMPANY LIMITED';

// ── Resolve a PMO/PR number to show against a given section, by matching
// label text loosely (e.g. label containing "supply" -> Sr.1, "project"/
// "etc" -> Sr.2, "o&m"/"om"/"service" -> Sr.3). Falls back to listing all
// filled entries if no clear per-section match exists, so nothing is ever
// silently dropped. ──
function pmoPrForSection(e, sectionKeywords) {
  const filled = (e.pmoPrEntries||[]).filter(p=>p.label && p.label.trim() && p.number && p.number.trim());
  if (!filled.length) return '';
  const match = filled.find(p => sectionKeywords.some(k => p.label.toLowerCase().includes(k)));
  if (match) return ` wrt ${match.label} No- ${match.number}`;
  return '';
}
function pmoPrAllFilled(e) {
  return (e.pmoPrEntries||[]).filter(p=>p.label && p.label.trim() && p.number && p.number.trim());
}

// ── Header block — identical across Abstract + every section sheet ──
function estimateHeaderRows(e, sectionPrNo) {
  const division = e.division || '';
  const rows = [
    [MSETCL_HEADER_LINE1],
    [division],
    [`SCOPE OF WORK:- ${e.work || e.name || ''}`],
    [`Estimation Number: ${e.number||'—'} , SOR Number: ${(e.sorVersions||[]).join(', ')||'—'} , Estimation Date: ${e.date||''}` + (sectionPrNo ? ` , PR No.: ${sectionPrNo}` : '')],
  ];
  return rows;
}

// ── Item-table rows for a section, matching the reference's rich column
// layout. Description is duplicated into short+full since SOR data only
// carries a single description field. ──
function sectionItemTableRows(key) {
  const cfg = sectionConfig(key);
  const rates = effectiveRates();
  const hasFI = cfg.hasFI;
  const headers = ['Material/Service No','Mat/ Serv Description','Mat/Serv Full Description','UoM','Quantity',
    'Exworks Price (Rs.)','Total Ex-works Price excl. T&D (Rs.)', "Item's SoR Status"];
  if (cfg.hasAC) headers.push('Considering Extra Charge (%)','Total incl. Additional Charge');
  headers.push('Labour Cess @ '+(rates.labourCess||0)+'%','Ex-Works + Labour Cess');
  if (hasFI) headers.push('Freight & Insurance @ '+(rates.freightInsurance||0)+'%','(Ex-Works+LC) + F&I');
  headers.push('GST @ '+(rates.gst||0)+'%','TOTAL AMOUNT INCLUDING GST');

  const rows = [headers];
  cfg.items.forEach(it=>{
    const c = calcItem(it, rates, cfg.acKey);
    const row = [it.item_no, it.description, it.description, it.uom, it.qty, it.rate, c.base, 'SoR'];
    if (cfg.hasAC) row.push(c.ac>0?(rates.additionalCharge||0):0, c.base+c.ac);
    row.push(c.lc, c.base+c.ac+c.lc);
    if (hasFI) row.push(c.fi, c.base+c.ac+c.lc+c.fi);
    row.push(c.gst, c.total);
    rows.push(row);
  });
  return rows;
}

function abstractPmoPrRows(e) {
  const all = pmoPrAllFilled(e);
  if (!all.length) return [];
  return [['PMO / PR Reference', all.map(p=>`${p.label}: ${p.number}`).join('  |  ')]];
}

function abstractSheetRows(includeBreakdown=false) {
  const e = ST.currentEstimate;
  if (e.estimateType === 'amc') {
    const rows = [
      ['AMC ABSTRACT',''],
      ['AMC Amount Limit', e.amcAmount||0],
      ['Amount in Words', toWords(e.amcAmount||0)+' Rupees Only'],
      ['AMC Remark', e.amcRemark||''],
    ];
    return rows.concat(abstractPmoPrRows(e));
  }
  const totals = computeAllSectionTotals();
  const supply = totals.supply+totals.nonSorSupply, project = totals.project, om = totals.om+totals.nonSorOm;
  const subA = supply+project+om;
  const supplyPr = pmoPrForSection(e, ['supply']);
  const projectPr = pmoPrForSection(e, ['project','etc']);
  const omPr = pmoPrForSection(e, ['o&m','om','service']);
  const rows = [
    ['Sr.No.','PARTICULARS','AMOUNT in Rs.'],
    [1, `Cost of Material (SUPPLY PORTION)${supplyPr}`, supply],
  ];
  if (includeBreakdown && totals.nonSorSupply>0) {
    rows.push(['', `— SOR items: ${fmtNum(totals.supply)}  +  Non-SOR Materials: ${fmtNum(totals.nonSorSupply)}`, '']);
  }
  rows.push([2, `Cost of Work (ETC)${projectPr}`, project]);
  rows.push([3, `Cost of Work (O&M Services)${omPr}`, om]);
  if (includeBreakdown && totals.nonSorOm>0) {
    rows.push(['', `— SOR items: ${fmtNum(totals.om)}  +  Non-SOR Services: ${fmtNum(totals.nonSorOm)}`, '']);
  }
  rows.push([4, 'Sub Total "A" (1+2+3) Rs.', subA]);
  if (e.estimateType === 'rm') {
    rows.push(['', 'TOTAL ESTIMATED COST', subA]);
    rows.push(['', 'Amount in Words', toWords(subA)+' Rupees Only']);
    return rows.concat(abstractPmoPrRows(e));
  }
  const rates = effectiveRates();
  const pv = subA*(rates.pv||0)/100, cont = subA*(rates.contingencies||0)/100;
  let sr7 = subA+pv+cont;
  rows.push([5, `PV ${rates.pv||0}% on Sr. No.4`, pv]);
  rows.push([6, `Contingencies ${rates.contingencies||0}% on Sr. No.4`, cont]);
  if (e.trLineMode) {
    const landComp = sr7*(e.landCompChargePct||15)/100;
    sr7 += landComp;
    rows.push(['6A', `Land & Compensation Charges @ ${e.landCompChargePct||15}%`, landComp]);
  }
  const centages = sr7*(rates.centages||0)/100, total = sr7+centages;
  rows.push([7, "Total Estimated cost without Centages Sub Total 'B' = (4+5+6) Rs.", sr7]);
  rows.push([8, `Centages : Supervision/GEC/Misc = ${rates.centages||0}%`, centages]);
  rows.push([9, 'Total Estimated cost with Centages (7+8)', total]);
  rows.push(['', 'Amount in Words', toWords(total)+' Rupees Only']);
  return rows.concat(abstractPmoPrRows(e));
}

async function exportEstimateExcel() {
  const e = ST.currentEstimate;
  e.pmoPrEntries = e.pmoPrEntries || [];
  toast('Building Excel…', 'ok', 1800);
  const XLSXmod = await ensureSheetJS();
  const wb = XLSXmod.utils.book_new();

  // Abstract sheet: header block + Sr.1-9 table
  const abstractHeader = estimateHeaderRows(e, '');
  const abstractTable = abstractSheetRows(false);
  const absRows = abstractHeader.concat([['ABSTRACT']], abstractTable);
  const absStyleMap = {};
  absStyleMap[0] = 'section';
  absStyleMap[abstractHeader.length] = 'section';
  absStyleMap[abstractHeader.length+1] = 'header';
  const abs = XLSXmod.utils.aoa_to_sheet(absRows);
  applySmartColWidths(abs, absRows);
  applyRowStyles(abs, absStyleMap, 3);
  XLSXmod.utils.book_append_sheet(wb, abs, 'Abstract');

  // Section sheets
  const sectionDefs = [
    ['supply','Supply  Material', e.pmoPrEntries.find(p=>p.label.toLowerCase().includes('supply'))],
    ['project','ETC Part', e.pmoPrEntries.find(p=>p.label.toLowerCase().includes('project')||p.label.toLowerCase().includes('etc'))],
    ['om','Services Part', e.pmoPrEntries.find(p=>{const l=p.label.toLowerCase(); return l.includes('o&m')||l.includes('om')||l.includes('service');})],
  ];
  sectionDefs.forEach(def => {
    const key = def[0], name = def[1], prMatch = def[2];
    if (!sectionConfig(key).items.length) return;
    const prNo = (prMatch && prMatch.number) ? prMatch.number : '';
    const header = estimateHeaderRows(e, prNo);
    const itemRows = sectionItemTableRows(key);
    const rows = header.concat([[name]], itemRows);
    const ws = XLSXmod.utils.aoa_to_sheet(rows);
    applySmartColWidths(ws, rows);
    const styleMap = {};
    styleMap[0] = 'section';
    styleMap[header.length] = 'section';
    styleMap[header.length+1] = 'header';
    applyRowStyles(ws, styleMap, itemRows[0].length);
    XLSXmod.utils.book_append_sheet(wb, ws, sanitizeSheetName(name));
  });

  // Non-SOR sheets (Materials + Services combined, matching "NON SOR Items" reference sheet)
  const nonSorSections = [['nonsor_supply','Non-SOR Materials'],['nonsor_om','Non-SOR Services']];
  const nonSorAny = nonSorSections.some(d=>sectionConfig(d[0]).items.length);
  if (nonSorAny) {
    const header = estimateHeaderRows(e, '');
    let rows = header.concat([['Estimate ( Non SOR Items )']]);
    nonSorSections.forEach(def => {
      const key = def[0], label = def[1];
      const cfg = sectionConfig(key);
      if (!cfg.items.length) return;
      rows.push([label]);
      const itemRows = sectionItemTableRows(key);
      rows = rows.concat(itemRows);
    });
    const ws = XLSXmod.utils.aoa_to_sheet(rows);
    applySmartColWidths(ws, rows);
    XLSXmod.utils.book_append_sheet(wb, ws, 'NON SOR Items');
  }

  XLSXmod.writeFile(wb, `${(e.name||'Estimate').replace(/[^a-z0-9]+/gi,'_')}.xlsx`);
  toast('Excel ready', 'ok');
}

// ── SHARED smart column-width helper for PDF tables ──
function smartPdfColWidths(headers) {
  const widths = headers.map(h=>{
    const hl = String(h).toLowerCase();
    if (hl.includes('material/service no')) return 8;
    if (hl.includes('full description')) return 22;
    if (hl.includes('description')) return 16;
    if (hl.includes('uom')) return 4;
    if (hl.includes('quantity')) return 5;
    if (hl.includes("sor status")) return 5;
    return 6.5; // numeric/charge columns
  });
  const sum = widths.reduce((a,b)=>a+b,0);
  if (sum > 100) return widths.map(w=>+(w*100/sum).toFixed(1));
  const descIdx = headers.findIndex(h=>String(h).toLowerCase().includes('full description'));
  if (sum < 100 && descIdx>-1) widths[descIdx] += (100-sum);
  return widths;
}

function prItemOverviewSheetRows(items, deliveryDate) {

function prOMSheetRows(items, deliveryDate) {

  const header1 = new Array(19).fill('');

  header3[9]='Purchasing group'; header3[11]='Plant'; header3[12]='Store location'; header3[18]='Requistioner';

function prStylePass(ws, rows) {
  // Light-blue banner row, gray column-label row, yellow flag on O&M's
  // blank Material cell — matches the original template exactly.
  for (let r=0;r<rows.length;r++) {
    const isBanner = typeof rows[r][1]==='string' && (rows[r][1]==='In Item Overview' || rows[r][1]==='In Services for selected Item');
    const isLabelRow = typeof rows[r][1]==='string' && ['Item category','Item Category','Service No'].includes(rows[r][1]);
    if (!isBanner && !isLabelRow) continue;
    for (let c=1;c<rows[r].length;c++) {
      const addr = XLSX.utils.encode_cell({r,c});
      if (!ws[addr]) ws[addr] = {t:'s', v:rows[r][c]||''};
      ws[addr].s = { fill:{fgColor:{rgb: isBanner?PR_BANNER_FILL:PR_LABEL_FILL}}, font:{bold:true} };
    }
  }
}

async function syncSORFromDatabase() {
  const btn = document.getElementById('sor-sync-btn');
  await withSaveStatus(btn, async () => {
    const versRes = await api('getSORVersions');
    if (!versRes.ok) throw new Error(versRes.error||'Sync failed');
    ST.sorVersions = versRes.versions||[];
    ST.sorVersionCounts = versRes.counts||{};
    // Re-fetch every currently-checked version fresh from the backend
    const toFetch = RP.checkedVersions.filter(v=>v!=='NONSOR' && ST.sorVersions.includes(v));
    const fetched = await Promise.all(toFetch.map(v=>api('getSOR', {version:v})));
    let newCache = ST.sorCache.filter(it=>!toFetch.includes(it.version));
    fetched.forEach((res,i)=>{ if (res.ok) newCache = newCache.concat(res.items||[]); });
    ST.sorCache = newCache;
    const nonSorRes = await api('getNonSOR');
    if (nonSorRes.ok) ST.nonSorCache = nonSorRes.items||[];
    // Re-render in place: keep the user's current checked versions and search,
    // just refresh the checkbox list (counts/versions) and table contents.
    RP.checkedVersions = RP.checkedVersions.filter(v=>v==='NONSOR' || ST.sorVersions.includes(v));
    renderVersionCheckboxes('rp-version-checks', RP.checkedVersions, 'onRPVersionsChanged');
    renderRPSorTable();
  }, 'Synced with database');
}
const onRPSearchInput = debounce(()=>{ RP.search = document.getElementById('rp-search').value.trim().toLowerCase(); RP.page=1; renderRPSorTable(); }, 200);

function rpFilteredSorItems() {
  let items = ST.sorCache.filter(it => RP.checkedVersions.includes(it.version));
  if (RP.category !== 'all') items = items.filter(it => it.section === RP.category);
  if (RP.search) items = items.filter(it => it.item_no.toLowerCase().includes(RP.search) || it.description.toLowerCase().includes(RP.search));
  return items;

// IMPORT SOR — Excel/CSV upload, digit-pattern classification, preview, submit
// ══════════════════════════════════════════════════════════════

// Classification rule (verified against production SOR data):
// 5 followed by 9 total digits → Supply | 5 followed by 8 total digits → O&M
// 3 followed by 9 total digits → Project. Falls back to a provided/explicit
// section value in the row if the digit pattern doesn't match cleanly.
function classifySORItemNo(item_no, explicitSection) {
  const s = String(item_no).trim();
  if (/^5\d{8}$/.test(s)) return 'supply';      // 5 + 9 digits total
  if (/^5\d{7}$/.test(s)) return 'om';          // 5 + 8 digits total
  if (/^3\d{8}$/.test(s)) return 'project';     // 3 + 9 digits total
  const norm = String(explicitSection||'').trim().toLowerCase();
  if (norm==='supply'||norm==='project'||norm==='om') return norm;
  return null; // unclassifiable — flagged in preview
}

async function handleSORFileSelect() {
  const versionName = document.getElementById('import-version-name').value.trim();
  const fileInput = document.getElementById('import-sor-file');
  const statusEl = document.getElementById('import-sor-status');
  statusEl.innerHTML = '';
  const file = fileInput.files[0];
  if (!file) { statusEl.innerHTML = '<p class="error-text">Choose a file first.</p>'; return; }

  statusEl.innerHTML = '<span class="spinner dark"></span> Parsing file…';
  try {
    const XLSXmod = await ensureSheetJS();
    const buf = await file.arrayBuffer();
    const wb = XLSXmod.read(buf, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSXmod.utils.sheet_to_json(ws, {defval:''});
    if (!rows.length) { statusEl.innerHTML = '<p class="error-text">File has no data rows.</p>'; return; }

    // Tolerant column-name matching (case/spacing-insensitive)
    const keyMap = {};
    Object.keys(rows[0]).forEach(k=>{
      const norm = k.toLowerCase().replace(/[^a-z0-9]/g,'');
      if (!keyMap.item_no && ['itemno','itemnumber','item','materialno','itemcode'].includes(norm)) keyMap.item_no = k;
      else if (!keyMap.description && ['description','desc','itemdescription'].includes(norm)) keyMap.description = k;
      else if (!keyMap.uom && ['uom','unit'].includes(norm)) keyMap.uom = k;
      else if (!keyMap.rate && (norm.startsWith('rate') || norm.startsWith('price') || norm==='amount')) keyMap.rate = k;
      else if (!keyMap.section && ['section','category'].includes(norm)) keyMap.section = k;
      else if (!keyMap.version && ['version','sorversion','sorvers'].includes(norm)) keyMap.version = k;
    });
    if (!keyMap.item_no || !keyMap.description || !keyMap.rate) {
      statusEl.innerHTML = '<p class="error-text">Could not find required columns (item_no, description, rate) in the file header row.</p>';
      return;
    }

    const parsed = [];
    let unclassified = 0;
    let missingVersion = 0;
    rows.forEach(r=>{
      const item_no = String(r[keyMap.item_no]||'').trim();
      if (!item_no) return;
      const section = classifySORItemNo(item_no, keyMap.section ? r[keyMap.section] : null);
      if (!section) unclassified++;
      const rowVersion = keyMap.version ? String(r[keyMap.version]||'').trim() : '';
      if (!rowVersion && !versionName) missingVersion++;
      parsed.push({
        item_no, description: String(r[keyMap.description]||'').trim(),
        uom: String(r[keyMap.uom]||'').trim(), rate: parseFloat(r[keyMap.rate])||0,
        section: section||'project', version: rowVersion || versionName
      });
    });

    if (missingVersion > 0) {
      statusEl.innerHTML = `<p class="error-text">${missingVersion} row(s) have no version column value and no default version name was entered. Enter a default version name above to cover them, or add a "version" column to the file.</p>`;
      return;
    }
    // Guard against overwriting an existing version name (only when every row
    // shares the single typed-in default — a mixed-version file legitimately
    // may append to versions that already exist, which importSOR's
    // duplicate-detection already handles safely).
    const distinctVersions = [...new Set(parsed.map(p=>p.version))];
    if (distinctVersions.length===1 && ST.sorVersions.includes(distinctVersions[0])) {
      statusEl.innerHTML = `<p class="hint" style="color:var(--gold-600)">⚠ Version "${escapeHtml(distinctVersions[0])}" already exists — new items will be added, duplicates skipped automatically.</p>`;
    }

    openSORImportPreview(parsed, unclassified);
    statusEl.innerHTML = '';
  } catch(e) {
    statusEl.innerHTML = `<p class="error-text">${escapeHtml(e.message)}</p>`;
  }
}

    <div class="table-wrap" style="max-height:260px; overflow-y:auto; margin-bottom:14px">

        </tbody>
      </table>
    </div>
    <p class="hint mb-1">${parsed.length>50?`Showing first 50 of ${parsed.length} rows.`:''}</p>
    <div id="sor-import-error" class="error-text" style="display:none"></div>

      <button class="btn btn-gold" onclick="submitSORImport()">Confirm Import</button>

async function submitSORImport() {
  if (!_pendingSORImport) return;
  const {parsed} = _pendingSORImport;
  const err = document.getElementById('sor-import-error');
  const btn = event && event.target ? event.target : null;
  const origText = btn ? btn.innerHTML : '';
  if (btn) { btn.innerHTML = '<span class="spinner"></span> Importing…'; btn.disabled = true; }
  try {
    // version is carried per-item; the batch-level 'version' param is only
    // a fallback for any item missing its own (none should, by this point).
    const res = await apiPost({action:'importSOR', items: parsed, version: parsed[0] && parsed[0].version});
    if (!res.ok) { err.textContent = res.error||'Import failed.'; err.style.display='block'; return; }
    closeModal();
    _pendingSORImport = null;
    const versionList = (res.versions||[]).join(', ');
    toast(`Imported ${res.added} items (${res.skipped} duplicates skipped) into: ${versionList}`, 'ok', 6000);
    const versRes = await api('getSORVersions');
    if (versRes.ok) { ST.sorVersions = versRes.versions||[]; ST.sorVersionCounts = versRes.counts||{}; }
    const importedVersions = res.versions || [];
    for (const v of importedVersions) {
      const sorRes = await api('getSOR', {version: v});
      if (sorRes.ok) ST.sorCache = ST.sorCache.filter(it=>it.version!==v).concat(sorRes.items||[]);
    }
    RP.checkedVersions = importedVersions;
    renderRatesPage();
  } catch(e) {
    err.textContent = e.message; err.style.display='block';
  } finally {
    if (btn) { btn.innerHTML = origText; btn.disabled = false; }
  }
}

        <tbody>${ST.processesCache.map((it,i)=>`<tr><td>${i+1}</td><td>${escapeHtml(it.name)}</td><td>${escapeHtml(it.description)}</td><td>${escapeHtml(it.remarks||'')}</td></tr>`).join('')}</tbody>
      </table>
    </div>
  `;
  doPrintAndCleanup(root);
}

function billRowHtml(b, i, readOnly) {
  return `<tr data-bi="${i}">
    <td><input type="text" value="${escapeHtml(b.label||'')}" ${readOnly?'disabled':''} oninput="onBillFieldInput(${i},'label',this.value)" placeholder="Bill ${i+1}"></td>

function onWOAmountInput(val) {

function onBillFieldInput(i, field, val) {
  ST.currentEstimate.progress.bills[i][field] = field==='amount' ? (parseFloat(val)||0) : val;
  if (field==='amount') recalcFinancials();

function recalcFinancials() {
  const est = ST.currentEstimate;
  const bills = est.progress.bills||[];
  const totalBills = bills.reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
  const available = (est.progress.woAmount||0) - totalBills;
  const tEl = document.getElementById('pg-total-bills'); if (tEl) tEl.textContent = fmtINR(totalBills);
  const aEl = document.getElementById('pg-available');
  if (aEl) { aEl.textContent = fmtINR(available); aEl.parentElement.style.color = available<0 ? '#ff8a7a' : ''; }
}
function addBillRow() {
  const est = ST.currentEstimate;

// ── Progress images — uploaded to Google Drive (compressed ~50%), stored
// as {fileId, url, caption} records. Requires the estimate to be saved
// first (needs an ID for the per-estimate Drive folder name). ──
async function onProgressImageSelected(evt) {
  const file = evt.target.files[0];
  evt.target.value = '';
  if (!file) return;
  const est = ST.currentEstimate;
  if (!est.id) { toast('Save the estimate first, then add images.', 'warn'); return; }
  if (est.progressImages.length>=5) { toast('Maximum 5 images allowed.', 'warn'); return; }
  const zone = document.getElementById('pg-img-grid');
  const uploadingTile = document.createElement('div');
  uploadingTile.className = 'img-tile';
  uploadingTile.innerHTML = `<div class="flex items-center justify-center" style="height:96px"><span class="spinner dark"></span></div><div class="img-cap text-muted">Uploading…</div>`;
  if (zone) zone.appendChild(uploadingTile);
  try {
    const compressed = await compressImageFile(file, 0.5, 1600);
    const res = await apiPost({
      action:'uploadEstimateImage', estimateId: est.id, estimateName: est.name,
      fileName: file.name, mimeType: compressed.mimeType, base64Data: compressed.base64
    });
    if (!res.ok) { toast(res.error||'Image upload failed.', 'err'); uploadingTile.remove(); return; }
    est.progressImages.push({fileId: res.fileId, url: res.url, caption: ''});
    toast('Image uploaded.', 'ok');
    renderProgressImages(!canEdit() || !ownsEstimate(est));
  } catch(e) {
    toast(e.message||'Image upload failed.', 'err');
    uploadingTile.remove();
  }
}
function renderProgressImages(readOnly) {
  const est = ST.currentEstimate;
  const zone = document.getElementById('pg-img-grid');
  if (!zone) return;
  // Owner or admin can view/delete; anyone with access to this page can also view (per app-wide access rules)
  zone.innerHTML = est.progressImages.map((img,i) => `
    <div class="img-tile">
      <img src="${img.url}" onclick="openLightbox('${img.url.replace(/'/g,"\\'")}')" loading="lazy">
      <div class="img-actions">
        <button onclick="openLightbox('${img.url.replace(/'/g,"\\'")}')" title="View">👁</button>
        ${!readOnly?`<button onclick="deleteProgressImage(${i})" title="Delete">✕</button>`:''}
      </div>
      <input type="text" class="img-cap" value="${escapeHtml(img.caption||'')}" ${readOnly?'disabled':''}
        oninput="onImageCaptionInput(${i}, this.value)" placeholder="Caption…"
        style="width:100%; border:none; border-top:1px solid var(--line); border-radius:0">
    </div>
  `).join('') || `<div class="empty-state" style="grid-column:1/-1"><div class="ic">🖼️</div>No progress images yet.</div>`;
}
function onImageCaptionInput(i, val) { ST.currentEstimate.progressImages[i].caption = val; }
async function deleteProgressImage(i) {
  const est = ST.currentEstimate;
  const img = est.progressImages[i];
  if (!img) return;
  try {
    if (img.fileId) {
      const res = await apiPost({action:'deleteEstimateImage', fileId: img.fileId});
      if (!res.ok) { toast(res.error||'Delete failed.', 'err'); return; }
    }
    est.progressImages.splice(i,1);
    toast('Image deleted.', 'ok');
    renderProgressImages(!canEdit() || !ownsEstimate(est));
  } catch(e) { toast(e.message, 'err'); }
}

// ── Save ──
async function saveProgress() {
  const est = ST.currentEstimate;
  est.name = document.getElementById('pg-name').value.trim() || est.name;
  est.number = document.getElementById('pg-number').value.trim();
  for (let n=1;n<=5;n++) est['remark'+n] = document.getElementById(`pg-remark${n}`).value.trim();
  est.progress.orderClosedRemarks = document.getElementById('pg-orderclosed-remarks').value.trim();
  recomputeEstimateTotals(est);
  const btn = document.getElementById('pg-save-btn');
  await withSaveStatus(btn, async () => {
    const res = await apiPost({action:'saveEstimate', estimate:est, items:ST.currentItems});
    if (!res.ok) { toast(res.error||'Save failed', 'err'); return false; }
    const idx = ST.estimatesCache.findIndex(x=>x.id===est.id);
    const summary = {...est, savedAt: new Date().toISOString(), itemCount: ST.currentItems.length};
    if (idx>-1) ST.estimatesCache[idx] = summary;
  }, 'Proposal progress saved.');
}

// ── Excel export (3 sheets: Summary / Proposal Stages / Financial Tracking) ──
async function exportProgressExcel() {
  const est = ST.currentEstimate;
  toast('Building Excel…', 'ok', 1800);
  const XLSXmod = await ensureSheetJS();
  const wb = XLSXmod.utils.book_new();
  const pd = buildProgressExportData(est);

  const rows = [];
  const styleMap = {};
  let r = 0;
  const addSection = (title) => { rows.push([title]); styleMap[r]='section'; r++; };
  const addHeader = (cols) => { rows.push(cols); styleMap[r]='header'; r++; };
  const addRow = (cols) => { rows.push(cols); r++; };
  const addTotal = (cols) => { rows.push(cols); styleMap[r]='total'; r++; };
  const blank = () => { rows.push(['']); r++; };

  addSection(`${est.name}${est.number?' ('+est.number+')':''}`);
  addRow(['Division', est.division||'—']);
  addRow(['Type', estimateTypeLabel(est.estimateType)]);
  addRow(['Status', est.status]);
  blank();

  addSection('Abstract');
  pd.abstractRows.forEach(row => {
    if (/^(Sr\.9|TOTAL ESTIMATED|AMC Amount)/.test(row[0])) addTotal(row); else addRow(row);
  });
  blank();

  addSection('Proposal Progress');
  addRow(['Audited', pd.audited ? 'Yes' : 'No']);
  if (pd.stageRows.length) {
    blank();
    addHeader(['Stage','Done','Remarks','Link']);
    pd.stageRows.forEach(s => { addRow([`${s.num}. ${s.name}`, s.done?'Yes':'No', s.remarks, s.link]); if (s.done) styleMap[r-1]='done'; });
  }
  blank();

  if (pd.orderDetailsRows.length) {
    addSection('Order Related Details');
    pd.orderDetailsRows.forEach(row => addRow(row));
    blank();
  }

  if (pd.woAmount || pd.bills.length) {
    addSection('Financial Tracking');
    addRow(['WO / PO Amount', fmtINR(pd.woAmount)]);
    if (pd.bills.length) {
      blank();
      addHeader(['Bill','Amount','Remarks']);
      pd.bills.forEach(b => addRow([b.label||'', fmtINR(parseFloat(b.amount)||0), b.remarks||'']));
    }
    addTotal(['Available Amount', fmtINR(pd.available)]);
    blank();
  }

  if (pd.orderClosed) {
    addSection('Order Closed');
    addRow(['Status', 'Yes']);
    addRow(['Comment', pd.orderClosedRemarks||'—']);
    blank();
  }

  if (pd.remarks.length) {
    addSection('General Remarks');
    pd.remarks.forEach(rm => addRow([rm]));
    blank();
  }
  if (pd.images.length) {
    addSection('Progress Images (captions)');
    addRow([pd.images.map(im=>im.caption).filter(Boolean).join(' | ')||`${pd.images.length} image(s) — see PDF for images`]);
  }

  const ws = XLSXmod.utils.aoa_to_sheet(rows);
  applySmartColWidths(ws, rows);
  applyRowStyles(ws, styleMap, Math.max(...rows.map(rr=>rr.length), 4));
  XLSXmod.utils.book_append_sheet(wb, ws, 'Proposal Progress');

  XLSXmod.writeFile(wb, `${(est.name||'Estimate').replace(/[^a-z0-9]+/gi,'_')}_Progress.xlsx`);
  toast('Excel ready', 'ok');
}

// ── System Charge Rates ──
function renderAdminRates() {
  const r = ST.chargeRates;
  const zone = document.getElementById('admin-rates-body');
  const fields = [
    ['additionalCharge','Additional Charge %'], ['labourCess','Labour Cess %'],
    ['freightInsurance','Freight & Insurance %'], ['gst','GST %'],
    ['pv','Price Variation %'], ['contingencies','Contingencies %'], ['centages','Centages %'],
  ];
  zone.innerHTML = `
    <div class="grid grid-4">
      ${fields.map(f=>`<div class="field"><label>${f[1]}</label><input type="number" step="0.01" id="rate-${f[0]}" value="${r[f[0]]}"></div>`).join('')}
    </div>
    <div class="flex gap-2 mt-1">
      <button class="btn btn-gold" id="rates-save-btn" onclick="saveAdminRates()">Save Rates</button>
      <button class="btn btn-ghost" id="rates-reset-btn" onclick="resetAdminRates()">Reset to Defaults</button>
    </div>
  `;
}
async function saveAdminRates() {
  const fields = ['additionalCharge','labourCess','freightInsurance','gst','pv','contingencies','centages'];
  const rates = {};
  fields.forEach(f => rates[f] = parseFloat(document.getElementById('rate-'+f).value)||0);
  const btn = document.getElementById('rates-save-btn');
  await withSaveStatus(btn, async () => {
    const res = await apiPost({action:'saveChargeRates', rates, actingRole: ST.user.role});
    if (!res.ok) { toast(res.error||'Failed to save', 'err'); return false; }
    ST.chargeRates = rates;
  }, 'System charge rates updated.');
}
async function resetAdminRates() {
  const btn = document.getElementById('rates-reset-btn');
  await withSaveStatus(btn, async () => {
    const res = await apiPost({action:'resetChargeRates'});
    if (!res.ok) { toast(res.error||'Failed', 'err'); return false; }
    ST.chargeRates = res.rates;
    renderAdminRates();
  }, 'Reset to defaults.');
}

function renderAdminUsers() {
  const zone = document.getElementById('admin-users-body');
  const users = ST.usersCache;
  zone.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Role</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${users.length ? users.map(u=>`
            <tr>
              <td class="mono">${escapeHtml(u.id)}</td>

              <td>

                  <option value="user" ${u.role==='user'?'selected':''}>User</option>
                  <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
                  <option value="viewer" ${u.role==='viewer'?'selected':''}>Viewer</option>
                </select>
              </td>

                ${u.status==='pending' ? `

              </td>
              <td>
                <button class="btn btn-ghost btn-sm" onclick="resetUserPassword('${u.id}')">Reset Pwd</button>
                ${u.id!=='admin' ? `<button class="btn btn-danger btn-sm" onclick="confirmDeleteUser('${u.id}')">Delete</button>` : ''}
              </td>
            </tr>`).join('') : `<tr><td colspan="5"><div class="empty-state"><div class="ic">👥</div>No users found.</div></td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}
async function changeUserRole(id, role) {
  try {
    const res = await apiPost({action:'saveUser', user:{id, role}, actingRole: ST.user.role});
    if (!res.ok) { toast(res.error||'Failed', 'err'); return; }
    const u = ST.usersCache.find(x=>x.id===id); if (u) u.role = role;
    toast(`Role updated for ${id}.`, 'ok');
  } catch(e) { toast(e.message, 'err'); }
}
async function approveUserAction(id, approve) {
  try {
    const res = await apiPost({action:'approveUser', id, approve, actingRole: ST.user.role});
    if (!res.ok) { toast(res.error||'Failed', 'err'); return; }
    const u = ST.usersCache.find(x=>x.id===id); if (u) u.status = approve?'approved':'rejected';
    renderAdminUsers();
    toast(approve?'User approved.':'User rejected.', 'ok');
  } catch(e) { toast(e.message, 'err'); }
}
function resetUserPassword(id) {
  openModal(`
    <div class="modal-head"><h3>Reset Password — ${escapeHtml(id)}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="field"><label>New Password</label><input type="password" id="rp-newpass"></div>
    <div id="rp-error" class="error-text" style="display:none"></div>
    <button class="btn btn-gold btn-block mt-1" onclick="submitResetPassword('${id}')">Reset Password</button>
  `);
}
async function submitResetPassword(id) {
  const np = document.getElementById('rp-newpass').value;
  const err = document.getElementById('rp-error');
  if (!np) { err.textContent='Enter a new password.'; err.style.display='block'; return; }
  try {
    const res = await apiPost({action:'saveUser', user:{id, passHash:hashPass(np)}, actingRole: ST.user.role});
    if (!res.ok) { err.textContent = res.error||'Failed'; err.style.display='block'; return; }
    closeModal();
    toast(`Password reset for ${id}.`, 'ok');
  } catch(e) { err.textContent = e.message; err.style.display='block'; }
}
function confirmDeleteUser(id) {
  openModal(`
    <div class="modal-head"><h3>Delete User?</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <p class="text-sm">Delete user "<b>${escapeHtml(id)}</b>"? This cannot be undone.</p>
    <div class="flex gap-2 justify-end mt-2">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doDeleteUser('${id}')">Delete</button>
    </div>
  `);
}
async function doDeleteUser(id) {
  try {
    const res = await apiPost({action:'deleteUser', id, actingRole: ST.user.role});
    if (!res.ok) { toast(res.error||'Failed', 'err'); return; }
    ST.usersCache = ST.usersCache.filter(u=>u.id!==id);
    closeModal();
    renderAdminUsers();
    toast('User deleted.', 'ok');
  } catch(e) { toast(e.message, 'err'); }
}

async function testDbConnection() {
  const statusEl = document.getElementById('dbconn-status');
  statusEl.innerHTML = '<span class="spinner dark"></span> Testing…';
  const url = document.getElementById('dbconn-url').value.trim();
  try {
    const r = await fetch(`${url}?action=ping`, {redirect:'follow'});
    const txt = await r.text();
    const data = JSON.parse(txt);
    if (data.ok) {
      statusEl.innerHTML = `<span class="badge badge-ok">Connected</span> ${data.sorRows||0} SOR rows, ${data.estRows||0} estimates`;
    } else {
      statusEl.innerHTML = `<span class="badge badge-bad">Error: ${escapeHtml(data.error||'Unknown')}</span>`;
    }
  } catch(e) {
    statusEl.innerHTML = `<span class="badge badge-bad">Failed: ${escapeHtml(e.message)}</span>`;
  }
}
function saveDbConnection() {
  const url = document.getElementById('dbconn-url').value.trim();
  if (!url) { toast('Enter a URL first.', 'warn'); return; }
  SURL = url;
  localStorage.setItem(SCRIPT_URL_KEY, url);
  toast('Backend URL saved. Reloading data…', 'ok');
  enterApp();
}
function resetDbConnection() {
  openModal(`
    <div class="modal-head"><h3>Reset to Default Backend?</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <p class="text-sm">This clears the custom backend URL saved on this device and reconnects to the default deployment.</p>
    <div class="flex gap-2 justify-end mt-2">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmResetDbConnection()">Reset &amp; Reload</button>
    </div>
  `);
}
function confirmResetDbConnection() {
  localStorage.removeItem(SCRIPT_URL_KEY);
  location.reload();
}
function copyAppsScriptCode() {
  navigator.clipboard.writeText(APPS_SCRIPT_CODE).then(()=>toast('Copied to clipboard.', 'ok'));
}
