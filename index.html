}

/* ================= GLOBAL SEARCH ================= */
document.getElementById('gsearch').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q){ if(ST.view==='searchresults'){ST.view='overview'; render();} return; }
  const hits=[];
  Object.values(RELAYS).forEach(r=>{
    const bay=bayOf(r.id);
    if(r.name.toLowerCase().includes(q)||(bay&&bay.name.toLowerCase().includes(q))||r.kind.toLowerCase().includes(q)||(r.model||'').toLowerCase().includes(q))
      hits.push(r);
  });
  ST.view='searchresults';
  main.innerHTML=`<div class="wrap"><div class="eyebrow">Search</div><h1 class="h1">"${q}"</h1>
    <div class="sub">${hits.length} relays match.</div>
    <div class="grid2" style="grid-template-columns:1fr 1fr">${hits.slice(0,40).map(r=>{
      const bay=bayOf(r.id);
      return `<div class="card" style="cursor:pointer" onclick="openRelay('${r.id}')">
        <span class="vtag" style="background:${VCOL[r.voltage]}22;color:${VCOL[r.voltage]}">${r.voltage}</span>
        <div style="font-weight:700;margin-top:6px">${r.name}</div>
        <div class="hint">${bay?bay.name:''} · ${r.kind} · ${r.model||r.family}</div></div>`;
    }).join('')||'<div class="empty">No matches.</div>'}</div></div>`;
  syncNav();
});

/* ================= DATA SOURCE RESOLUTION ================= */
async function fetchFullDataFromDrive(){
  const res=await fetch(GOOGLE_SHEET_API_URL+'?action=getFullData');
  const json=await res.json();
  if(json.ok && json.bays && json.bays.length) return json;
  throw new Error((json && json.error) || 'Drive returned no data — has "Sync full data to Google Drive" been run in Admin yet?');
}
function backgroundRevalidate(){
  // stale-while-revalidate: silently refresh the cache for the *next* load; never
  // blocks or disrupts the current session.
  if(!GOOGLE_SHEET_API_URL) return;
  fetchFullDataFromDrive().then(json=>{
    try{ localStorage.setItem(DRIVE_CACHE_KEY, JSON.stringify(json)); }catch(e){}
  }).catch(e=>console.warn('background revalidate failed (using existing cache):', e));
}
async function resolveSubstationData(){
  const bootMsg=document.getElementById('bootMsg');
  // 1) local cache from a previous successful Drive fetch — instant, then silently
  //    refreshed in the background so the next load has the latest data.
  try{
    const cached=localStorage.getItem(DRIVE_CACHE_KEY);
    if(cached){
      const parsed=JSON.parse(cached);
      if(parsed && parsed.bays && parsed.bays.length){
        DATA_SOURCE='cache';
        setTimeout(backgroundRevalidate, 1500);
        return parsed;
      }
    }
  }catch(e){}
  // 2) no cache yet — live fetch from the Google Sheet database
  if(!GOOGLE_SHEET_API_URL){
    throw new Error('No backend configured (GOOGLE_SHEET_API_URL is empty) and no cached data is available.');
  }
  if(bootMsg) bootMsg.textContent='Fetching substation data from Google Drive — first load can take a little while…';
  const json=await fetchFullDataFromDrive();
  try{ localStorage.setItem(DRIVE_CACHE_KEY, JSON.stringify(json)); }catch(e){}
  DATA_SOURCE='drive';
  return json;
}
async function refreshSldFromDrive(){
  if(!GOOGLE_SHEET_API_URL) return;
  try{
    const res=await fetch(GOOGLE_SHEET_API_URL+'?action=getSld');
    const json=await res.json();
    if(json.ok && json.base64) SLD_ACTIVE=json.base64;
  }catch(e){ /* keep embedded SLD_ACTIVE fallback */ }
}

/* ================= BOOT ================= */
async function loadDataAndRender(){
  try{
    SUB=await resolveSubstationData();
  }catch(e){
    showBootError_(e);
    return;
  }
  buildIndices();
  refreshSldFromDrive(); // non-blocking; updates SLD_ACTIVE when it resolves
  window.APP={SUB,BAYS,RELAYS,STORE,ST,relayById,bayById,bayOf,versionsOf,latestVersion,flatSettings,findSetting,getApiKey,getCustomCols,getDesc,getValueMeaning,currentUser,isAdmin,canEdit,DATA_SOURCE:()=>DATA_SOURCE};
  render();
  const bs=document.getElementById('bootScreen'); if(bs) bs.classList.add('hide');
}
function showBootError_(e){
  const bs=document.getElementById('bootScreen');
  if(!bs) return;
  bs.innerHTML=`<svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" fill="#F2A93B" stroke="#F2A93B" stroke-width="1" stroke-linejoin="round"/></svg>
    <div style="max-width:420px;text-align:center;padding:0 20px">
      <div style="font-family:var(--serif);color:var(--alarm);font-size:14px;margin-bottom:8px">Couldn't load substation data</div>
      <div style="font-size:12.5px;color:var(--mute);margin-bottom:16px">${(e&&e.message)||e}</div>
      <button class="btn pri" onclick="location.reload()">Retry</button>
    </div>`;
}
function wireStaticListeners(){
  document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>{pushHistory(); ST.view=b.dataset.view; if(ST.view==='bay'&&!ST.bayId){ST.bayId=BAYS[0].id;} render();}));
  document.getElementById('btnAccount').onclick=openAccountModal;
  document.getElementById('hamb').onclick=()=>document.getElementById('rail').classList.toggle('open');
  setStoreDot(storageAvailable());
}
async function boot(){
  wireStaticListeners();
  await loadDataAndRender();
}
boot();

/* ================= PER-SETTING AI ASSIST (description / value meaning) ================= */
function openMeaningAssist(rid,group,title,field){
  if(!requireEdit()) return;
  const prev = field==='desc' ? getDesc(rid,group,title) : getValueMeaning(rid,group,title);
  window.__ma={rid,group,title,field,aiText:'',draft:prev||''};
  renderMeaningAssistModal();
}
function renderMeaningAssistModal(){
  const {rid,group,title,field,aiText,draft}=window.__ma;
  const r=relayById(rid); const bay=bayOf(rid); const s=findSetting(r,group,title);
  const label=field==='desc'?'Setting meaning':'Value meaning';
  const prev=field==='desc'?getDesc(rid,group,title):getValueMeaning(rid,group,title);
  modal(`<div class="mh"><h3>${label} — ${title}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <div class="hint">${r.name}${bay?(' · '+bay.name):''} · ${group} · current value: ${s?s.v:''} ${s?(s.u||''):''}</div>
      ${prev?`<div class="ai-box ai-user"><div class="ai-head" onclick="this.parentNode.classList.toggle('closed')">📝 Current entry<span class="car">▾</span></div><div class="ai-body">${prev}</div></div>`:''}
      <div class="ai-box ai-ai ${aiText?'':'closed'}"><div class="ai-head" onclick="this.parentNode.classList.toggle('closed')">✨ AI suggestion<span class="car">▾</span></div>
        <div class="ai-body" id="maBody">${aiText||'Not generated yet — click "Generate" below.'}</div></div>
      <button class="btn" id="maGenBtn" onclick="maGenerate()">✨ Generate with AI</button>
      <div class="fld"><label>Final text (edit / merge / write your own, then save)</label>
        <textarea id="maDraft" style="min-height:90px" oninput="window.__ma.draft=this.value">${draft}</textarea></div>
      <div class="addrow-btns">
        ${prev?`<button onclick="maUse('prev')">Use current entry</button>`:''}
        <button onclick="maUse('ai')">Use AI text</button>
      </div>
    </div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn pri" onclick="maSave()">Save</button></div>`);
}
function maUse(mode){
  const {field,rid,group,title}=window.__ma;
  const t = mode==='prev' ? (field==='desc'?getDesc(rid,group,title):getValueMeaning(rid,group,title)) : window.__ma.aiText;
  if(!t){toast(mode==='ai'?'Generate the AI text first.':'No current entry.','err'); return;}
  window.__ma.draft=t; document.getElementById('maDraft').value=t;
}
async function maGenerate(){
  const {rid,group,title,field}=window.__ma;
  const r=relayById(rid); const bay=bayOf(rid); const s=findSetting(r,group,title);
  if(!getApiKey()){ST.view='admin'; render(); toast('Add your Anthropic API key first.','warn'); return;}
  const btn=document.getElementById('maGenBtn'); btn.disabled=true; btn.textContent='✨ Generating…';
  const prompt = field==='desc'
    ? `You are assisting a transmission protection engineer. In ONE short sentence (under 30 words), explain what the protection relay setting "${title}" (group: ${group}) means, for a ${r.family} ${r.model||''} relay of type "${r.kind}", used in the ${bay?bay.name:''} bay at ${r.voltage}. Be precise and technical, no preamble.`
    : `You are assisting a transmission protection engineer. In ONE short sentence (under 25 words), explain what the CURRENT VALUE "${s?s.v:''} ${s?(s.u||''):''}" of the setting "${title}" (group: ${group}) means or implies, for a ${r.family} ${r.model||''} relay of type "${r.kind}" in the ${bay?bay.name:''} bay at ${r.voltage}. Be precise, no preamble.`;
  try{
    const txt=await callClaude(prompt,220);
    window.__ma.aiText=txt;
    document.getElementById('maBody').textContent=txt;
    document.querySelector('.ai-ai').classList.remove('closed');
    toast('AI suggestion generated.');
  }catch(e){
    if(e&&e.noKey){ST.view='admin'; render(); toast('Add your Anthropic API key first.','warn');}
    else{toast('Could not generate — check your API key.','err'); console.error(e);}
  }finally{btn.disabled=false; btn.textContent='✨ Generate with AI';}
}
function maSave(){
  const {rid,group,title,field}=window.__ma;
  const draft=document.getElementById('maDraft').value.trim();
  if(!draft){toast('Write or choose text before saving.','err'); return;}
  if(field==='desc') setDesc(rid,group,title,draft); else setValueMeaning(rid,group,title,draft);
  closeModal();
  if(ST.view==='relay' && ST.relayId===rid) refreshRelaySettings(rid);
  toast('Saved.');
}

/* ================= BULK "GENERATE ALL" (Overview) ================= */
function openBulkGenerate(){
  if(!requireEdit()) return;
  const totalSettings=SUB.stats.settings, relayCount=SUB.stats.relays;
  modal(`<div class="mh"><h3>Generate all setting &amp; value meanings</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <div class="hint">This calls the AI in small batches (≈15 settings per call) across all <b>${relayCount}</b> relays — <b>${totalSettings.toLocaleString()}</b> settings total — and saves the results directly, with no per-item confirmation. It runs entirely in this browser tab using your own Anthropic API key, can take a long time (likely well over an hour for the full register), and will use a meaningful amount of API quota. You can cancel partway through — everything generated up to that point is kept.</div>
      <div class="hint">Existing entries (baseline or previously edited) are <b>left untouched</b> unless you tick the box below.</div>
      <label style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--mute);cursor:pointer">
        <input type="checkbox" id="bulkOverwrite"> Overwrite settings that already have a meaning
      </label>
    </div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn pri" onclick="startBulkGenerate()">Start generating</button></div>`);
}
function startBulkGenerate(){
  if(!getApiKey()){ST.view='admin'; render(); toast('Add your Anthropic API key first.','warn'); return;}
  const overwrite=document.getElementById('bulkOverwrite').checked;
  closeModal();
  window.__bulkCancel=false;
  runBulkGenerate(overwrite);
}
function bulkJobs(overwrite){
  const jobs=[];
  Object.values(RELAYS).forEach(r=>{
    const v=latestVersion(r);
    v.groups.forEach(g=>{
      const pending=overwrite ? g.settings : g.settings.filter(s=>!getDesc(r.id,g.group,s.t)||!getValueMeaning(r.id,g.group,s.t));
      for(let i=0;i<pending.length;i+=15) jobs.push({relayId:r.id, group:g.group, chunk:pending.slice(i,i+15)});
    });
  });
  return jobs;
}
function bulkProgressModal(){
  modal(`<div class="mh"><h3>Generating meanings…</h3></div>
    <div class="mb">
      <div class="fld"><label id="bulkStatus">Preparing…</label>
        <div style="background:var(--bgs);border:1px solid var(--line);border-radius:8px;height:10px;overflow:hidden">
          <div id="bulkBar" style="background:var(--gold);height:100%;width:0%;transition:width .2s"></div>
        </div>
      </div>
      <div class="hint" id="bulkDetail"></div>
    </div>
    <div class="mf"><button class="btn ghost" onclick="window.__bulkCancel=true">Stop</button></div>`);
}
async function runBulkGenerate(overwrite){
  const jobs=bulkJobs(overwrite);
  if(!jobs.length){toast('Nothing to generate — everything already has a meaning.','warn'); return;}
  bulkProgressModal();
  let doneSettings=0, doneGroups=0, failGroups=0;
  for(let i=0;i<jobs.length;i++){
    if(window.__bulkCancel) break;
    const job=jobs[i]; const r=relayById(job.relayId); const bay=bayOf(job.relayId);
    const statusEl=document.getElementById('bulkStatus'); const barEl=document.getElementById('bulkBar'); const detEl=document.getElementById('bulkDetail');
    if(statusEl){statusEl.textContent=`Batch ${i+1} of ${jobs.length} — ${doneSettings.toLocaleString()} settings done`; barEl.style.width=(100*(i+1)/jobs.length)+'%'; detEl.textContent=`${r.name} · ${job.group}`;}
    const list=job.chunk.map(s=>`- "${s.t}" = ${s.v}${s.u?(' '+s.u):''}`).join('\n');
    const prompt=`You are assisting a transmission protection engineer. Relay: ${r.family} ${r.model||''}, function "${r.kind}", bay ${bay?bay.name:''} (${r.voltage}). Settings group "${job.group}". For EACH setting below give (a) "m": a short technical meaning of what the setting controls (under 25 words), and (b) "v": a short meaning of what its CURRENT value specifically implies (under 20 words).
Settings:
${list}
Respond with ONLY a raw JSON object (no markdown fences, no commentary) mapping each exact setting title to {"m":"...","v":"..."}.`;
    try{
      const txt=await callClaude(prompt,1400);
      const clean=txt.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
      const obj=JSON.parse(clean);
      job.chunk.forEach(s=>{
        const e=obj[s.t]; if(!e) return;
        if(e.m) setDescSilent(job.relayId, job.group, s.t, e.m);
        if(e.v) setValueMeaningSilent(job.relayId, job.group, s.t, e.v);
        doneSettings++;
      });
      doneGroups++;
    }catch(err){ failGroups++; console.error('bulk batch failed', job.group, err); }
    if(i%10===0||i===jobs.length-1) saveStore();
  }
  saveStore();
  closeModal();
  audit('import', null, `Bulk AI generation: ${doneSettings.toLocaleString()} settings updated across ${doneGroups} batches (${failGroups} failed)`);
  saveStore();
  toast(`Done — ${doneSettings.toLocaleString()} settings updated${failGroups?`, ${failGroups} batches failed`:''}.${window.__bulkCancel?' (stopped early)':''}`);
  if(ST.view==='relay') refreshRelaySettings(ST.relayId);
  if(ST.view==='overview') render();
}
